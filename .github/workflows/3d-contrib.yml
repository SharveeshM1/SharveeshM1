name: 3D Contribution Profile

on:
  push:
    branches:
      - main
  schedule:
    - cron: "45 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-output
  cancel-in-progress: false

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
      - name: Copy selected 3D profile
        run: |
          mkdir -p output
          cp profile-3d-contrib/profile-night-view.svg output/profile-3d-contrib.svg
      - name: Commit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile-3d-contrib output/profile-3d-contrib.svg
          git diff --cached --quiet || git commit -m "chore: update 3d contribution profile"
          git pull --rebase origin main
          git push
