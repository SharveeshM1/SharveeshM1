# Setup note: in Settings > Actions > General, set Workflow permissions to "Read and write permissions".
# This uses the built-in GITHUB_TOKEN. No personal access token is required for this profile repository.
name: 3D Contribution Profile

on:
  push:
    branches:
      - main
  schedule:
    - cron: "45 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: contrib-3d-profile-output
  cancel-in-progress: false

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v4

      - name: Generate 3D contribution profile
        uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Copy selected profile
        run: |
          mkdir -p output
          cp profile-3d-contrib/profile-night-view.svg output/profile-3d-contrib.svg

      - name: Replace language donut with technology distribution
        run: |
          ruby - <<'RUBY'
          path = "output/profile-3d-contrib.svg"
          svg = File.read(path)
          replacement = <<'SVG'
          <g transform="translate(40, 520)"><rect x="0" y="0" width="570" height="260" rx="8" fill="#15110e" stroke="#2a211c" stroke-width="1.25"></rect><text x="24" y="34" class="fill-fg" style="font-size: 22px; font-weight: 700;">Technology Distribution</text><text x="24" y="56" class="fill-weak" style="font-size: 13px;">Actual engineering stack, weighted by project depth</text><g transform="translate(24, 78)"><g transform="translate(0, 0)"><title>Java, Spring Boot, REST APIs, backend systems.</title><text x="0" y="13" class="fill-fg" style="font-size: 15px; font-weight: 700;">Java / Spring Boot</text><text x="522" y="13" text-anchor="end" class="fill-strong" style="font-size: 15px; font-weight: 700;">28%</text><rect x="0" y="20" width="522" height="12" rx="6" fill="#2a211c"></rect><rect x="0" y="20" width="146" height="12" rx="6" fill="#f1c7a8"></rect><rect x="0" y="20" width="146" height="12" rx="6" fill="#d97757" opacity="0.42"></rect></g><g transform="translate(0, 30)"><title>Python, OpenAI, Gemini, Claude, tool calling, AI systems.</title><text x="0" y="13" class="fill-fg" style="font-size: 15px; font-weight: 700;">Python / AI</text><text x="522" y="13" text-anchor="end" class="fill-strong" style="font-size: 15px; font-weight: 700;">22%</text><rect x="0" y="20" width="522" height="12" rx="6" fill="#2a211c"></rect><rect x="0" y="20" width="115" height="12" rx="6" fill="#d97757"></rect><rect x="0" y="20" width="115" height="12" rx="6" fill="#f1c7a8" opacity="0.22"></rect></g><g transform="translate(0, 60)"><title>Flutter, Dart, Firebase.</title><text x="0" y="13" class="fill-fg" style="font-size: 15px; font-weight: 700;">Flutter / Dart</text><text x="522" y="13" text-anchor="end" class="fill-strong" style="font-size: 15px; font-weight: 700;">18%</text><rect x="0" y="20" width="522" height="12" rx="6" fill="#2a211c"></rect><rect x="0" y="20" width="94" height="12" rx="6" fill="#b85c38"></rect><rect x="0" y="20" width="94" height="12" rx="6" fill="#f1c7a8" opacity="0.18"></rect></g><g transform="translate(0, 90)"><title>LangChain, LangGraph, orchestration and agent workflows.</title><text x="0" y="13" class="fill-fg" style="font-size: 15px; font-weight: 700;">LangChain / LangGraph</text><text x="522" y="13" text-anchor="end" class="fill-strong" style="font-size: 15px; font-weight: 700;">14%</text><rect x="0" y="20" width="522" height="12" rx="6" fill="#2a211c"></rect><rect x="0" y="20" width="73" height="12" rx="6" fill="#8b5e4b"></rect><rect x="0" y="20" width="73" height="12" rx="6" fill="#f1c7a8" opacity="0.22"></rect></g><g transform="translate(0, 120)"><title>Embeddings, Pinecone, Qdrant, FAISS.</title><text x="0" y="13" class="fill-fg" style="font-size: 15px; font-weight: 700;">Vector Databases</text><text x="522" y="13" text-anchor="end" class="fill-strong" style="font-size: 15px; font-weight: 700;">10%</text><rect x="0" y="20" width="522" height="12" rx="6" fill="#2a211c"></rect><rect x="0" y="20" width="52" height="12" rx="6" fill="#d97757"></rect><rect x="0" y="20" width="52" height="12" rx="6" fill="#8b5e4b" opacity="0.36"></rect></g><g transform="translate(0, 150)"><title>Next.js frontend work.</title><text x="0" y="13" class="fill-fg" style="font-size: 15px; font-weight: 700;">Next.js</text><text x="522" y="13" text-anchor="end" class="fill-strong" style="font-size: 15px; font-weight: 700;">5%</text><rect x="0" y="20" width="522" height="12" rx="6" fill="#2a211c"></rect><rect x="0" y="20" width="26" height="12" rx="6" fill="#f1c7a8"></rect><rect x="0" y="20" width="26" height="12" rx="6" fill="#b85c38" opacity="0.4"></rect></g><g transform="translate(0, 180)"><title>Docker, Linux, GitHub Actions.</title><text x="0" y="13" class="fill-fg" style="font-size: 15px; font-weight: 700;">Infrastructure</text><text x="522" y="13" text-anchor="end" class="fill-strong" style="font-size: 15px; font-weight: 700;">3%</text><rect x="0" y="20" width="522" height="12" rx="6" fill="#2a211c"></rect><rect x="0" y="20" width="16" height="12" rx="6" fill="#8b5e4b"></rect><rect x="0" y="20" width="16" height="12" rx="6" fill="#d97757" opacity="0.42"></rect></g></g></g>
          SVG
          pattern = /<g transform="translate\(40, 520\)">.*?(?=<g><text style="font-size: 32px; font-weight: bold;")/m
          abort "language donut block not found" unless svg.sub!(pattern, replacement.strip)
          File.write(path, svg)
          RUBY

      - name: Commit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/profile-3d-contrib.svg
          git diff --cached --quiet || git commit -m "chore: update 3d contribution profile"
          git pull --rebase origin main
          git push
