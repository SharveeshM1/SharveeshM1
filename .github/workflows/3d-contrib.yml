# Setup note: in Settings > Actions > General, set Workflow permissions to "Read and write permissions".
# This uses the built-in GITHUB_TOKEN. No personal access token is required for this profile repository.
name: 3D Contribution Profile

on:
  push:
    branches:
      - main
  schedule:
    - cron: "45 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: contrib-3d-profile-output
  cancel-in-progress: false

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v4

      - name: Generate 3D contribution profile
        uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Copy selected profile
        run: |
          mkdir -p output
          cp profile-3d-contrib/profile-night-view.svg output/profile-3d-contrib.svg

      - name: Replace language donut with technology distribution
        run: |
          ruby - <<'RUBY'
          path = "output/profile-3d-contrib.svg"
          svg = File.read(path)
          replacement = <<'SVG'
          <g transform="translate(40, 520)"><defs><filter id="tech-soft-glow" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="2.2" result="blur"></feGaussianBlur><feMerge><feMergeNode in="blur"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge></filter></defs><rect x="0" y="0" width="570" height="260" rx="10" fill="#050914" fill-opacity="0.78" stroke="#38bdf8" stroke-opacity="0.22" stroke-width="1.2"></rect><path d="M16 46V18H46M524 18H554V46M554 214V242H524M46 242H16V214" fill="none" stroke="#38bdf8" stroke-opacity="0.55" stroke-width="1.4"></path><path d="M24 68H548M24 212H548" stroke="#38bdf8" stroke-opacity="0.09" stroke-width="1"></path><text x="24" y="35" class="fill-fg" style="font-size: 22px; font-weight: 700; letter-spacing: .2px;">Technology Distribution</text><text x="24" y="58" class="fill-weak" style="font-size: 13px; letter-spacing: .1px;">Actual engineering stack weighted by project depth</text><g transform="translate(150, 145)"><circle cx="0" cy="0" r="88" fill="none" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.18" stroke-dasharray="2 9"></circle><circle cx="0" cy="0" r="52" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.08"></circle><circle cx="0" cy="0" r="70" fill="none" stroke="#0f172a" stroke-width="22" opacity="0.9"></circle><g filter="url(#tech-soft-glow)" transform="rotate(-90)"><circle cx="0" cy="0" r="70" fill="none" stroke="#ff8a3d" stroke-width="24" stroke-dasharray="113.3 326.5" stroke-dashoffset="0" stroke-linecap="round" opacity="0.20"></circle><circle cx="0" cy="0" r="70" fill="none" stroke="#a855f7" stroke-width="24" stroke-dasharray="89.1 350.7" stroke-dashoffset="-118.3" stroke-linecap="round" opacity="0.20"></circle><circle cx="0" cy="0" r="70" fill="none" stroke="#22d3ee" stroke-width="24" stroke-dasharray="72.9 366.9" stroke-dashoffset="-212.4" stroke-linecap="round" opacity="0.20"></circle><circle cx="0" cy="0" r="70" fill="none" stroke="#ff4fb8" stroke-width="24" stroke-dasharray="56.7 383.1" stroke-dashoffset="-290.3" stroke-linecap="round" opacity="0.20"></circle><circle cx="0" cy="0" r="70" fill="none" stroke="#34d399" stroke-width="24" stroke-dasharray="40.5 399.3" stroke-dashoffset="-352" stroke-linecap="round" opacity="0.20"></circle><circle cx="0" cy="0" r="70" fill="none" stroke="#3b82f6" stroke-width="24" stroke-dasharray="20.2 419.6" stroke-dashoffset="-397.5" stroke-linecap="round" opacity="0.20"></circle><circle cx="0" cy="0" r="70" fill="none" stroke="#facc15" stroke-width="24" stroke-dasharray="12.1 427.7" stroke-dashoffset="-422.7" stroke-linecap="round" opacity="0.20"></circle></g><g transform="rotate(-90)"><circle cx="0" cy="0" r="70" fill="none" stroke="#ff8a3d" stroke-width="15" stroke-dasharray="113.3 326.5" stroke-dashoffset="0" stroke-linecap="round"><title>Java / Spring Boot 28%</title></circle><circle cx="0" cy="0" r="70" fill="none" stroke="#a855f7" stroke-width="15" stroke-dasharray="89.1 350.7" stroke-dashoffset="-118.3" stroke-linecap="round"><title>Python / AI 22%</title></circle><circle cx="0" cy="0" r="70" fill="none" stroke="#22d3ee" stroke-width="15" stroke-dasharray="72.9 366.9" stroke-dashoffset="-212.4" stroke-linecap="round"><title>Flutter / Dart 18%</title></circle><circle cx="0" cy="0" r="70" fill="none" stroke="#ff4fb8" stroke-width="15" stroke-dasharray="56.7 383.1" stroke-dashoffset="-290.3" stroke-linecap="round"><title>LangChain / LangGraph 14%</title></circle><circle cx="0" cy="0" r="70" fill="none" stroke="#34d399" stroke-width="15" stroke-dasharray="40.5 399.3" stroke-dashoffset="-352" stroke-linecap="round"><title>Vector Databases 10%</title></circle><circle cx="0" cy="0" r="70" fill="none" stroke="#3b82f6" stroke-width="15" stroke-dasharray="20.2 419.6" stroke-dashoffset="-397.5" stroke-linecap="round"><title>Next.js 5%</title></circle><circle cx="0" cy="0" r="70" fill="none" stroke="#facc15" stroke-width="15" stroke-dasharray="12.1 427.7" stroke-dashoffset="-422.7" stroke-linecap="round"><title>Infrastructure 3%</title></circle></g><circle cx="0" cy="0" r="42" fill="#050914" fill-opacity="0.92" stroke="#38bdf8" stroke-opacity="0.16" stroke-width="1.2"></circle><text x="0" y="-2" text-anchor="middle" class="fill-fg" style="font-size: 23px; font-weight: 800;">100%</text><text x="0" y="20" text-anchor="middle" fill="#38bdf8" style="font-size: 10px; font-weight: 700; letter-spacing: 1.8px;">DEPTH</text></g><g transform="translate(302, 77)"><g transform="translate(0, 0)"><circle cx="0" cy="0" r="4.8" fill="#ff8a3d"></circle><text x="15" y="5" class="fill-fg" style="font-size: 14px; font-weight: 650;">Java / Spring Boot</text><text x="224" y="5" text-anchor="end" fill="#ff8a3d" style="font-size: 14px; font-weight: 800;">28%</text><line x1="15" y1="11" x2="78" y2="11" stroke="#ff8a3d" stroke-width="2" stroke-linecap="round" opacity="0.8"></line></g><g transform="translate(0, 24)"><circle cx="0" cy="0" r="4.8" fill="#a855f7"></circle><text x="15" y="5" class="fill-fg" style="font-size: 14px; font-weight: 650;">Python / AI</text><text x="224" y="5" text-anchor="end" fill="#a855f7" style="font-size: 14px; font-weight: 800;">22%</text><line x1="15" y1="11" x2="65" y2="11" stroke="#a855f7" stroke-width="2" stroke-linecap="round" opacity="0.8"></line></g><g transform="translate(0, 48)"><circle cx="0" cy="0" r="4.8" fill="#22d3ee"></circle><text x="15" y="5" class="fill-fg" style="font-size: 14px; font-weight: 650;">Flutter / Dart</text><text x="224" y="5" text-anchor="end" fill="#22d3ee" style="font-size: 14px; font-weight: 800;">18%</text><line x1="15" y1="11" x2="56" y2="11" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" opacity="0.8"></line></g><g transform="translate(0, 72)"><circle cx="0" cy="0" r="4.8" fill="#ff4fb8"></circle><text x="15" y="5" class="fill-fg" style="font-size: 14px; font-weight: 650;">LangChain / LangGraph</text><text x="224" y="5" text-anchor="end" fill="#ff4fb8" style="font-size: 14px; font-weight: 800;">14%</text><line x1="15" y1="11" x2="47" y2="11" stroke="#ff4fb8" stroke-width="2" stroke-linecap="round" opacity="0.8"></line></g><g transform="translate(0, 96)"><circle cx="0" cy="0" r="4.8" fill="#34d399"></circle><text x="15" y="5" class="fill-fg" style="font-size: 14px; font-weight: 650;">Vector Databases</text><text x="224" y="5" text-anchor="end" fill="#34d399" style="font-size: 14px; font-weight: 800;">10%</text><line x1="15" y1="11" x2="38" y2="11" stroke="#34d399" stroke-width="2" stroke-linecap="round" opacity="0.8"></line></g><g transform="translate(0, 120)"><circle cx="0" cy="0" r="4.8" fill="#3b82f6"></circle><text x="15" y="5" class="fill-fg" style="font-size: 14px; font-weight: 650;">Next.js</text><text x="224" y="5" text-anchor="end" fill="#3b82f6" style="font-size: 14px; font-weight: 800;">5%</text><line x1="15" y1="11" x2="27" y2="11" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" opacity="0.8"></line></g><g transform="translate(0, 144)"><circle cx="0" cy="0" r="4.8" fill="#facc15"></circle><text x="15" y="5" class="fill-fg" style="font-size: 14px; font-weight: 650;">Infrastructure</text><text x="224" y="5" text-anchor="end" fill="#facc15" style="font-size: 14px; font-weight: 800;">3%</text><line x1="15" y1="11" x2="22" y2="11" stroke="#facc15" stroke-width="2" stroke-linecap="round" opacity="0.8"></line></g></g></g>
          SVG
          pattern = /<g transform="translate\(40, 520\)">.*?(?=<g><text style="font-size: 32px; font-weight: bold;")/m
          abort "language donut block not found" unless svg.sub!(pattern, replacement.strip)
          File.write(path, svg)
          RUBY

      - name: Commit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/profile-3d-contrib.svg
          git diff --cached --quiet || git commit -m "chore: update 3d contribution profile"
          git pull --rebase origin main
          git push
