# Setup note: in Settings > Actions > General, set Workflow permissions to "Read and write permissions".
# This uses the built-in GITHUB_TOKEN. No personal access token is required for this profile repository.
name: 3D Contribution Profile

on:
  push:
    branches:
      - main
  schedule:
    - cron: "45 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: contrib-3d-profile-output
  cancel-in-progress: false

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v4

      - name: Generate 3D contribution profile
        uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Copy selected profile
        run: |
          mkdir -p output
          cp profile-3d-contrib/profile-night-view.svg output/profile-3d-contrib.svg

      - name: Replace language donut with technology distribution
        run: |
          ruby - <<'RUBY'
          path = "output/profile-3d-contrib.svg"
          svg = File.read(path)
          replacement = <<'SVG'
          <g transform="translate(40, 520)"><rect x="0" y="0" width="570" height="260" rx="8" fill="#15110e" stroke="#2a211c" stroke-width="1.25"></rect><text x="24" y="34" class="fill-fg" style="font-size: 22px; font-weight: 700;">Technology Distribution</text><text x="24" y="56" class="fill-weak" style="font-size: 13px;">Actual engineering stack weighted by project depth</text><g transform="translate(145, 145)"><circle cx="0" cy="0" r="78" fill="none" stroke="#2a211c" stroke-width="30" opacity="0.72"></circle><circle cx="0" cy="0" r="72" fill="none" stroke="#ff8a3d" stroke-width="30" stroke-dasharray="117.9 334.5" stroke-dashoffset="0" stroke-linecap="round" opacity="0.16" transform="rotate(-90)"></circle><circle cx="0" cy="0" r="72" fill="none" stroke="#a855f7" stroke-width="30" stroke-dasharray="92.6 359.8" stroke-dashoffset="-122.4" stroke-linecap="round" opacity="0.16" transform="rotate(-90)"></circle><circle cx="0" cy="0" r="72" fill="none" stroke="#22d3ee" stroke-width="30" stroke-dasharray="75.8 376.6" stroke-dashoffset="-219.5" stroke-linecap="round" opacity="0.16" transform="rotate(-90)"></circle><circle cx="0" cy="0" r="72" fill="none" stroke="#ff4fb8" stroke-width="30" stroke-dasharray="58.9 393.5" stroke-dashoffset="-299.8" stroke-linecap="round" opacity="0.16" transform="rotate(-90)"></circle><circle cx="0" cy="0" r="72" fill="none" stroke="#34d399" stroke-width="30" stroke-dasharray="42.1 410.3" stroke-dashoffset="-363.2" stroke-linecap="round" opacity="0.16" transform="rotate(-90)"></circle><circle cx="0" cy="0" r="72" fill="none" stroke="#3b82f6" stroke-width="30" stroke-dasharray="21 431.4" stroke-dashoffset="-409.8" stroke-linecap="round" opacity="0.16" transform="rotate(-90)"></circle><circle cx="0" cy="0" r="72" fill="none" stroke="#facc15" stroke-width="30" stroke-dasharray="12.6 439.8" stroke-dashoffset="-435.3" stroke-linecap="round" opacity="0.16" transform="rotate(-90)"></circle><circle cx="0" cy="0" r="72" fill="none" stroke="#ff8a3d" stroke-width="24" stroke-dasharray="117.9 334.5" stroke-dashoffset="0" stroke-linecap="round" transform="rotate(-90)"><title>Java / Spring Boot 28%</title></circle><circle cx="0" cy="0" r="72" fill="none" stroke="#a855f7" stroke-width="24" stroke-dasharray="92.6 359.8" stroke-dashoffset="-122.4" stroke-linecap="round" transform="rotate(-90)"><title>Python / AI 22%</title></circle><circle cx="0" cy="0" r="72" fill="none" stroke="#22d3ee" stroke-width="24" stroke-dasharray="75.8 376.6" stroke-dashoffset="-219.5" stroke-linecap="round" transform="rotate(-90)"><title>Flutter / Dart 18%</title></circle><circle cx="0" cy="0" r="72" fill="none" stroke="#ff4fb8" stroke-width="24" stroke-dasharray="58.9 393.5" stroke-dashoffset="-299.8" stroke-linecap="round" transform="rotate(-90)"><title>LangChain / LangGraph 14%</title></circle><circle cx="0" cy="0" r="72" fill="none" stroke="#34d399" stroke-width="24" stroke-dasharray="42.1 410.3" stroke-dashoffset="-363.2" stroke-linecap="round" transform="rotate(-90)"><title>Vector Databases 10%</title></circle><circle cx="0" cy="0" r="72" fill="none" stroke="#3b82f6" stroke-width="24" stroke-dasharray="21 431.4" stroke-dashoffset="-409.8" stroke-linecap="round" transform="rotate(-90)"><title>Next.js 5%</title></circle><circle cx="0" cy="0" r="72" fill="none" stroke="#facc15" stroke-width="24" stroke-dasharray="12.6 439.8" stroke-dashoffset="-435.3" stroke-linecap="round" transform="rotate(-90)"><title>Infrastructure 3%</title></circle><circle cx="0" cy="0" r="48" class="fill-bg" stroke="#2a211c" stroke-width="1.25"></circle><text x="0" y="-4" text-anchor="middle" class="fill-fg" style="font-size: 24px; font-weight: 700;">100%</text><text x="0" y="19" text-anchor="middle" class="fill-weak" style="font-size: 12px; font-weight: 700;">STACK MIX</text></g><g transform="translate(292, 79)"><g transform="translate(0, 0)"><circle cx="0" cy="0" r="5" fill="#ff8a3d"></circle><text x="16" y="5" class="fill-fg" style="font-size: 15px; font-weight: 700;">Java / Spring Boot</text><text x="242" y="5" text-anchor="end" class="fill-strong" style="font-size: 15px; font-weight: 700;">28%</text></g><g transform="translate(0, 25)"><circle cx="0" cy="0" r="5" fill="#a855f7"></circle><text x="16" y="5" class="fill-fg" style="font-size: 15px; font-weight: 700;">Python / AI</text><text x="242" y="5" text-anchor="end" class="fill-strong" style="font-size: 15px; font-weight: 700;">22%</text></g><g transform="translate(0, 50)"><circle cx="0" cy="0" r="5" fill="#22d3ee"></circle><text x="16" y="5" class="fill-fg" style="font-size: 15px; font-weight: 700;">Flutter / Dart</text><text x="242" y="5" text-anchor="end" class="fill-strong" style="font-size: 15px; font-weight: 700;">18%</text></g><g transform="translate(0, 75)"><circle cx="0" cy="0" r="5" fill="#ff4fb8"></circle><text x="16" y="5" class="fill-fg" style="font-size: 15px; font-weight: 700;">LangChain / LangGraph</text><text x="242" y="5" text-anchor="end" class="fill-strong" style="font-size: 15px; font-weight: 700;">14%</text></g><g transform="translate(0, 100)"><circle cx="0" cy="0" r="5" fill="#34d399"></circle><text x="16" y="5" class="fill-fg" style="font-size: 15px; font-weight: 700;">Vector Databases</text><text x="242" y="5" text-anchor="end" class="fill-strong" style="font-size: 15px; font-weight: 700;">10%</text></g><g transform="translate(0, 125)"><circle cx="0" cy="0" r="5" fill="#3b82f6"></circle><text x="16" y="5" class="fill-fg" style="font-size: 15px; font-weight: 700;">Next.js</text><text x="242" y="5" text-anchor="end" class="fill-strong" style="font-size: 15px; font-weight: 700;">5%</text></g><g transform="translate(0, 150)"><circle cx="0" cy="0" r="5" fill="#facc15"></circle><text x="16" y="5" class="fill-fg" style="font-size: 15px; font-weight: 700;">Infrastructure</text><text x="242" y="5" text-anchor="end" class="fill-strong" style="font-size: 15px; font-weight: 700;">3%</text></g></g></g>
          SVG
          pattern = /<g transform="translate\(40, 520\)">.*?(?=<g><text style="font-size: 32px; font-weight: bold;")/m
          abort "language donut block not found" unless svg.sub!(pattern, replacement.strip)
          File.write(path, svg)
          RUBY

      - name: Commit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/profile-3d-contrib.svg
          git diff --cached --quiet || git commit -m "chore: update 3d contribution profile"
          git pull --rebase origin main
          git push
