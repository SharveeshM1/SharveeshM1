name: Metrics

on:
  push:
    branches:
      - main
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate metrics panel
        run: |
          mkdir -p output
          cat > output/metrics.svg <<'SVG'
          <svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420">
            <rect width="1200" height="420" fill="#0D1117"/>
            <rect x="70" y="60" width="1060" height="300" rx="24" fill="#111827" stroke="#22D3EE" stroke-opacity=".35"/>
            <text x="120" y="130" font-family="Space Grotesk, Inter, sans-serif" font-size="42" font-weight="700" fill="#F8FAFC">Engineering Metrics</text>
            <text x="120" y="200" font-family="JetBrains Mono, monospace" font-size="26" fill="#22D3EE">AI Systems / LLM Applications / Infrastructure</text>
            <text x="120" y="270" font-family="JetBrains Mono, monospace" font-size="24" fill="#F8FAFC" opacity=".72">Generated by GitHub Actions</text>
          </svg>
          SVG
      - name: Commit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/metrics.svg
          git diff --cached --quiet || git commit -m "chore: update metrics panel"
          git push
