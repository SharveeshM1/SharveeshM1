name: Pacman Contribution Graph

on:
  push:
    branches:
      - main
  schedule:
    - cron: "15 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-output
  cancel-in-progress: false

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
          games: "pacman"
      - name: Move generated SVGs
        run: |
          mkdir -p output
          cp dist/pacman-contribution-graph.svg output/pacman-contribution-graph.svg
          cp dist/pacman-contribution-graph-dark.svg output/pacman-contribution-graph-dark.svg
      - name: Commit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/pacman-contribution-graph.svg output/pacman-contribution-graph-dark.svg
          git diff --cached --quiet || git commit -m "chore: update pacman contribution graph"
          git pull --rebase origin main
          git push
