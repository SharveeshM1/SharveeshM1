name: Snake Contribution Graph

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-output
  cancel-in-progress: false

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            output/snake.svg?palette=github-dark&color_snake=%2322D3EE&color_dots=%230D1117,%23111827,%238B5CF6,%2322D3EE,%23F8FAFC
      - name: Commit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/snake.svg
          git diff --cached --quiet || git commit -m "chore: update snake contribution graph"
          git pull --rebase origin main
          git push
