<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1200" viewBox="0 0 2400 1200" role="img" aria-labelledby="title desc">
  <title id="title">AI core processor</title>
  <desc id="desc">A premium holographic AI core chip with purple and cyan neural circuitry on a black background.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%"><stop offset="0%" stop-color="#151026"/><stop offset="58%" stop-color="#0D1117"/><stop offset="100%" stop-color="#05070B"/></radialGradient>
    <linearGradient id="edge" x1="520" y1="920" x2="1880" y2="240" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#8B5CF6" stop-opacity=".18"/><stop offset="50%" stop-color="#22D3EE" stop-opacity=".86"/><stop offset="100%" stop-color="#8B5CF6" stop-opacity=".22"/></linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="14" result="b"/><feColorMatrix in="b" type="matrix" values="0 0 0 0 .133 0 0 0 0 .827 0 0 0 0 .933 0 0 0 .74 0"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="depth" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="34" stdDeviation="38" flood-color="#000" flood-opacity=".62"/><feDropShadow dx="0" dy="0" stdDeviation="22" flood-color="#8B5CF6" flood-opacity=".32"/></filter>
    <style>@keyframes spin{to{transform:rotate(360deg)}}@keyframes dash{to{stroke-dashoffset:-520}}#rings{animation:spin 34s linear infinite;transform-origin:1200px 600px}.flow{animation:dash 8s linear infinite}@media (prefers-reduced-motion:reduce){*{animation:none!important}}</style>
  </defs>
  <rect width="2400" height="1200" fill="url(#bg)"/>
  <g id="rings" fill="none" filter="url(#glow)"><ellipse cx="1200" cy="600" rx="640" ry="190" stroke="url(#edge)" stroke-width="4" stroke-dasharray="34 28"/><ellipse cx="1200" cy="600" rx="480" ry="142" stroke="#8B5CF6" stroke-opacity=".36" stroke-width="3" transform="rotate(18 1200 600)"/></g>
  <g filter="url(#depth)"><path d="M1200 246L1512 420V780L1200 954L888 780V420Z" fill="#0D1117" fill-opacity=".72" stroke="url(#edge)" stroke-width="3"/><path d="M1200 348L1424 474V726L1200 852L976 726V474Z" fill="#111827" fill-opacity=".5" stroke="#F8FAFC" stroke-opacity=".13" stroke-width="2"/></g>
  <g fill="none" stroke-linecap="round" filter="url(#glow)"><path class="flow" d="M470 600H888M1512 600H1930M1200 246V84M1200 954V1116M888 420L584 246M1512 420L1816 246M888 780L584 954M1512 780L1816 954" stroke="url(#edge)" stroke-width="4" stroke-dasharray="22 28"/><path d="M1080 590L1160 520L1266 552L1340 486M1160 520L1204 648L1306 686L1376 620M1204 648L1120 724L1204 782L1306 686" stroke="#22D3EE" stroke-opacity=".78" stroke-width="4"/></g>
  <g fill="#F8FAFC" filter="url(#glow)"><circle cx="1160" cy="520" r="9"/><circle cx="1266" cy="552" r="9" fill="#22D3EE"/><circle cx="1204" cy="648" r="12"/><circle cx="1306" cy="686" r="9" fill="#8B5CF6"/><circle cx="1120" cy="724" r="8" fill="#22D3EE"/></g>
</svg>
