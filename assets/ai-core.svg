<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">AI Core Architecture</title>
  <desc id="desc">AI core architecture with a central orb and eight readable layers: Prompt, Agent, Tool, Memory, Vector, Context, Evaluation, and Inference.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="48%" r="78%">
      <stop offset="0" stop-color="#11162A"/>
      <stop offset=".58" stop-color="#0B1020"/>
      <stop offset="1" stop-color="#070B14"/>
    </radialGradient>
    <radialGradient id="orb" cx="48%" cy="42%" r="62%">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset=".16" stop-color="#22D3EE"/>
      <stop offset=".58" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-40%" width="160%" height="180%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity=".46"/>
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#22D3EE" flood-opacity=".18"/>
    </filter>
    <style>
      .title{font:900 54px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#F8FAFC}
      .sub{font:700 21px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#9FB4CC}
      .label{font:850 27px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#F8FAFC}
      .node{fill:#111827;fill-opacity:.82;stroke-width:2}
      .line{stroke:url(#accent);stroke-width:3;stroke-linecap:round;stroke-opacity:.52}
    </style>
  </defs>
  <rect width="1600" height="900" rx="28" fill="url(#bg)"/>
  <rect x="1" y="1" width="1598" height="898" rx="28" fill="none" stroke="#263244" stroke-width="2"/>
  <text x="800" y="86" text-anchor="middle" class="title">AI Core Architecture</text>
  <text x="800" y="124" text-anchor="middle" class="sub">Prompt · Agent · Tool · Memory · Vector · Context · Evaluation · Inference</text>

  <g opacity=".9">
    <path class="line" d="M800 450L237 240"/>
    <path class="line" d="M800 450L612 220"/>
    <path class="line" d="M800 450L987 220"/>
    <path class="line" d="M800 450L1362 240"/>
    <path class="line" d="M800 450L237 660"/>
    <path class="line" d="M800 450L612 680"/>
    <path class="line" d="M800 450L987 680"/>
    <path class="line" d="M800 450L1362 660"/>
  </g>

  <g filter="url(#soft)">
    <circle cx="800" cy="450" r="142" fill="url(#orb)"/>
    <path d="M800 316L916 383V517L800 584L684 517V383Z" fill="#0B1020" fill-opacity=".34" stroke="url(#accent)" stroke-width="3"/>
    <circle cx="800" cy="450" r="27" fill="#F8FAFC" opacity=".86"/>
  </g>

  <g filter="url(#soft)">
    <g><rect class="node" x="80" y="180" width="315" height="120" rx="18" stroke="#22D3EE"/><text x="237" y="252" text-anchor="middle" class="label">Prompt Layer</text></g>
    <g><rect class="node" x="455" y="160" width="315" height="120" rx="18" stroke="#8B5CF6"/><text x="612" y="232" text-anchor="middle" class="label">Agent Layer</text></g>
    <g><rect class="node" x="830" y="160" width="315" height="120" rx="18" stroke="#22D3EE"/><text x="987" y="232" text-anchor="middle" class="label">Tool Layer</text></g>
    <g><rect class="node" x="1205" y="180" width="315" height="120" rx="18" stroke="#8B5CF6"/><text x="1362" y="252" text-anchor="middle" class="label">Inference Layer</text></g>
    <g><rect class="node" x="80" y="600" width="315" height="120" rx="18" stroke="#8B5CF6"/><text x="237" y="672" text-anchor="middle" class="label">Memory Layer</text></g>
    <g><rect class="node" x="455" y="620" width="315" height="120" rx="18" stroke="#22D3EE"/><text x="612" y="692" text-anchor="middle" class="label">Vector Layer</text></g>
    <g><rect class="node" x="830" y="620" width="315" height="120" rx="18" stroke="#8B5CF6"/><text x="987" y="692" text-anchor="middle" class="label">Evaluation Layer</text></g>
    <g><rect class="node" x="1205" y="600" width="315" height="120" rx="18" stroke="#22D3EE"/><text x="1362" y="672" text-anchor="middle" class="label">Context Layer</text></g>
  </g>
</svg>
