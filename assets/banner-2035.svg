<svg xmlns="http://www.w3.org/2000/svg" width="3840" height="1900" viewBox="0 0 3840 1900" role="img" aria-labelledby="title desc">
  <title id="title">Sharveesh M maximal AI systems hero</title>
  <desc id="desc">A dominant futuristic hero with huge typography, a giant 3D HELIOS object, orbit lines, stars, particles and cinematic depth.</desc>
  <defs>
    <radialGradient id="void" cx="52%" cy="46%" r="78%">
      <stop offset="0" stop-color="#1b1439"/>
      <stop offset=".34" stop-color="#080d23"/>
      <stop offset=".74" stop-color="#030711"/>
      <stop offset="1" stop-color="#010208"/>
    </radialGradient>
    <radialGradient id="sun" cx="45%" cy="38%" r="58%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset=".08" stop-color="#9ff7ff"/>
      <stop offset=".24" stop-color="#8b5cf6"/>
      <stop offset=".58" stop-color="#3b0764" stop-opacity=".22"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="holo" x1="690" y1="1500" x2="3120" y2="210" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee" stop-opacity=".12"/>
      <stop offset=".28" stop-color="#a78bfa" stop-opacity=".86"/>
      <stop offset=".58" stop-color="#f8fafc" stop-opacity=".72"/>
      <stop offset=".82" stop-color="#38bdf8" stop-opacity=".74"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity=".18"/>
    </linearGradient>
    <linearGradient id="edge" x1="1100" y1="430" x2="2470" y2="1300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity=".92"/>
      <stop offset=".3" stop-color="#67e8f9" stop-opacity=".66"/>
      <stop offset=".66" stop-color="#8b5cf6" stop-opacity=".46"/>
      <stop offset="1" stop-color="#0f172a" stop-opacity=".2"/>
    </linearGradient>
    <pattern id="stars" width="220" height="220" patternUnits="userSpaceOnUse">
      <circle cx="28" cy="34" r="2.8" fill="#fff" opacity=".72"/>
      <circle cx="146" cy="84" r="1.6" fill="#67e8f9" opacity=".65"/>
      <circle cx="82" cy="174" r="2.1" fill="#c4b5fd" opacity=".55"/>
      <circle cx="198" cy="188" r="1.1" fill="#fff" opacity=".48"/>
    </pattern>
    <filter id="bigGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="26" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 .54 0 0 0 0 .36 0 0 0 0 .96 0 0 0 .78 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cyanGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feDropShadow dx="0" dy="40" stdDeviation="48" flood-color="#000" flood-opacity=".5"/>
      <feDropShadow dx="0" dy="0" stdDeviation="28" flood-color="#22d3ee" flood-opacity=".5"/>
      <feDropShadow dx="0" dy="0" stdDeviation="34" flood-color="#8b5cf6" flood-opacity=".45"/>
    </filter>
    <filter id="letterGlow" x="-20%" y="-50%" width="140%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#67e8f9" flood-opacity=".22"/>
    </filter>
    <style>
      .display{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-weight:900;letter-spacing:0}
      .mono{font-family:"SFMono-Regular","Cascadia Code",Menlo,Consolas,monospace;font-weight:800;letter-spacing:9px}
      .text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}
      @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-32px)}}
      @keyframes spin{to{transform:rotate(360deg)}}
      @keyframes dash{to{stroke-dashoffset:-1400}}
      @keyframes pulse{0%,100%{opacity:.42}50%{opacity:.96}}
      #heroObject{animation:float 8s ease-in-out infinite;transform-origin:2100px 910px}
      #rings{animation:spin 52s linear infinite;transform-origin:2100px 910px}
      .dash{animation:dash 12s linear infinite}
      .pulse{animation:pulse 5s ease-in-out infinite}
      @media (prefers-reduced-motion:reduce){*{animation:none!important}}
    </style>
  </defs>
  <rect width="3840" height="1900" fill="url(#void)"/>
  <rect width="3840" height="1900" fill="url(#stars)" opacity=".78"/>
  <path d="M0 1560C610 1360 1060 1510 1630 1240C2250 946 2588 440 3840 390V1900H0Z" fill="#8b5cf6" opacity=".055"/>
  <path d="M0 290C520 474 1026 342 1590 548C2220 780 2730 1190 3840 1060V0H0Z" fill="#22d3ee" opacity=".045"/>

  <g opacity=".7">
    <path d="M260 1350L890 1120L1430 1210L2140 870L2950 1040L3600 720" fill="none" stroke="#67e8f9" stroke-opacity=".16" stroke-width="3"/>
    <path d="M180 480L720 630L1200 468L1750 610L2300 350L3040 510L3670 260" fill="none" stroke="#a78bfa" stroke-opacity=".18" stroke-width="2"/>
    <path d="M410 1540L750 1410M2760 330L3110 210M3180 1320L3560 1160" stroke="#fff" stroke-width="5" stroke-linecap="round" opacity=".42"/>
  </g>

  <g id="rings" opacity=".82">
    <ellipse cx="2100" cy="910" rx="1250" ry="360" fill="none" stroke="url(#holo)" stroke-width="5" stroke-dasharray="46 42" class="dash"/>
    <ellipse cx="2100" cy="910" rx="930" ry="274" fill="none" stroke="#22d3ee" stroke-opacity=".34" stroke-width="4" transform="rotate(18 2100 910)"/>
    <ellipse cx="2100" cy="910" rx="1500" ry="430" fill="none" stroke="#8b5cf6" stroke-opacity=".22" stroke-width="3" transform="rotate(-14 2100 910)"/>
    <ellipse cx="2100" cy="910" rx="620" ry="183" fill="none" stroke="#f8fafc" stroke-opacity=".18" stroke-width="2" transform="rotate(41 2100 910)"/>
  </g>

  <circle cx="2100" cy="910" r="570" fill="url(#sun)" class="pulse"/>
  <g id="heroObject" filter="url(#cyanGlow)">
    <path d="M2100 418L2510 650V1132L2100 1378L1690 1132V650Z" fill="#070b19" stroke="url(#edge)" stroke-width="8"/>
    <path d="M2100 418V878M2510 650L2100 878L1690 650M2100 1378V878M2510 1132L2100 878L1690 1132" fill="none" stroke="#67e8f9" stroke-width="5" stroke-opacity=".58"/>
    <path d="M1850 760L2080 598L2320 744L2424 592M2080 598L2150 962L2398 1084M2150 962L1918 1198L2154 1294" fill="none" stroke="#f8fafc" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M1826 1080C1978 950 2170 914 2374 976" fill="none" stroke="#a78bfa" stroke-width="10" stroke-linecap="round" opacity=".86"/>
    <circle cx="2080" cy="598" r="28" fill="#fff"/>
    <circle cx="2424" cy="592" r="18" fill="#67e8f9"/>
    <circle cx="2398" cy="1084" r="24" fill="#a78bfa"/>
    <circle cx="1918" cy="1198" r="20" fill="#67e8f9"/>
    <circle cx="2154" cy="1294" r="17" fill="#fff"/>
  </g>

  <g filter="url(#letterGlow)">
    <text x="210" y="515" class="mono" font-size="38" fill="#67e8f9">AI SYSTEMS ENGINEER</text>
    <text x="198" y="760" class="display" font-size="210" fill="#f8fafc">SHARVEESH</text>
    <text x="205" y="955" class="display" font-size="210" fill="none" stroke="#f8fafc" stroke-width="3" stroke-opacity=".72">M</text>
    <text x="220" y="1084" class="text" font-size="54" font-weight="650" fill="#b9c7dd">Multi-agent systems, inference infrastructure, product-grade AI.</text>
    <text x="220" y="1154" class="text" font-size="54" font-weight="650" fill="#b9c7dd">Backend architecture rendered as one living machine.</text>
  </g>

  <g opacity=".9" filter="url(#bigGlow)">
    <circle cx="3220" cy="470" r="8" fill="#fff"/>
    <circle cx="3350" cy="640" r="14" fill="#67e8f9"/>
    <circle cx="2970" cy="1240" r="12" fill="#a78bfa"/>
    <circle cx="620" cy="1240" r="10" fill="#fff"/>
    <circle cx="860" cy="360" r="7" fill="#67e8f9"/>
    <path d="M2900 250L3140 172" stroke="#fff" stroke-width="7" stroke-linecap="round" opacity=".72"/>
    <path d="M580 1508L870 1394" stroke="#67e8f9" stroke-width="6" stroke-linecap="round" opacity=".55"/>
  </g>
</svg>
