    <linearGradient id="edge" x1="0" y1="12" x2="720" y2="120" gradientUnits="userSpaceOnUse"><stop stop-color="#67E8F9"/><stop offset=".58" stop-color="#38BDF8"/><stop offset="1" stop-color="#2563EB"/></linearGradient>
    <linearGradient id="surface" x1="0" y1="12" x2="0" y2="120" gradientUnits="userSpaceOnUse"><stop stop-color="#F8FAFC" stop-opacity=".12"/><stop offset=".52" stop-color="#0F172A" stop-opacity=".79"/><stop offset="1" stop-color="#020617"/></linearGradient>
    <radialGradient id="glow" cx="48%" cy="0%" r="84%"><stop stop-color="#38BDF8" stop-opacity=".3"/><stop offset=".45" stop-color="#38BDF8" stop-opacity=".08"/><stop offset="1" stop-color="#020617" stop-opacity="0"/></radialGradient>
