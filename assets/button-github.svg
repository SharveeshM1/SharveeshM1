<svg xmlns="http://www.w3.org/2000/svg" width="720" height="132" viewBox="0 0 720 132" role="img" aria-labelledby="title">
  <title id="title">GitHub command bar segment</title>
  <defs>
    <linearGradient id="edge" x1="0" y1="12" x2="720" y2="120" gradientUnits="userSpaceOnUse"><stop stop-color="#a78bfa"/><stop offset=".55" stop-color="#00d9ff"/><stop offset="1" stop-color="#00d9ff"/></linearGradient>
    <linearGradient id="surface" x1="0" y1="12" x2="0" y2="120" gradientUnits="userSpaceOnUse"><stop stop-color="#f8fafc" stop-opacity=".12"/><stop offset=".52" stop-color="#0a0e27" stop-opacity=".8"/><stop offset="1" stop-color="#0a0e27"/></linearGradient>
    <radialGradient id="glow" cx="50%" cy="0%" r="84%"><stop stop-color="#a78bfa" stop-opacity=".3"/><stop offset=".46" stop-color="#00d9ff" stop-opacity=".08"/><stop offset="1" stop-color="#0a0e27" stop-opacity="0"/></radialGradient>
    <style>.label{font:900 54px "General Sans","Satoshi",-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#f8fafc}.cmd{font:850 20px "General Sans","Satoshi",monospace;letter-spacing:6px;fill:#a78bfa}</style>
  </defs>
  <rect x="0" y="12" width="720" height="108" fill="url(#surface)" stroke="url(#edge)" stroke-width="2"/>
  <rect x="0" y="14" width="720" height="52" fill="url(#glow)"/>
  <path d="M718 22V110" stroke="#a78bfa" stroke-opacity=".25" stroke-width="2"/>
  <circle cx="96" cy="66" r="36" fill="#0a0e27" stroke="url(#edge)" stroke-width="3"/>
  <circle cx="96" cy="61" r="17" fill="none" stroke="#00d9ff" stroke-width="5"/>
  <path d="M80 88C80 78 88 75 96 75C104 75 112 78 112 88" fill="none" stroke="#00d9ff" stroke-width="5" stroke-linecap="round"/>
  <text x="158" y="48" class="cmd">&gt; SOURCE</text>
  <text x="158" y="91" class="label">GitHub</text>
</svg>
