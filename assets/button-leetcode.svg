<svg xmlns="http://www.w3.org/2000/svg" width="720" height="132" viewBox="0 0 720 132" role="img" aria-labelledby="title">
  <title id="title">LeetCode command bar segment</title>
  <defs>
    <linearGradient id="edge" x1="0" y1="12" x2="720" y2="120" gradientUnits="userSpaceOnUse"><stop stop-color="#ff6b35"/><stop offset=".55" stop-color="#ff6b35"/><stop offset="1" stop-color="#a78bfa"/></linearGradient>
    <linearGradient id="surface" x1="0" y1="12" x2="0" y2="120" gradientUnits="userSpaceOnUse"><stop stop-color="#f8fafc" stop-opacity=".12"/><stop offset=".52" stop-color="#0a0e27" stop-opacity=".8"/><stop offset="1" stop-color="#0a0e27"/></linearGradient>
    <radialGradient id="glow" cx="50%" cy="0%" r="84%"><stop stop-color="#ff6b35" stop-opacity=".26"/><stop offset=".46" stop-color="#ff6b35" stop-opacity=".08"/><stop offset="1" stop-color="#0a0e27" stop-opacity="0"/></radialGradient>
