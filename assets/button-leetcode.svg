  <rect x="5" y="5" width="350" height="66" rx="18" fill="#0B0F17" stroke="url(#edge)" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="24" y="19" width="38" height="38" rx="12" fill="#0F172A" stroke="#22D3EE" stroke-opacity=".34"/>
  <path d="M49 28L34 38L49 48" fill="none" stroke="#22D3EE" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M39 38H55" stroke="#FACC15" stroke-width="3" stroke-linecap="round"/>
