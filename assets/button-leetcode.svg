  <circle cx="96" cy="66" r="36" fill="#0a0e27" stroke="url(#edge)" stroke-width="3"/>
  <path d="M105 44L77 66L105 88M86 66H122" fill="none" stroke="#ff6b35" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
