<svg xmlns="http://www.w3.org/2000/svg" width="360" height="76" viewBox="0 0 360 76" role="img" aria-labelledby="title">
  <title id="title">LeetCode</title>
  <defs>
    <linearGradient id="edge" x1="0" y1="0" x2="360" y2="76" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE" stop-opacity=".45"/>
      <stop offset="1" stop-color="#FACC15" stop-opacity=".3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-60%" width="140%" height="220%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000000" flood-opacity=".34"/>
