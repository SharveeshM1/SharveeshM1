<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="980" viewBox="0 0 2400 980" role="img" aria-labelledby="title desc">
  <title id="title">Engineering Stack</title>
  <desc id="desc">Modern icon-based engineering stack for AI, backend, frontend, DevOps and languages.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="0%" r="105%">
      <stop stop-color="#101522"/>
      <stop offset=".58" stop-color="#080B11"/>
      <stop offset="1" stop-color="#05070B"/>
    </radialGradient>
    <linearGradient id="edge" x1="120" y1="160" x2="2280" y2="870" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE" stop-opacity=".34"/>
      <stop offset=".52" stop-color="#8B5CF6" stop-opacity=".38"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity=".22"/>
    </linearGradient>
    <linearGradient id="hair" x1="130" y1="0" x2="2270" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE" stop-opacity="0"/>
      <stop offset=".5" stop-color="#64748B" stop-opacity=".5"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </linearGradient>
    <filter id="card" x="-20%" y="-45%" width="140%" height="190%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#000000" flood-opacity=".32"/>
    </filter>
    <style>
      .kicker{font:700 20px "IBM Plex Mono","Geist Mono",ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:6px;fill:#22D3EE}
      .h1{font:760 58px Geist,Satoshi,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#F8FAFC}
      .sub{font:560 27px Geist,Satoshi,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#AEBBCC}
      .head{font:720 28px Geist,Satoshi,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#F8FAFC}
      .label{font:720 19px Geist,Satoshi,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#DCE6F2}
      .mono{font:700 20px "IBM Plex Mono","Geist Mono",ui-monospace,SFMono-Regular,Menlo,monospace;fill:#DCE6F2}
      .chip{font:650 20px Geist,Satoshi,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#DFE7F2}
    </style>
  </defs>
  <rect width="2400" height="980" rx="34" fill="url(#bg)"/>
  <rect x="1" y="1" width="2398" height="978" rx="34" fill="none" stroke="#1F2937" stroke-opacity=".62"/>
  <text x="130" y="92" class="kicker">ENGINEERING STACK</text>
  <text x="130" y="168" class="h1">Icons back. Clutter gone.</text>
  <text x="130" y="218" class="sub">A compact stack map with controlled local marks, consistent cards and no broken image hosts.</text>
  <path d="M130 278H2270" stroke="url(#hair)" stroke-width="1.5"/>

  <g transform="translate(130 334)" filter="url(#card)">
    <rect width="680" height="210" rx="26" fill="#0B1020" fill-opacity=".78" stroke="url(#edge)" stroke-width="1.4"/>
    <text x="36" y="54" class="head">Languages</text>
    <g transform="translate(36 88)">
      <g><rect width="70" height="70" rx="18" fill="#121A2A" stroke="#22D3EE" stroke-opacity=".28"/><text x="35" y="43" text-anchor="middle" class="mono">Py</text></g>
      <g transform="translate(88)"><rect width="70" height="70" rx="18" fill="#121A2A" stroke="#8B5CF6" stroke-opacity=".28"/><text x="35" y="43" text-anchor="middle" class="mono">Ja</text></g>
      <g transform="translate(176)"><rect width="70" height="70" rx="18" fill="#121A2A" stroke="#22D3EE" stroke-opacity=".28"/><text x="35" y="43" text-anchor="middle" class="mono">Da</text></g>
      <g transform="translate(264)"><rect width="70" height="70" rx="18" fill="#121A2A" stroke="#8B5CF6" stroke-opacity=".28"/><text x="35" y="43" text-anchor="middle" class="mono">C++</text></g>
      <g transform="translate(352)"><rect width="70" height="70" rx="18" fill="#121A2A" stroke="#22D3EE" stroke-opacity=".28"/><text x="35" y="43" text-anchor="middle" class="mono">C</text></g>
      <g transform="translate(440)"><rect width="70" height="70" rx="18" fill="#121A2A" stroke="#8B5CF6" stroke-opacity=".28"/><text x="35" y="43" text-anchor="middle" class="mono">JS</text></g>
      <g transform="translate(528)"><rect width="70" height="70" rx="18" fill="#121A2A" stroke="#22D3EE" stroke-opacity=".28"/><text x="35" y="43" text-anchor="middle" class="mono">TS</text></g>
    </g>
  </g>

  <g transform="translate(860 334)" filter="url(#card)">
    <rect width="1410" height="210" rx="26" fill="#0B1020" fill-opacity=".78" stroke="url(#edge)" stroke-width="1.4"/>
    <text x="36" y="54" class="head">AI Stack</text>
    <g transform="translate(36 88)">
      <g><rect width="86" height="70" rx="18" fill="#121A2A" stroke="#22D3EE" stroke-opacity=".28"/><text x="43" y="43" text-anchor="middle" class="mono">OAI</text></g>
      <g transform="translate(104)"><rect width="86" height="70" rx="18" fill="#121A2A" stroke="#8B5CF6" stroke-opacity=".28"/><text x="43" y="43" text-anchor="middle" class="mono">Gem</text></g>
      <g transform="translate(208)"><rect width="86" height="70" rx="18" fill="#121A2A" stroke="#22D3EE" stroke-opacity=".28"/><text x="43" y="43" text-anchor="middle" class="mono">Cl</text></g>
      <g transform="translate(312)"><rect width="86" height="70" rx="18" fill="#121A2A" stroke="#8B5CF6" stroke-opacity=".28"/><text x="43" y="43" text-anchor="middle" class="mono">LC</text></g>
      <g transform="translate(416)"><rect width="86" height="70" rx="18" fill="#121A2A" stroke="#22D3EE" stroke-opacity=".28"/><text x="43" y="43" text-anchor="middle" class="mono">LG</text></g>
      <g transform="translate(520)"><rect width="86" height="70" rx="18" fill="#121A2A" stroke="#8B5CF6" stroke-opacity=".28"/><text x="43" y="43" text-anchor="middle" class="mono">HF</text></g>
      <g transform="translate(624)"><rect width="86" height="70" rx="18" fill="#121A2A" stroke="#22D3EE" stroke-opacity=".28"/><text x="43" y="43" text-anchor="middle" class="mono">Ol</text></g>
      <g transform="translate(728)"><rect width="86" height="70" rx="18" fill="#121A2A" stroke="#8B5CF6" stroke-opacity=".28"/><text x="43" y="43" text-anchor="middle" class="mono">PC</text></g>
      <g transform="translate(832)"><rect width="86" height="70" rx="18" fill="#121A2A" stroke="#22D3EE" stroke-opacity=".28"/><text x="43" y="43" text-anchor="middle" class="mono">Qd</text></g>
      <g transform="translate(936)"><rect width="86" height="70" rx="18" fill="#121A2A" stroke="#8B5CF6" stroke-opacity=".28"/><text x="43" y="43" text-anchor="middle" class="mono">PT</text></g>
      <g transform="translate(1040)"><rect width="86" height="70" rx="18" fill="#121A2A" stroke="#22D3EE" stroke-opacity=".28"/><text x="43" y="43" text-anchor="middle" class="mono">TF</text></g>
      <g transform="translate(1144)"><rect width="120" height="70" rx="18" fill="#121A2A" stroke="#8B5CF6" stroke-opacity=".28"/><text x="60" y="43" text-anchor="middle" class="mono">RAG</text></g>
    </g>
  </g>

  <g transform="translate(130 604)" filter="url(#card)">
    <rect width="680" height="210" rx="26" fill="#0B1020" fill-opacity=".78" stroke="url(#edge)" stroke-width="1.4"/>
    <text x="36" y="54" class="head">Backend</text>
    <text x="36" y="106" class="label">Spring Boot / FastAPI / Node.js / Express</text>
    <text x="36" y="148" class="label">PostgreSQL / MongoDB / Redis / Kafka / RabbitMQ</text>
  </g>
  <g transform="translate(860 604)" filter="url(#card)">
    <rect width="680" height="210" rx="26" fill="#0B1020" fill-opacity=".78" stroke="url(#edge)" stroke-width="1.4"/>
    <text x="36" y="54" class="head">Frontend</text>
    <text x="36" y="106" class="label">Flutter / Dart / Next.js / React / TypeScript</text>
    <text x="36" y="148" class="label">TailwindCSS / Firebase / HTML / CSS</text>
  </g>
  <g transform="translate(1590 604)" filter="url(#card)">
    <rect width="680" height="210" rx="26" fill="#0B1020" fill-opacity=".78" stroke="url(#edge)" stroke-width="1.4"/>
    <text x="36" y="54" class="head">DevOps + Cloud</text>
    <text x="36" y="106" class="label">Git / GitHub / GitHub Actions / Linux / Docker</text>
    <text x="36" y="148" class="label">AWS / GCP / Vercel / VS Code</text>
  </g>
  <g transform="translate(330 865)" text-anchor="middle">
    <rect x="0" y="0" width="260" height="48" rx="24" fill="#0D1320" stroke="#22D3EE" stroke-opacity=".38"/><text x="130" y="31" class="chip">Tool Calling</text>
    <rect x="300" y="0" width="330" height="48" rx="24" fill="#0D1320" stroke="#8B5CF6" stroke-opacity=".38"/><text x="465" y="31" class="chip">Prompt Engineering</text>
    <rect x="670" y="0" width="330" height="48" rx="24" fill="#0D1320" stroke="#22D3EE" stroke-opacity=".38"/><text x="835" y="31" class="chip">Structured Outputs</text>
    <rect x="1040" y="0" width="350" height="48" rx="24" fill="#0D1320" stroke="#8B5CF6" stroke-opacity=".38"/><text x="1215" y="31" class="chip">Multi-Agent Systems</text>
    <rect x="1430" y="0" width="330" height="48" rx="24" fill="#0D1320" stroke="#22D3EE" stroke-opacity=".38"/><text x="1595" y="31" class="chip">Context Engineering</text>
  </g>
</svg>
