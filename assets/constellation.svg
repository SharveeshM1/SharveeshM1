<svg xmlns="http://www.w3.org/2000/svg" width="3840" height="2160" viewBox="0 0 3840 2160" role="img" aria-labelledby="title desc">
  <title id="title">AI domain constellation map</title>
  <desc id="desc">A black holographic constellation map connecting AI systems, LLM applications, distributed systems, and infrastructure domains.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="72%">
      <stop offset="0%" stop-color="#151026"/>
      <stop offset="58%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#05070B"/>
    </radialGradient>
    <linearGradient id="edge" x1="520" y1="1580" x2="3260" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity=".2"/>
      <stop offset="48%" stop-color="#22D3EE" stop-opacity=".76"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity=".18"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 .133 0 0 0 0 .827 0 0 0 0 .933 0 0 0 .74 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .mono{font-family:"JetBrains Mono","IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,monospace}
      @keyframes drift{0%,100%{transform:translate3d(0,0,0)}50%{transform:translate3d(20px,-24px,0)}}
      @keyframes dash{to{stroke-dashoffset:-720}}
      #map{animation:drift 11s ease-in-out infinite}
      .link{animation:dash 11s linear infinite}
      @media (prefers-reduced-motion:reduce){*{animation:none!important}}
    </style>
  </defs>
  <rect width="3840" height="2160" fill="url(#bg)"/>
  <g id="map" filter="url(#glow)">
    <g fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path class="link" d="M702 1248L1180 840L1644 1048L2050 692L2522 956L3060 642" stroke="url(#edge)" stroke-width="4" stroke-dasharray="30 28"/>
      <path class="link" d="M1180 840L1320 1460L2050 692L2260 1420L2522 956L3120 1352" stroke="#8B5CF6" stroke-opacity=".38" stroke-width="3" stroke-dasharray="16 24"/>
      <path d="M702 1248L1320 1460L2260 1420L3120 1352" stroke="#F8FAFC" stroke-opacity=".14" stroke-width="2"/>
      <path d="M1644 1048L2260 1420L2522 956" stroke="#22D3EE" stroke-opacity=".28" stroke-width="3"/>
    </g>
    <g fill="#22D3EE">
      <circle cx="702" cy="1248" r="20"/>
      <circle cx="1180" cy="840" r="24"/>
      <circle cx="1644" cy="1048" r="20"/>
      <circle cx="2050" cy="692" r="28"/>
      <circle cx="2522" cy="956" r="22"/>
      <circle cx="3060" cy="642" r="18"/>
      <circle cx="1320" cy="1460" r="20" fill="#8B5CF6"/>
      <circle cx="2260" cy="1420" r="22" fill="#F8FAFC"/>
      <circle cx="3120" cy="1352" r="20" fill="#8B5CF6"/>
    </g>
  </g>
  <g class="mono" font-size="28" fill="#F8FAFC" fill-opacity=".72">
    <text x="742" y="1318">AI SYSTEMS</text>
    <text x="1220" y="806">LLM APPS</text>
    <text x="1684" y="1118">EVENTS</text>
    <text x="2090" y="656">AGENTS</text>
    <text x="2562" y="1026">BACKEND</text>
    <text x="3100" y="610">INFRA</text>
    <text x="1360" y="1530">CONTEXT</text>
    <text x="2300" y="1490">INFERENCE</text>
    <text x="3160" y="1422">DISTRIBUTED</text>
  </g>
  <g opacity=".24" fill="none" stroke="#F8FAFC" stroke-width="1">
    <circle cx="1920" cy="1080" r="760"/>
    <circle cx="1920" cy="1080" r="520"/>
    <circle cx="1920" cy="1080" r="280"/>
  </g>
</svg>
