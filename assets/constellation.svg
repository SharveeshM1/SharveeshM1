<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1360" viewBox="0 0 2400 1360" role="img" aria-labelledby="title desc">
  <title id="title">Neural constellation map</title>
  <desc id="desc">A holographic star map connecting AI Systems, LLM Applications, Agents, Context, Inference, Backend, and Distributed Systems.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="72%"><stop offset="0%" stop-color="#151026"/><stop offset="58%" stop-color="#0D1117"/><stop offset="100%" stop-color="#05070B"/></radialGradient>
    <linearGradient id="edge" x1="280" y1="960" x2="2060" y2="320" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#8B5CF6" stop-opacity=".2"/><stop offset="48%" stop-color="#22D3EE" stop-opacity=".78"/><stop offset="100%" stop-color="#8B5CF6" stop-opacity=".2"/></linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="11" result="blur"/><feColorMatrix in="blur" type="matrix" values="0 0 0 0 .133 0 0 0 0 .827 0 0 0 0 .933 0 0 0 .74 0"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>
      .mono{font-family:"Courier New",monospace}
      .display{font-family:"Arial Black","Impact",Arial,sans-serif}
      @keyframes drift{0%,100%{transform:translate3d(0,0,0)}50%{transform:translate3d(12px,-16px,0)}}@keyframes dash{to{stroke-dashoffset:-720}}
      #map{animation:drift 11s ease-in-out infinite}.link{animation:dash 11s linear infinite}
      @media (prefers-reduced-motion:reduce){*{animation:none!important}}
    </style>
  </defs>
  <rect width="2400" height="1360" fill="url(#bg)"/>
  <text x="1200" y="110" text-anchor="middle" class="display" font-size="72" font-weight="700" fill="#F8FAFC">Neural Constellation</text>
  <text x="1200" y="164" text-anchor="middle" class="mono" font-size="24" fill="#22D3EE" letter-spacing="4">STAR MAP OF INTELLIGENT SYSTEMS</text>
  <g opacity=".2" fill="none" stroke="#F8FAFC" stroke-width="1"><circle cx="1200" cy="720" r="470"/><circle cx="1200" cy="720" r="320"/><circle cx="1200" cy="720" r="170"/></g>
  <g id="map" filter="url(#glow)">
    <g fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path class="link" d="M382 820L690 500L1010 630L1230 370L1520 610L1940 450" stroke="url(#edge)" stroke-width="4" stroke-dasharray="30 28"/>
      <path class="link" d="M690 500L850 1010L1230 370L1410 980L1520 610L1990 910" stroke="#8B5CF6" stroke-opacity=".38" stroke-width="3" stroke-dasharray="16 24"/>
      <path d="M382 820L850 1010L1410 980L1990 910" stroke="#F8FAFC" stroke-opacity=".14" stroke-width="2"/>
      <path d="M1010 630L1410 980L1520 610" stroke="#22D3EE" stroke-opacity=".28" stroke-width="3"/>
    </g>
    <g fill="#22D3EE">
      <circle cx="382" cy="820" r="18"/><circle cx="690" cy="500" r="22"/><circle cx="1010" cy="630" r="20"/><circle cx="1230" cy="370" r="27"/><circle cx="1520" cy="610" r="22"/><circle cx="1940" cy="450" r="18"/><circle cx="850" cy="1010" r="20" fill="#8B5CF6"/><circle cx="1410" cy="980" r="22" fill="#F8FAFC"/><circle cx="1990" cy="910" r="20" fill="#8B5CF6"/>
    </g>
  </g>
  <g class="mono" font-size="28" fill="#F8FAFC" fill-opacity=".78">
    <text x="420" y="888">AI SYSTEMS</text>
    <text x="730" y="470">LLM APPLICATIONS</text>
    <text x="1050" y="700">AGENTS</text>
    <text x="1270" y="338">CONTEXT</text>
    <text x="1560" y="682">INFERENCE</text>
    <text x="1980" y="420">BACKEND</text>
    <text x="890" y="1080">DISTRIBUTED SYSTEMS</text>
  </g>
</svg>
