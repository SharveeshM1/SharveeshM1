<svg xmlns="http://www.w3.org/2000/svg" width="3000" height="1000" viewBox="0 0 3000 1000" role="img" aria-labelledby="title desc">
  <title id="title">Contribution Analytics</title>
  <desc id="desc">Improved radar chart and donut chart for contribution analytics, designed as a cinematic visual section grounded in contribution signals.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="48%" r="78%">
      <stop stop-color="#101a35"/>
      <stop offset=".58" stop-color="#070916"/>
      <stop offset="1" stop-color="#02030a"/>
    </radialGradient>
    <linearGradient id="cyan" x1="320" y1="740" x2="2650" y2="210" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee" stop-opacity=".24"/>
      <stop offset=".48" stop-color="#8b5cf6" stop-opacity=".74"/>
      <stop offset="1" stop-color="#f8fafc" stop-opacity=".2"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feDropShadow dx="0" dy="28" stdDeviation="32" flood-color="#000" flood-opacity=".5"/>
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#22d3ee" flood-opacity=".28"/>
    </filter>
    <style>
      .title{font:900 90px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;letter-spacing:0;fill:#f8fafc}
      .mono{font:800 22px "SFMono-Regular",Menlo,Consolas,monospace;letter-spacing:7px;fill:#67e8f9}
      .label{font:800 26px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#edf7ff}
      .sub{font:650 24px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#aebbd0}
      @keyframes dash{to{stroke-dashoffset:-900}}
      .dash{animation:dash 12s linear infinite}
      @media (prefers-reduced-motion:reduce){*{animation:none!important}}
    </style>
  </defs>
  <rect width="3000" height="1000" fill="url(#bg)"/>
  <g opacity=".55">
    <circle cx="260" cy="210" r="4" fill="#fff"/><circle cx="540" cy="760" r="5" fill="#67e8f9"/><circle cx="2750" cy="220" r="4" fill="#fff"/><circle cx="2470" cy="830" r="6" fill="#a78bfa"/>
    <path d="M2240 170L2530 72M390 920L710 780" stroke="#fff" stroke-width="5" stroke-linecap="round" opacity=".35"/>
  </g>
  <text x="130" y="128" class="mono">CONTRIBUTION ANALYTICS</text>
  <text x="126" y="238" class="title">Contribution island restored.</text>
  <text x="132" y="296" class="sub">The 3D island sits above this signal layer; radar and language distribution are redrawn for clearer visual weight.</text>
  <path d="M250 700C720 410 1060 850 1500 560C1980 245 2280 730 2760 440" fill="none" stroke="url(#cyan)" stroke-width="5" stroke-dasharray="34 26" class="dash"/>

  <g transform="translate(865 640)" filter="url(#glow)">
    <polygon points="0,-220 209,-68 129,178 -129,178 -209,-68" fill="none" stroke="#67e8f9" stroke-opacity=".22" stroke-width="3"/>
    <polygon points="0,-165 157,-51 97,134 -97,134 -157,-51" fill="none" stroke="#67e8f9" stroke-opacity=".24" stroke-width="3"/>
    <polygon points="0,-110 105,-34 65,89 -65,89 -105,-34" fill="none" stroke="#67e8f9" stroke-opacity=".28" stroke-width="3"/>
    <polygon points="0,-55 52,-17 32,45 -32,45 -52,-17" fill="none" stroke="#67e8f9" stroke-opacity=".3" stroke-width="3"/>
    <line x1="0" y1="0" x2="0" y2="-220" stroke="#94a3b8" stroke-opacity=".34"/>
    <line x1="0" y1="0" x2="209" y2="-68" stroke="#94a3b8" stroke-opacity=".34"/>
    <line x1="0" y1="0" x2="129" y2="178" stroke="#94a3b8" stroke-opacity=".34"/>
    <line x1="0" y1="0" x2="-129" y2="178" stroke="#94a3b8" stroke-opacity=".34"/>
    <line x1="0" y1="0" x2="-209" y2="-68" stroke="#94a3b8" stroke-opacity=".34"/>
    <polygon points="0,-142 68,-22 42,58 -40,56 -118,-38" fill="#8b5cf6" fill-opacity=".34" stroke="#f8fafc" stroke-width="5"/>
    <circle cx="0" cy="-142" r="8" fill="#fff"/><circle cx="68" cy="-22" r="8" fill="#67e8f9"/><circle cx="42" cy="58" r="8" fill="#a78bfa"/><circle cx="-40" cy="56" r="8" fill="#67e8f9"/><circle cx="-118" cy="-38" r="8" fill="#fff"/>
    <text x="0" y="-262" text-anchor="middle" class="label">Commits</text>
    <text x="266" y="-70" text-anchor="middle" class="label">Issues</text>
    <text x="166" y="228" text-anchor="middle" class="label">Pulls</text>
    <text x="-166" y="228" text-anchor="middle" class="label">Reviews</text>
    <text x="-266" y="-70" text-anchor="middle" class="label">Repos</text>
    <text x="0" y="306" text-anchor="middle" class="sub">Activity radar</text>
  </g>

  <g transform="translate(2030 630)" filter="url(#glow)">
    <circle r="226" fill="none" stroke="#111827" stroke-width="78"/>
    <path d="M0 -226A226 226 0 0 1 204 97" fill="none" stroke="#67e8f9" stroke-width="78" stroke-linecap="round"/>
    <path d="M204 97A226 226 0 0 1 -58 218" fill="none" stroke="#8b5cf6" stroke-width="78" stroke-linecap="round"/>
    <path d="M-58 218A226 226 0 0 1 -190 -122" fill="none" stroke="#f59e0b" stroke-width="78" stroke-linecap="round"/>
    <path d="M-190 -122A226 226 0 0 1 0 -226" fill="none" stroke="#38bdf8" stroke-width="78" stroke-linecap="round"/>
    <circle r="116" fill="#07111f" stroke="#67e8f9" stroke-opacity=".32" stroke-width="2"/>
    <text y="-8" text-anchor="middle" class="label">Language</text>
    <text y="34" text-anchor="middle" class="sub">distribution</text>
    <g transform="translate(360 -100)" text-anchor="start">
      <circle cx="0" cy="0" r="12" fill="#67e8f9"/><text x="28" y="9" class="sub">Java / Spring</text>
      <circle cx="0" cy="58" r="12" fill="#8b5cf6"/><text x="28" y="67" class="sub">Python / AI</text>
      <circle cx="0" cy="116" r="12" fill="#f59e0b"/><text x="28" y="125" class="sub">Dart / Flutter</text>
      <circle cx="0" cy="174" r="12" fill="#38bdf8"/><text x="28" y="183" class="sub">Web / Infra</text>
    </g>
  </g>
</svg>
