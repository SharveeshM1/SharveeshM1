    <path d="M28 224A226 226 0 0 1 -203 -99" fill="none" stroke="#F59E0B" stroke-width="70" stroke-linecap="round"/>
    <path d="M-203 -99A226 226 0 0 1 0 -226" fill="none" stroke="#38BDF8" stroke-width="70" stroke-linecap="round"/>
    <circle r="118" fill="#020617" stroke="#334155" stroke-width="3"/>
    <text y="-8" text-anchor="middle" class="label">Language</text><text y="32" text-anchor="middle" class="small">distribution</text>
    <g transform="translate(370 -120)" class="label" text-anchor="start">
      <circle cx="0" cy="0" r="12" fill="#67E8F9"/><text x="34" y="10">Java / Spring</text>
      <circle cx="0" cy="66" r="12" fill="#8B5CF6"/><text x="34" y="76">Python / AI</text>
      <circle cx="0" cy="132" r="12" fill="#F59E0B"/><text x="34" y="142">Dart / Flutter</text>
      <circle cx="0" cy="198" r="12" fill="#38BDF8"/><text x="34" y="208">Web / Infra</text>
