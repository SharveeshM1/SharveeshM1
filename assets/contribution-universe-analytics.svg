<svg xmlns="http://www.w3.org/2000/svg" width="3400" height="1120" viewBox="0 0 3400 1120" role="img" aria-labelledby="title desc">
  <title id="title">Sharp contribution analytics</title>
  <desc id="desc">A dark premium analytics panel with sharp radar and donut charts designed for readability.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="3400" y2="1120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/><stop offset=".58" stop-color="#030712"/><stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="panel" x1="220" y1="230" x2="3180" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC" stop-opacity=".1"/><stop offset=".55" stop-color="#0F172A" stop-opacity=".5"/><stop offset="1" stop-color="#020617" stop-opacity=".82"/>
    </linearGradient>
    <linearGradient id="edge" x1="220" y1="230" x2="3180" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67E8F9" stop-opacity=".68"/><stop offset=".48" stop-color="#8B5CF6" stop-opacity=".5"/><stop offset="1" stop-color="#2563EB" stop-opacity=".5"/>
    </linearGradient>
    <style>
      .display{font-family:"Clash Display","General Sans","Satoshi",-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-weight:900;letter-spacing:0;fill:#F8FAFC}
      .body{font-family:"General Sans","Satoshi",-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-weight:760;fill:#CBD5E1}
      .mono{font-family:"General Sans","Satoshi","SFMono-Regular",Menlo,Consolas,monospace;font-weight:850;letter-spacing:9px;fill:#67E8F9}
      .label{font-family:"General Sans","Satoshi",-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-size:28px;font-weight:850;fill:#E2E8F0}
      .small{font-family:"General Sans","Satoshi",-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-size:24px;font-weight:760;fill:#94A3B8}
      @keyframes trace{to{stroke-dashoffset:-900}}.trace{animation:trace 18s linear infinite}@media (prefers-reduced-motion:reduce){*{animation:none!important}}
    </style>
  </defs>
  <rect width="3400" height="1120" fill="url(#bg)"/>
  <g opacity=".2" stroke="#334155"><path d="M0 280H3400M0 560H3400M0 840H3400M680 0V1120M1360 0V1120M2040 0V1120M2720 0V1120"/></g>
  <text x="130" y="125" class="mono" font-size="22">CONTRIBUTION ANALYTICS</text>
  <text x="126" y="245" class="display" font-size="88">Readable signal, not decoration.</text>
  <text x="132" y="306" class="body" font-size="30">Sharp activity and language charts built as a premium engineering dashboard layer.</text>
  <rect x="220" y="390" width="2960" height="600" rx="44" fill="url(#panel)" stroke="url(#edge)" stroke-width="2"/>
  <path d="M320 710C760 530 1090 760 1500 620C1900 485 2300 695 3060 520" fill="none" stroke="#67E8F9" stroke-opacity=".26" stroke-width="3" stroke-dasharray="30 28" class="trace"/>
  <g transform="translate(920 705)">
    <polygon points="0,-230 219,-71 135,186 -135,186 -219,-71" fill="none" stroke="#334155" stroke-width="4"/>
    <polygon points="0,-172 164,-53 101,139 -101,139 -164,-53" fill="none" stroke="#334155" stroke-width="3"/>
    <polygon points="0,-115 109,-35 67,93 -67,93 -109,-35" fill="none" stroke="#334155" stroke-width="3"/>
