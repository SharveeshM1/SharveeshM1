    <polygon points="0,-158 86,-28 54,75 -58,80 -126,-41" fill="#8B5CF6" fill-opacity=".34" stroke="#67E8F9" stroke-width="5"/>
    <circle cx="0" cy="-158" r="9" fill="#F8FAFC"/><circle cx="86" cy="-28" r="9" fill="#67E8F9"/><circle cx="54" cy="75" r="9" fill="#8B5CF6"/><circle cx="-58" cy="80" r="9" fill="#67E8F9"/><circle cx="-126" cy="-41" r="9" fill="#F8FAFC"/>
    <text x="0" y="-278" text-anchor="middle" class="label">Commits</text><text x="282" y="-68" text-anchor="middle" class="label">Issues</text><text x="178" y="242" text-anchor="middle" class="label">Pulls</text><text x="-178" y="242" text-anchor="middle" class="label">Reviews</text><text x="-282" y="-68" text-anchor="middle" class="label">Repos</text>
  </g>
