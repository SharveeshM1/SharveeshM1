<svg xmlns="http://www.w3.org/2000/svg" width="3840" height="2160" viewBox="0 0 3840 2160" role="img" aria-labelledby="title desc">
  <title id="title">AI systems command dashboard</title>
  <desc id="desc">A premium dark holographic dashboard for AI systems engineering with glass panels, inference graphs, and purple cyan glow.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="44%" r="74%">
      <stop offset="0%" stop-color="#151026"/>
      <stop offset="54%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#05070B"/>
    </radialGradient>
    <linearGradient id="panel" x1="680" y1="320" x2="3160" y2="1840" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F8FAFC" stop-opacity=".16"/>
      <stop offset="45%" stop-color="#22D3EE" stop-opacity=".035"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity=".12"/>
    </linearGradient>
    <linearGradient id="line" x1="580" y1="1560" x2="3220" y2="620" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity=".1"/>
      <stop offset="50%" stop-color="#22D3EE" stop-opacity=".8"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity=".16"/>
    </linearGradient>
    <pattern id="grid" width="96" height="96" patternUnits="userSpaceOnUse">
      <path d="M96 0H0V96" fill="none" stroke="#22D3EE" stroke-opacity=".04" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 .133 0 0 0 0 .827 0 0 0 0 .933 0 0 0 .72 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="depth" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="42" stdDeviation="44" flood-color="#000000" flood-opacity=".56"/>
      <feDropShadow dx="0" dy="0" stdDeviation="20" flood-color="#8B5CF6" flood-opacity=".22"/>
    </filter>
    <style>
      .mono{font-family:"JetBrains Mono","IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,monospace}
      .display{font-family:"Space Grotesk","Inter","SF Pro Display",system-ui,sans-serif}
      @keyframes dash{to{stroke-dashoffset:-640}}
      @keyframes pulse{0%,100%{opacity:.52}50%{opacity:.96}}
      .flow{animation:dash 9s linear infinite}
      .pulse{animation:pulse 4.8s ease-in-out infinite}
      @media (prefers-reduced-motion:reduce){*{animation:none!important}}
    </style>
  </defs>
  <rect width="3840" height="2160" fill="url(#bg)"/>
  <rect width="3840" height="2160" fill="url(#grid)" opacity=".7"/>
  <g filter="url(#depth)">
    <rect x="440" y="250" width="2960" height="1660" rx="34" fill="#0D1117" fill-opacity=".7" stroke="url(#panel)" stroke-width="3"/>
    <path d="M440 430H3400" stroke="#F8FAFC" stroke-opacity=".08" stroke-width="2"/>
    <circle cx="536" cy="342" r="14" fill="#8B5CF6" fill-opacity=".8"/>
    <circle cx="588" cy="342" r="14" fill="#22D3EE" fill-opacity=".8"/>
    <circle cx="640" cy="342" r="14" fill="#F8FAFC" fill-opacity=".5"/>
  </g>
  <text x="760" y="356" class="mono" font-size="30" fill="#22D3EE" letter-spacing="4">AI OPS / INFERENCE CONTROL PLANE</text>
  <g filter="url(#depth)">
    <rect x="620" y="560" width="840" height="520" rx="22" fill="#111827" fill-opacity=".46" stroke="#22D3EE" stroke-opacity=".18" stroke-width="2"/>
    <rect x="1580" y="560" width="620" height="520" rx="22" fill="#111827" fill-opacity=".42" stroke="#8B5CF6" stroke-opacity=".22" stroke-width="2"/>
    <rect x="2320" y="560" width="900" height="520" rx="22" fill="#111827" fill-opacity=".44" stroke="#22D3EE" stroke-opacity=".18" stroke-width="2"/>
    <rect x="620" y="1200" width="1400" height="480" rx="22" fill="#111827" fill-opacity=".42" stroke="#8B5CF6" stroke-opacity=".18" stroke-width="2"/>
    <rect x="2140" y="1200" width="1080" height="480" rx="22" fill="#111827" fill-opacity=".42" stroke="#22D3EE" stroke-opacity=".18" stroke-width="2"/>
  </g>
  <g class="mono" fill="#F8FAFC">
    <text x="700" y="660" font-size="26" fill-opacity=".64">AGENT LATENCY</text>
    <text x="700" y="744" font-size="72" font-weight="700">37ms</text>
    <text x="1660" y="660" font-size="26" fill-opacity=".64">TOKENS / SEC</text>
    <text x="1660" y="744" font-size="72" font-weight="700">18.4K</text>
    <text x="2400" y="660" font-size="26" fill-opacity=".64">CONTEXT ROUTES</text>
    <text x="2400" y="744" font-size="72" font-weight="700">128</text>
  </g>
  <g fill="none" stroke-linecap="round" filter="url(#glow)">
    <path class="flow" d="M724 972C856 840 1034 1046 1190 878C1272 790 1332 806 1384 760" stroke="url(#line)" stroke-width="5" stroke-dasharray="30 28"/>
    <path d="M700 1482L884 1394L1052 1436L1240 1322L1438 1378L1642 1280L1888 1318" stroke="#22D3EE" stroke-opacity=".72" stroke-width="5"/>
    <path d="M700 1560L884 1512L1052 1540L1240 1478L1438 1492L1642 1430L1888 1460" stroke="#8B5CF6" stroke-opacity=".5" stroke-width="4"/>
    <path class="flow" d="M2400 910H2572C2674 910 2704 842 2794 842H3138" stroke="#22D3EE" stroke-opacity=".55" stroke-width="4" stroke-dasharray="18 24"/>
  </g>
  <g filter="url(#glow)">
    <circle class="pulse" cx="1062" cy="908" r="86" fill="#22D3EE" fill-opacity=".14"/>
    <circle cx="1062" cy="908" r="44" fill="none" stroke="#22D3EE" stroke-opacity=".72" stroke-width="5"/>
    <circle cx="1890" cy="918" r="132" fill="none" stroke="#8B5CF6" stroke-opacity=".3" stroke-width="3" stroke-dasharray="12 18"/>
    <circle cx="1890" cy="918" r="84" fill="none" stroke="#22D3EE" stroke-opacity=".42" stroke-width="4"/>
    <circle cx="1890" cy="918" r="18" fill="#F8FAFC"/>
  </g>
  <g class="mono" font-size="26" fill="#F8FAFC" fill-opacity=".64">
    <text x="2280" y="1310">provider.openai</text>
    <text x="2280" y="1380">provider.anthropic</text>
    <text x="2280" y="1450">cache.vector</text>
    <text x="2280" y="1520">events.kafka</text>
    <text x="2280" y="1590">storage.postgres</text>
  </g>
  <g fill="#22D3EE" filter="url(#glow)">
    <rect x="2780" y="1288" width="320" height="8" rx="4" opacity=".64"/>
    <rect x="2780" y="1358" width="420" height="8" rx="4" opacity=".5"/>
    <rect x="2780" y="1428" width="280" height="8" rx="4" opacity=".7"/>
    <rect x="2780" y="1498" width="360" height="8" rx="4" opacity=".56"/>
    <rect x="2780" y="1568" width="250" height="8" rx="4" opacity=".72"/>
  </g>
</svg>
