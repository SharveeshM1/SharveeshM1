<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="420" viewBox="0 0 2400 420" role="img" aria-labelledby="title desc">
  <title id="title">Featured Systems</title>
  <desc id="desc">Three equal cards for HELIOS, MIDAS, and whole_app.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="78%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#070B14"/>
    </radialGradient>
    <linearGradient id="edge" x1="120" y1="70" x2="2280" y2="350" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE" stop-opacity=".62"/>
      <stop offset=".52" stop-color="#8B5CF6" stop-opacity=".68"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity=".34"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#101827" stop-opacity=".95"/>
      <stop offset="1" stop-color="#090F1D" stop-opacity=".92"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-40%" width="140%" height="180%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity=".48"/>
      <feDropShadow dx="0" dy="0" stdDeviation="9" flood-color="#22D3EE" flood-opacity=".16"/>
    </filter>
    <style>
      .name{font:850 48px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#F8FAFC}
      .desc{font:700 26px "SFMono-Regular","Cascadia Code","Courier New",monospace;fill:#22D3EE}
      .muted{font:600 25px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#94A3B8}
    </style>
  </defs>
  <rect width="2400" height="420" rx="34" fill="url(#bg)"/>
  <g filter="url(#glow)">
    <rect x="100" y="75" width="680" height="270" rx="28" fill="url(#card)" stroke="url(#edge)" stroke-width="3"/>
    <rect x="860" y="75" width="680" height="270" rx="28" fill="url(#card)" stroke="url(#edge)" stroke-width="3"/>
    <rect x="1620" y="75" width="680" height="270" rx="28" fill="url(#card)" stroke="url(#edge)" stroke-width="3"/>
  </g>
  <text x="160" y="170" class="name">HELIOS</text>
  <text x="160" y="225" class="desc">Multi-Agent AI Platform</text>
  <text x="160" y="286" class="muted">github.com/SharveeshM1/HELIOS</text>
  <text x="920" y="170" class="name">MIDAS</text>
  <text x="920" y="225" class="desc">AI-powered Fintech Platform</text>
  <text x="920" y="286" class="muted">github.com/SharveeshM1/Midas</text>
  <text x="1680" y="170" class="name">whole_app</text>
  <text x="1680" y="225" class="desc">Cross-platform commerce platform</text>
  <text x="1680" y="286" class="muted">github.com/SharveeshM1/whole_app</text>
</svg>
