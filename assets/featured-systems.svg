<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="720" viewBox="0 0 2400 720" role="img" aria-labelledby="title desc">
  <title id="title">Featured Systems</title>
  <desc id="desc">Premium glowing cards for HELIOS, MIDAS, and whole_app.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="0%" r="100%">
      <stop stop-color="#101a35"/>
      <stop offset=".58" stop-color="#070b1d"/>
      <stop offset="1" stop-color="#050816"/>
    </radialGradient>
    <linearGradient id="edge" x1="120" y1="180" x2="2280" y2="610" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee" stop-opacity=".42"/>
      <stop offset=".5" stop-color="#8b5cf6" stop-opacity=".46"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity=".22"/>
    </linearGradient>
    <linearGradient id="orb" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#22d3ee" stop-opacity=".8"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity=".58"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-45%" width="140%" height="190%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity=".38"/>
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#22d3ee" flood-opacity=".12"/>
    </filter>
    <style>
      .kicker{font:700 20px "IBM Plex Mono","Geist Mono",ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:6px;fill:#22d3ee}
      .h1{font:760 58px Geist,Satoshi,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#f8fafc}
      .sub{font:560 26px Geist,Satoshi,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#aebbcc}
      .name{font:780 46px Geist,Satoshi,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#f8fafc}
      .role{font:680 25px Geist,Satoshi,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#22d3ee}
      .desc{font:560 23px Geist,Satoshi,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#aebbcc}
      .chip{font:660 19px Geist,Satoshi,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#dbeafe}
      .url{font:650 19px "IBM Plex Mono","Geist Mono",ui-monospace,SFMono-Regular,Menlo,monospace;fill:#7f8ea3}
    </style>
  </defs>
  <rect width="2400" height="720" rx="34" fill="url(#bg)"/>
  <rect x="1" y="1" width="2398" height="718" rx="34" fill="none" stroke="#1f2a44" stroke-opacity=".72"/>
  <text x="130" y="92" class="kicker">FEATURED SYSTEMS</text>
  <text x="130" y="168" class="h1">Three systems, no filler.</text>
  <text x="130" y="218" class="sub">Focused builds across agent infrastructure, fintech backends and cross-platform commerce.</text>

  <g transform="translate(130 292)" filter="url(#soft)">
    <rect width="680" height="310" rx="30" fill="#0a1024" fill-opacity=".86" stroke="url(#edge)" stroke-width="1.5"/>
    <g transform="translate(506 42)">
      <path d="M58 0L116 34V102L58 136L0 102V34Z" fill="#10172a" stroke="url(#orb)" stroke-width="2"/>
      <path d="M58 28L92 48V88L58 108L24 88V48Z" fill="none" stroke="#22d3ee" stroke-opacity=".5" stroke-width="2"/>
    </g>
    <text x="42" y="70" class="name">HELIOS</text>
    <text x="42" y="114" class="role">Multi-Agent AI Platform</text>
    <text x="42" y="164" class="desc">Context engineering, multi-provider inference</text>
    <text x="42" y="202" class="desc">and LangGraph orchestration.</text>
    <g transform="translate(42 234)">
      <rect width="190" height="42" rx="21" fill="#081223" stroke="#22d3ee" stroke-opacity=".32"/><text x="95" y="27" text-anchor="middle" class="chip">Context</text>
      <rect x="212" width="194" height="42" rx="21" fill="#081223" stroke="#8b5cf6" stroke-opacity=".34"/><text x="309" y="27" text-anchor="middle" class="chip">Inference</text>
      <rect x="428" width="170" height="42" rx="21" fill="#081223" stroke="#22d3ee" stroke-opacity=".32"/><text x="513" y="27" text-anchor="middle" class="chip">LangGraph</text>
    </g>
  </g>

  <g transform="translate(860 292)" filter="url(#soft)">
    <rect width="680" height="310" rx="30" fill="#0a1024" fill-opacity=".86" stroke="url(#edge)" stroke-width="1.5"/>
    <g transform="translate(506 42)">
      <path d="M58 0L116 34V102L58 136L0 102V34Z" fill="#10172a" stroke="url(#orb)" stroke-width="2"/>
      <path d="M20 92H96M34 68H82M48 44H68" stroke="#a78bfa" stroke-width="7" stroke-linecap="round"/>
    </g>
    <text x="42" y="70" class="name">MIDAS</text>
    <text x="42" y="114" class="role">AI Fintech Platform</text>
    <text x="42" y="164" class="desc">Spring Boot services with PostgreSQL data</text>
    <text x="42" y="202" class="desc">and Flutter product flows.</text>
    <g transform="translate(42 234)">
      <rect width="188" height="42" rx="21" fill="#081223" stroke="#22d3ee" stroke-opacity=".32"/><text x="94" y="27" text-anchor="middle" class="chip">Spring Boot</text>
      <rect x="210" width="182" height="42" rx="21" fill="#081223" stroke="#8b5cf6" stroke-opacity=".34"/><text x="301" y="27" text-anchor="middle" class="chip">PostgreSQL</text>
      <rect x="414" width="150" height="42" rx="21" fill="#081223" stroke="#22d3ee" stroke-opacity=".32"/><text x="489" y="27" text-anchor="middle" class="chip">Flutter</text>
    </g>
  </g>

  <g transform="translate(1590 292)" filter="url(#soft)">
    <rect width="680" height="310" rx="30" fill="#0a1024" fill-opacity=".86" stroke="url(#edge)" stroke-width="1.5"/>
    <g transform="translate(506 42)">
      <path d="M58 0L116 34V102L58 136L0 102V34Z" fill="#10172a" stroke="url(#orb)" stroke-width="2"/>
      <path d="M34 46H82V94H34Z" fill="none" stroke="#22d3ee" stroke-width="5"/>
      <path d="M46 34H94V82" fill="none" stroke="#8b5cf6" stroke-width="5"/>
    </g>
    <text x="42" y="70" class="name">whole_app</text>
    <text x="42" y="114" class="role">Cross-platform Commerce Platform</text>
    <text x="42" y="164" class="desc">Flutter, Firebase and realtime product</text>
    <text x="42" y="202" class="desc">operations for a commerce surface.</text>
    <g transform="translate(42 234)">
      <rect width="150" height="42" rx="21" fill="#081223" stroke="#22d3ee" stroke-opacity=".32"/><text x="75" y="27" text-anchor="middle" class="chip">Flutter</text>
      <rect x="172" width="162" height="42" rx="21" fill="#081223" stroke="#8b5cf6" stroke-opacity=".34"/><text x="253" y="27" text-anchor="middle" class="chip">Firebase</text>
      <rect x="356" width="176" height="42" rx="21" fill="#081223" stroke="#22d3ee" stroke-opacity=".32"/><text x="444" y="27" text-anchor="middle" class="chip">Realtime</text>
    </g>
  </g>
</svg>
