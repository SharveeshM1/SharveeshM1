<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="650" viewBox="0 0 2400 650" role="img" aria-labelledby="title desc">
  <title id="title">Featured Systems</title>
  <desc id="desc">Three premium cards for HELIOS, MIDAS, and whole_app.</desc>
  <defs>
    <radialGradient id="bg" cx="52%" cy="12%" r="92%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="56%" stop-color="#0A0E15"/>
      <stop offset="100%" stop-color="#05070B"/>
    </radialGradient>
    <linearGradient id="edge" x1="110" y1="110" x2="2290" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE" stop-opacity=".58"/>
      <stop offset=".52" stop-color="#8B5CF6" stop-opacity=".62"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity=".28"/>
    </linearGradient>
    <linearGradient id="rail" x1="130" y1="0" x2="2270" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE" stop-opacity="0"/>
      <stop offset=".5" stop-color="#64748B" stop-opacity=".56"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </linearGradient>
    <filter id="depth" x="-20%" y="-45%" width="140%" height="190%">
      <feDropShadow dx="0" dy="22" stdDeviation="28" flood-color="#000000" flood-opacity=".48"/>
      <feDropShadow dx="0" dy="0" stdDeviation="11" flood-color="#22D3EE" flood-opacity=".12"/>
    </filter>
    <style>
      .kicker{font:700 21px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;letter-spacing:5px;fill:#22D3EE}
      .title{font:800 62px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#F8FAFC}
      .name{font:850 52px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#F8FAFC}
      .role{font:760 26px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#22D3EE}
      .desc{font:610 25px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#AEBBCC}
      .url{font:620 22px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#7F8EA3}
    </style>
  </defs>
  <rect width="2400" height="650" rx="38" fill="url(#bg)"/>
  <text x="130" y="96" class="kicker">FEATURED SYSTEMS</text>
  <text x="130" y="172" class="title">Built around real products.</text>
  <path d="M130 226H2270" stroke="url(#rail)" stroke-width="2"/>
  <g filter="url(#depth)">
    <rect x="130" y="290" width="680" height="240" rx="34" fill="#0B1020" fill-opacity=".82" stroke="url(#edge)" stroke-width="2.5"/>
    <rect x="860" y="290" width="680" height="240" rx="34" fill="#0B1020" fill-opacity=".82" stroke="url(#edge)" stroke-width="2.5"/>
    <rect x="1590" y="290" width="680" height="240" rx="34" fill="#0B1020" fill-opacity=".82" stroke="url(#edge)" stroke-width="2.5"/>
  </g>
  <g>
    <text x="185" y="372" class="name">HELIOS</text>
    <text x="185" y="424" class="role">Multi-Agent AI Platform</text>
    <text x="185" y="475" class="desc">Agent orchestration, context systems,</text>
    <text x="185" y="515" class="url">github.com/SharveeshM1/HELIOS</text>
  </g>
  <g>
    <text x="915" y="372" class="name">MIDAS</text>
    <text x="915" y="424" class="role">AI-powered Fintech Platform</text>
    <text x="915" y="475" class="desc">Spring Boot, Flutter and PostgreSQL.</text>
    <text x="915" y="515" class="url">github.com/SharveeshM1/Midas</text>
  </g>
  <g>
    <text x="1645" y="372" class="name">whole_app</text>
    <text x="1645" y="424" class="role">Cross-platform commerce platform</text>
    <text x="1645" y="475" class="desc">Flutter, Firebase and realtime workflows.</text>
    <text x="1645" y="515" class="url">github.com/SharveeshM1/whole_app</text>
  </g>
</svg>
