<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="260" viewBox="0 0 1600 260" role="img" aria-labelledby="title desc">
  <title id="title">Profile Footer</title>
  <desc id="desc">Finished footer for Sharveesh M with role, current focus, and profile URL.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#070B14"/>
      <stop offset=".56" stop-color="#0B1020"/>
      <stop offset="1" stop-color="#070B14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#22D3EE"/>
      <stop offset=".52" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-40%" width="140%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#22D3EE" flood-opacity=".18"/>
    </filter>
    <style>
      .name{font:900 46px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#F8FAFC}
      .role{font:750 25px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#D8DEE9}
      .meta{font:650 22px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#91A4BC}
      .focus{font:850 23px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#EAF6FF}
      .url{font:750 21px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#22D3EE}
    </style>
  </defs>
  <rect width="1600" height="260" rx="28" fill="url(#bg)"/>
  <rect x="1" y="1" width="1598" height="258" rx="28" fill="none" stroke="#263244" stroke-width="2"/>
  <rect x="80" y="52" width="1440" height="3" rx="1.5" fill="url(#accent)" opacity=".86"/>

  <g filter="url(#glow)">
    <circle cx="128" cy="132" r="34" fill="#0E1A2D" stroke="#22D3EE" stroke-width="2"/>
    <path d="M128 108L149 120V144L128 156L107 144V120Z" fill="none" stroke="#8B5CF6" stroke-width="3"/>
    <circle cx="128" cy="132" r="8" fill="#22D3EE"/>
  </g>

  <text x="190" y="118" class="name">Sharveesh M</text>
  <text x="190" y="160" class="role">AI Systems Engineer · HELIOS</text>
  <text x="190" y="200" class="meta">LLM Applications · Multi-Agent Infrastructure · Backend Systems</text>

  <g transform="translate(1130 104)">
    <rect width="330" height="56" rx="14" fill="#0E1A2D" stroke="url(#accent)" stroke-width="2"/>
    <text x="165" y="36" text-anchor="middle" class="focus">Building intelligent systems</text>
  </g>
  <text x="1460" y="204" text-anchor="end" class="url">github.com/SharveeshM1</text>
</svg>
