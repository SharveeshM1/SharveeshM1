<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="260" viewBox="0 0 2400 260" role="img" aria-labelledby="title desc">
  <title id="title">Signature Footer</title>
  <desc id="desc">A quiet cinematic signature footer for Sharveesh M.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="0%" r="100%">
      <stop stop-color="#101a35"/>
      <stop offset=".62" stop-color="#070b1d"/>
      <stop offset="1" stop-color="#050816"/>
    </radialGradient>
    <linearGradient id="line" x1="130" y1="0" x2="2270" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset=".5" stop-color="#22d3ee" stop-opacity=".58"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
    <style>
      .name{font:800 48px Geist,Satoshi,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#f8fafc}
      .copy{font:560 26px Geist,Satoshi,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#aebbcc}
      .mono{font:700 18px "IBM Plex Mono","Geist Mono",ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:5px;fill:#22d3ee}
    </style>
  </defs>
  <rect width="2400" height="260" rx="34" fill="url(#bg)"/>
  <rect x="1" y="1" width="2398" height="258" rx="34" fill="none" stroke="#1f2a44" stroke-opacity=".72"/>
  <path d="M130 72H2270" stroke="url(#line)" stroke-width="1.5"/>
  <text x="130" y="134" class="mono">BUILDING AT THE EDGE OF PRODUCT AND INTELLIGENCE</text>
  <text x="130" y="194" class="name">Sharveesh M</text>
  <text x="520" y="194" class="copy">LLM applications, multi-agent infrastructure and backend systems.</text>
