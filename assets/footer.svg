<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="360" viewBox="0 0 1800 360" role="img" aria-labelledby="title desc">
  <title id="title">Sharveesh M profile footer</title>
  <desc id="desc">A dark premium footer with holographic wave, glow line, and AI systems signature.</desc>
  <defs><linearGradient id="wave" x1="0" y1="260" x2="1800" y2="160" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#8B5CF6" stop-opacity=".15"/><stop offset="50%" stop-color="#22D3EE" stop-opacity=".48"/><stop offset="100%" stop-color="#8B5CF6" stop-opacity=".18"/></linearGradient><radialGradient id="bg" cx="50%" cy="30%" r="70%"><stop offset="0%" stop-color="#151026"/><stop offset="100%" stop-color="#0D1117"/></radialGradient><filter id="glow" x="-30%" y="-100%" width="160%" height="300%"><feGaussianBlur stdDeviation="10" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <rect width="1800" height="360" fill="url(#bg)"/>
  <path d="M0 220C300 130 520 300 830 210C1160 114 1370 164 1800 96V360H0Z" fill="url(#wave)"/>
  <path d="M90 140H1710" stroke="url(#wave)" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
  <text x="900" y="170" text-anchor="middle" font-family="Space Grotesk, Inter, system-ui, sans-serif" font-size="40" fill="#F8FAFC" font-weight="700">Sharveesh M</text>
  <text x="900" y="220" text-anchor="middle" font-family="JetBrains Mono, IBM Plex Mono, monospace" font-size="22" fill="#22D3EE" letter-spacing="3">AI SYSTEMS ENGINEER</text>
</svg>
