<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="760" viewBox="0 0 2400 760" role="img" aria-labelledby="title desc">
  <title id="title">GitHub Signal Dashboard</title>
  <desc id="desc">A premium dashboard frame for contribution and activity signal.</desc>
  <defs><radialGradient id="bg" cx="50%" cy="45%" r="76%"><stop offset="0%" stop-color="#151026"/><stop offset="60%" stop-color="#0D1117"/><stop offset="100%" stop-color="#05070B"/></radialGradient><linearGradient id="edge" x1="120" y1="120" x2="2280" y2="650" gradientUnits="userSpaceOnUse"><stop stop-color="#8B5CF6" stop-opacity=".16"/><stop offset=".5" stop-color="#22D3EE" stop-opacity=".72"/><stop offset="1" stop-color="#8B5CF6" stop-opacity=".2"/></linearGradient><filter id="glow" x="-30%" y="-80%" width="160%" height="260%"><feGaussianBlur stdDeviation="12" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <rect width="2400" height="760" fill="url(#bg)"/>
  <rect x="100" y="96" width="2200" height="560" rx="34" fill="#111827" fill-opacity=".42" stroke="url(#edge)" stroke-width="3"/>
