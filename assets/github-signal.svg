  <text x="1200" y="246" text-anchor="middle" font-family="Courier New,monospace" font-size="25" font-weight="700" fill="#22D3EE" letter-spacing="6">CONTRIBUTION FIELD / ACTIVITY GRAPH / 3D SIGNAL</text>
  <g filter="url(#glow)" fill="none" stroke-linecap="round">
