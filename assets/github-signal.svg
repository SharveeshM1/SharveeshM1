    <path d="M310 540L610 500L910 522L1210 462L1510 478L1810 420L2090 446" stroke="#8B5CF6" stroke-opacity=".55" stroke-width="5"/>
  </g>
  <g fill="#22D3EE" filter="url(#glow)"><circle cx="610" cy="392" r="13"/><circle cx="1210" cy="330" r="13"/><circle cx="1810" cy="292" r="13"/></g>
