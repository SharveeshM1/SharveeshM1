<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1180" viewBox="0 0 2400 1180" role="img" aria-labelledby="title desc">
  <title id="title">GitHub Signal</title>
  <desc id="desc">Large GitHub analytics visual with 3D contribution island, radar chart, language donut, blue cubes, contribution count and purple cyan wave.</desc>
  <defs>
    <radialGradient id="bg" cx="48%" cy="22%" r="94%">
      <stop offset="0%" stop-color="#0B1020"/>
      <stop offset="54%" stop-color="#050716"/>
      <stop offset="100%" stop-color="#03050C"/>
    </radialGradient>
    <linearGradient id="gridTop" x1="260" y1="430" x2="2100" y2="850" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1D4ED8" stop-opacity=".72"/>
      <stop offset=".72" stop-color="#1E40AF" stop-opacity=".82"/>
      <stop offset="1" stop-color="#2563EB" stop-opacity=".92"/>
    </linearGradient>
    <linearGradient id="edge" x1="80" y1="80" x2="2320" y2="1030" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE" stop-opacity=".5"/>
      <stop offset=".5" stop-color="#8B5CF6" stop-opacity=".58"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity=".22"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="2400" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#312E81"/>
      <stop offset=".5" stop-color="#155E75"/>
      <stop offset="1" stop-color="#312E81"/>
    </linearGradient>
    <filter id="glow" x="-24%" y="-40%" width="148%" height="180%">
      <feDropShadow dx="0" dy="22" stdDeviation="28" flood-color="#000000" flood-opacity=".52"/>
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#22D3EE" flood-opacity=".14"/>
    </filter>
    <filter id="soft" x="-40%" y="-60%" width="180%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="9" flood-color="#22D3EE" flood-opacity=".35"/>
    </filter>
    <style>
      .kicker{font:700 21px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;letter-spacing:5px;fill:#22D3EE}
      .title{font:800 62px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#F8FAFC}
      .label{font:760 29px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#E8EEF8}
      .small{font:650 21px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#B6C2D2}
      .metric{font:850 44px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#FACC15}
      .num{font:850 44px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#F8FAFC}
    </style>
  </defs>
  <rect width="2400" height="1180" rx="38" fill="#05070B"/>
  <rect x="80" y="70" width="2240" height="980" rx="36" fill="url(#bg)" stroke="url(#edge)" stroke-width="2.5" filter="url(#glow)"/>
  <text x="130" y="148" class="kicker">GITHUB SIGNAL</text>
  <text x="130" y="224" class="title">Contribution Field</text>
  <text x="130" y="270" class="small">3D analytics / activity metrics / repository signal</text>
  <text x="2140" y="162" text-anchor="end" class="small">2025-06-15 / 2026-06-17</text>

  <g transform="translate(210 335)" filter="url(#glow)">
    <path d="M0 145L540 -145L1830 530L1290 820Z" fill="url(#gridTop)" stroke="#1E3A8A" stroke-width="4"/>
    <path d="M0 145L0 178L1290 853L1290 820Z" fill="#102A63"/>
    <path d="M1290 820L1830 530L1830 562L1290 853Z" fill="#143E8E"/>
    <g stroke="#081A3D" stroke-width="3" opacity=".75">
      <path d="M70 107L1360 782M140 70L1430 745M210 32L1500 707M280 -6L1570 670M350 -44L1640 632M420 -82L1710 595M490 -120L1780 557"/>
      <path d="M145 220L685 -70M245 272L785 -18M345 324L885 34M445 376L985 86M545 428L1085 138M645 480L1185 190M745 532L1285 242M845 584L1385 294M945 636L1485 346M1045 688L1585 398M1145 740L1685 450"/>
    </g>
  </g>

  <g transform="translate(1690 690)" filter="url(#soft)">
    <g>
      <path d="M0 68L48 42L96 68L48 94Z" fill="#38BDF8"/>
      <path d="M0 68V146L48 176V94Z" fill="#0891B2"/>
      <path d="M96 68V146L48 176V94Z" fill="#0EA5E9"/>
    </g>
    <g transform="translate(86 -88)">
      <path d="M0 68L48 42L96 68L48 94Z" fill="#38BDF8"/>
      <path d="M0 68V206L48 236V94Z" fill="#0891B2"/>
      <path d="M96 68V206L48 236V94Z" fill="#0EA5E9"/>
    </g>
    <g transform="translate(172 -190)">
      <path d="M0 68L48 42L96 68L48 94Z" fill="#38BDF8"/>
      <path d="M0 68V286L48 316V94Z" fill="#0891B2"/>
      <path d="M96 68V286L48 316V94Z" fill="#0EA5E9"/>
    </g>
    <g transform="translate(330 -38)">
      <path d="M0 68L48 42L96 68L48 94Z" fill="#2563EB"/>
      <path d="M0 68V154L48 184V94Z" fill="#1D4ED8"/>
      <path d="M96 68V154L48 184V94Z" fill="#3B82F6"/>
    </g>
    <g transform="translate(460 -90)">
      <path d="M0 68L48 42L96 68L48 94Z" fill="#38BDF8"/>
      <path d="M0 68V176L48 206V94Z" fill="#0891B2"/>
      <path d="M96 68V176L48 206V94Z" fill="#0EA5E9"/>
    </g>
  </g>

  <g transform="translate(1690 318)">
    <text x="210" y="0" text-anchor="middle" class="label">Commit</text>
    <g transform="translate(210 160)" fill="none" stroke-linejoin="round">
      <polygon points="0,-150 143,-46 88,121 -88,121 -143,-46" stroke="#64748B" stroke-dasharray="7 9" stroke-width="2"/>
      <polygon points="0,-112 107,-34 66,90 -66,90 -107,-34" stroke="#64748B" stroke-dasharray="7 9" stroke-width="2"/>
      <polygon points="0,-76 72,-23 45,61 -45,61 -72,-23" stroke="#64748B" stroke-dasharray="7 9" stroke-width="2"/>
      <polygon points="0,-41 39,-13 24,33 -24,33 -39,-13" stroke="#64748B" stroke-dasharray="7 9" stroke-width="2"/>
      <polygon points="0,-58 42,-14 24,56 -46,58 -66,-18" fill="#FACC15" fill-opacity=".54" stroke="#FACC15" stroke-width="5" filter="url(#soft)"/>
    </g>
    <text x="395" y="154" text-anchor="middle" class="label">Issue</text>
    <text x="340" y="390" text-anchor="middle" class="label">PullReq</text>
    <text x="80" y="390" text-anchor="middle" class="label">Review</text>
    <text x="25" y="154" text-anchor="middle" class="label">Repo</text>
  </g>

  <g transform="translate(275 690)">
    <g fill="none" stroke-width="56">
      <circle cx="160" cy="135" r="136" stroke="#525252"/>
      <path d="M160 -1A136 136 0 0 1 288 181" stroke="#525252"/>
    </g>
    <circle cx="160" cy="135" r="74" fill="#050716"/>
    <rect x="340" y="116" width="26" height="26" fill="#525252"/>
    <text x="382" y="139" class="label">other</text>
  </g>

  <g transform="translate(1120 980)">
    <text x="0" y="0" text-anchor="end" class="metric">118</text>
    <text x="18" y="0" class="label">contributions</text>
    <text x="410" y="0" class="num">0</text>
    <path d="M350 -34L361 -10L388 -7L368 10L374 36L350 22L326 36L332 10L312 -7L339 -10Z" fill="none" stroke="#E8EEF8" stroke-width="5" stroke-linejoin="round"/>
    <text x="620" y="0" class="num">0</text>
    <path d="M555 -34C555 -15 535 -15 535 2C535 20 555 20 555 39M555 -34C555 -15 575 -15 575 2C575 20 555 20 555 39" fill="none" stroke="#E8EEF8" stroke-width="5" stroke-linecap="round"/>
    <circle cx="535" cy="2" r="7" fill="#E8EEF8"/>
    <circle cx="575" cy="2" r="7" fill="#E8EEF8"/>
    <circle cx="555" cy="-34" r="7" fill="#E8EEF8"/>
    <circle cx="555" cy="39" r="7" fill="#E8EEF8"/>
  </g>

  <path d="M110 1086C420 1140 640 1070 955 1095C1255 1119 1436 1188 1740 1142C1972 1108 2168 1130 2320 1160V1180H80V1102Z" fill="url(#wave)" opacity=".9"/>
</svg>
