<svg xmlns="http://www.w3.org/2000/svg" width="3600" height="1760" viewBox="0 0 3600 1760" role="img" aria-labelledby="title desc">
  <title id="title">Sharveesh M engineering mission control dashboard</title>
  <desc id="desc">A cinematic product-grade engineering control plane for AI systems, backend infrastructure, retrieval, orchestration, and deployment.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="3600" y2="1760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0a0507"/><stop offset=".5" stop-color="#0a0507"/><stop offset="1" stop-color="#0a0507"/>
    </linearGradient>
    <radialGradient id="keyLight" cx="68%" cy="32%" r="58%">
      <stop stop-color="#b794f6" stop-opacity=".22"/><stop offset=".28" stop-color="#10b981" stop-opacity=".10"/><stop offset=".64" stop-color="#b794f6" stop-opacity=".09"/><stop offset="1" stop-color="#0a0507" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#f8f5ff" stop-opacity=".13"/><stop offset=".5" stop-color="#1a0f2e" stop-opacity=".72"/><stop offset="1" stop-color="#0a0507" stop-opacity=".9"/>
    </linearGradient>
    <linearGradient id="edge" x1="360" y1="220" x2="3240" y2="1450" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f8f5ff" stop-opacity=".65"/><stop offset=".24" stop-color="#b794f6"/><stop offset=".56" stop-color="#10b981"/><stop offset=".82" stop-color="#b794f6"/><stop offset="1" stop-color="#ec4899" stop-opacity=".72"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="3600" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#b794f6" stop-opacity="0"/><stop offset=".5" stop-color="#b794f6" stop-opacity=".32"/><stop offset="1" stop-color="#b794f6" stop-opacity="0"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="34" stdDeviation="34" flood-color="#000000" flood-opacity=".42"/>
    </filter>
    <style>
      .display{font-family:"Inter","Segoe UI",-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-weight:900;letter-spacing:0;fill:#f8f5ff}
      .body{font-family:"Inter","Segoe UI",-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-weight:720;letter-spacing:0;fill:#e5e7eb}
      .mono{font-family:"Fira Code","SFMono-Regular",Menlo,Consolas,monospace;font-weight:800;letter-spacing:8px;fill:#b794f6}
      .metric{font-family:"SF Pro Display","General Sans","Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-weight:900;fill:#f8f5ff}
      .small{font-family:"Fira Code","SFMono-Regular",Menlo,Consolas,monospace;font-weight:760;letter-spacing:4px;fill:#c4b5d8}
      @keyframes drift{0%,100%{transform:translateY(0)}50%{transform:translateY(-18px)}}
      @keyframes pulse{0%,100%{opacity:.42}50%{opacity:1}}
      @keyframes scanMove{0%{transform:translateX(-1200px)}100%{transform:translateX(1200px)}}
      @keyframes dash{to{stroke-dashoffset:-900}}
      .float{animation:drift 9s ease-in-out infinite}.pulse{animation:pulse 3s ease-in-out infinite}.scan{animation:scanMove 5.5s ease-in-out infinite}.dash{animation:dash 18s linear infinite}
      @media (prefers-reduced-motion:reduce){*{animation:none!important}}
    </style>
  </defs>
  <rect width="3600" height="1760" fill="url(#bg)"/>
  <rect width="3600" height="1760" fill="url(#keyLight)"/>
  <g opacity=".18" stroke="#2b1a42" stroke-width="1">
    <path d="M0 220H3600M0 440H3600M0 660H3600M0 880H3600M0 1100H3600M0 1320H3600M0 1540H3600"/>
    <path d="M300 0V1760M600 0V1760M900 0V1760M1200 0V1760M1500 0V1760M1800 0V1760M2100 0V1760M2400 0V1760M2700 0V1760M3000 0V1760M3300 0V1760"/>
  </g>
  <g opacity=".72">
    <circle cx="220" cy="260" r="3" fill="#f8f5ff"/><circle cx="650" cy="128" r="2" fill="#b794f6"/><circle cx="3190" cy="260" r="3" fill="#10b981"/><circle cx="3080" cy="1370" r="4" fill="#b794f6"/><circle cx="1420" cy="1510" r="3" fill="#ec4899"/>
  </g>

  <g transform="translate(158 126)">
    <text x="0" y="0" class="mono" font-size="26">ENGINEERING CONTROL PLANE</text>
    <text x="0" y="232" class="display" font-size="190">Sharveesh M</text>
    <text x="6" y="326" class="body" font-size="44">AI systems, context engineering, backend infrastructure, and orchestration.</text>
    <text x="6" y="398" class="body" font-size="44">Observable, modular, deployable, and tuned for signal.</text>
  </g>

  <g transform="translate(168 672)" filter="url(#softShadow)">
    <rect x="0" y="0" width="1120" height="590" rx="32" fill="url(#panel)" stroke="url(#edge)" stroke-width="2"/>
    <rect x="32" y="32" width="1056" height="86" rx="20" fill="#0a0507" stroke="#2b1a42" stroke-width="1.5"/>
    <circle cx="76" cy="75" r="10" fill="#10b981"/><circle cx="110" cy="75" r="10" fill="#ec4899"/><circle cx="144" cy="75" r="10" fill="#b794f6"/>
    <text x="190" y="84" class="small" font-size="20">LIVE SYSTEM BRIEF</text>
    <g transform="translate(48 166)">
      <text x="0" y="0" class="small" font-size="22">PRIMARY MISSION</text>
      <text x="0" y="78" class="display" font-size="72">Ship reliable AI products</text>
      <text x="0" y="146" class="body" font-size="34">Agent workflows, retrieval pipelines, APIs, interfaces, and deployment loops.</text>
    </g>
    <g transform="translate(52 402)">
      <g><text x="0" y="0" class="metric" font-size="68">03</text><text x="0" y="44" class="small" font-size="18">PROJECTS</text></g>
      <g transform="translate(220 0)"><text x="0" y="0" class="metric" font-size="68">24/7</text><text x="0" y="44" class="small" font-size="18">OBSERVABILITY</text></g>
      <g transform="translate(490 0)"><text x="0" y="0" class="metric" font-size="68">API</text><text x="0" y="44" class="small" font-size="18">FIRST SURFACES</text></g>
      <g transform="translate(740 0)"><text x="0" y="0" class="metric" font-size="68">RAG</text><text x="0" y="44" class="small" font-size="18">KNOWLEDGE CORE</text></g>
    </g>
  </g>

  <g transform="translate(2000 560) scale(.62)" opacity=".9">
    <ellipse cx="750" cy="560" rx="760" ry="310" fill="#0a0507" opacity=".32"/>
    <g fill="none" stroke-width="4">
      <ellipse cx="750" cy="560" rx="730" ry="252" stroke="#b794f6" stroke-opacity=".24"/>
      <ellipse cx="750" cy="560" rx="530" ry="185" stroke="#10b981" stroke-opacity=".34" stroke-dasharray="50 42" class="dash" transform="rotate(-14 750 560)"/>
      <ellipse cx="750" cy="560" rx="900" ry="330" stroke="#c4b5d8" stroke-opacity=".17" transform="rotate(12 750 560)"/>
    </g>
    <g transform="translate(750 560)">
      <path d="M0 -300L260 -150V150L0 300L-260 150V-150Z" fill="#0a0507" stroke="url(#edge)" stroke-width="7"/>
      <path d="M0 -300L260 -150V150L0 300L-260 150V-150Z" fill="#f8f5ff" opacity=".055"/>
      <path d="M0 -300V0M260 -150L0 0L-260 -150M260 150L0 0L-260 150M0 300V0" stroke="#b794f6" stroke-opacity=".34" stroke-width="4"/>
      <path d="M-122 -76L-24 -172L92 -110L158 -188M-24 -172L18 -6L142 54M18 -6L-96 126L22 200" fill="none" stroke="#f8f5ff" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M-128 74C-20 -28 118 -44 226 20" fill="none" stroke="#10b981" stroke-width="10" stroke-linecap="round"/>
      <circle cx="-24" cy="-172" r="24" fill="#f8f5ff"/><circle cx="158" cy="-188" r="18" fill="#b794f6"/><circle cx="142" cy="54" r="22" fill="#10b981"/><circle cx="-96" cy="126" r="20" fill="#ec4899"/><circle cx="22" cy="200" r="17" fill="#b794f6"/>
    </g>
  </g>

  <g transform="translate(2720 252)">
    <rect x="0" y="0" width="708" height="390" rx="30" fill="url(#panel)" stroke="#2b1a42" stroke-width="1.5"/>
    <text x="42" y="62" class="small" font-size="19">RECRUITER EXPLORATION MODE</text>
    <text x="42" y="140" class="display" font-size="72">Signal first.</text>
    <text x="42" y="202" class="body" font-size="31">Navigate systems, projects, metrics, and architectural decisions as one product surface.</text>
    <path d="M42 292H638" stroke="#1a0f2e" stroke-width="18" stroke-linecap="round"/>
    <path d="M42 292H520" stroke="#10b981" stroke-width="18" stroke-linecap="round"/>
    <text x="42" y="348" class="small" font-size="18">READABILITY</text><text x="488" y="348" class="small" font-size="18" fill="#10b981">HIGH CONFIDENCE</text>
  </g>

  <g transform="translate(2580 780)" filter="url(#softShadow)">
    <rect x="0" y="0" width="840" height="570" rx="30" fill="url(#panel)" stroke="#2b1a42" stroke-width="1.5"/>
    <text x="44" y="62" class="small" font-size="19">TELEMETRY STACK</text>
    <g transform="translate(56 116)" stroke-width="2">
      <path d="M0 320C120 190 230 330 350 204C482 66 590 174 718 56" fill="none" stroke="#b794f6" stroke-width="8" stroke-linecap="round"/>
      <path d="M0 386C112 318 226 400 352 288C496 158 604 320 718 210" fill="none" stroke="#10b981" stroke-width="7" stroke-linecap="round"/>
      <path d="M0 252C130 278 240 92 360 140C492 190 612 90 718 118" fill="none" stroke="#ec4899" stroke-width="5" stroke-opacity=".82" stroke-linecap="round"/>
      <g stroke="#2b1a42" opacity=".8"><path d="M0 72H718M0 176H718M0 280H718M0 384H718"/><path d="M0 36V420M180 36V420M360 36V420M540 36V420M718 36V420"/></g>
      <g class="pulse"><circle cx="350" cy="204" r="12" fill="#b794f6"/><circle cx="590" cy="174" r="10" fill="#10b981"/><circle cx="612" cy="90" r="9" fill="#ec4899"/></g>
    </g>
    <text x="52" y="526" class="small" font-size="18">LATENCY</text><text x="252" y="526" class="small" font-size="18">RETRIEVAL</text><text x="492" y="526" class="small" font-size="18">DEPLOYMENT</text>
  </g>

  <rect x="-900" y="1500" width="1200" height="6" fill="url(#scan)" class="scan" opacity=".7"/>
</svg>
