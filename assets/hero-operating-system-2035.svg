<svg xmlns="http://www.w3.org/2000/svg" width="3600" height="1680" viewBox="0 0 3600 1680" role="img" aria-labelledby="title desc">
  <title id="title">Sharveesh M premium AI systems engineering identity</title>
  <desc id="desc">A sharp premium AI systems engineering hero with glass surfaces, restrained orbital geometry, and readable technical typography.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="3600" y2="1680" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset=".48" stop-color="#030712"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <radialGradient id="light" cx="62%" cy="44%" r="52%">
      <stop stop-color="#1d4ed8" stop-opacity=".42"/>
      <stop offset=".32" stop-color="#7c3aed" stop-opacity=".18"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="edge" x1="1120" y1="320" x2="2860" y2="1320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67E8F9"/>
      <stop offset=".42" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="glass" x1="1060" y1="360" x2="2780" y2="1300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC" stop-opacity=".12"/>
      <stop offset=".48" stop-color="#38BDF8" stop-opacity=".05"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity=".1"/>
    </linearGradient>
    <style>
      .display{font-family:"Clash Display","General Sans","Satoshi",-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-weight:900;letter-spacing:0;fill:#F8FAFC}
      .body{font-family:"General Sans","Satoshi",-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-weight:720;fill:#CBD5E1}
      .mono{font-family:"General Sans","Satoshi","SFMono-Regular",Menlo,Consolas,monospace;font-weight:800;letter-spacing:11px;fill:#67E8F9}
      @keyframes orbit{to{stroke-dashoffset:-1200}}
      @keyframes rotateSlow{to{transform:rotate(360deg)}}
      .dash{animation:orbit 18s linear infinite}
      #rings{animation:rotateSlow 90s linear infinite;transform-origin:2200px 870px}
      @media (prefers-reduced-motion:reduce){*{animation:none!important}}
    </style>
  </defs>
  <rect width="3600" height="1680" fill="url(#bg)"/>
  <rect width="3600" height="1680" fill="url(#light)"/>
  <g opacity=".34" stroke="#334155" stroke-width="1">
    <path d="M0 420H3600M0 840H3600M0 1260H3600M600 0V1680M1200 0V1680M1800 0V1680M2400 0V1680M3000 0V1680"/>
  </g>
  <g opacity=".7">
    <circle cx="250" cy="250" r="3" fill="#94A3B8"/><circle cx="720" cy="180" r="2" fill="#67E8F9"/><circle cx="3160" cy="250" r="3" fill="#CBD5E1"/><circle cx="3020" cy="1260" r="4" fill="#8B5CF6"/><circle cx="1460" cy="1360" r="3" fill="#67E8F9"/>
    <path d="M2780 196L3240 70M320 1390L770 1210" stroke="#64748B" stroke-width="6" stroke-linecap="round" opacity=".48"/>
  </g>
  <g id="rings" fill="none">
    <ellipse cx="2200" cy="870" rx="1120" ry="340" stroke="#38BDF8" stroke-opacity=".34" stroke-width="3"/>
    <ellipse cx="2200" cy="870" rx="810" ry="245" stroke="#8B5CF6" stroke-opacity=".44" stroke-width="5" stroke-dasharray="58 48" class="dash" transform="rotate(-15 2200 870)"/>
    <ellipse cx="2200" cy="870" rx="1340" ry="420" stroke="#64748B" stroke-opacity=".34" stroke-width="2" transform="rotate(14 2200 870)"/>
  </g>
  <g transform="translate(2200 870)">
    <path d="M0 -420L364 -210V210L0 420L-364 210V-210Z" fill="#020617" stroke="url(#edge)" stroke-width="8"/>
    <path d="M0 -420L364 -210V210L0 420L-364 210V-210Z" fill="url(#glass)"/>
    <path d="M0 -420V0M364 -210L0 0L-364 -210M0 420V0M364 210L0 0L-364 210" stroke="#67E8F9" stroke-opacity=".45" stroke-width="4" fill="none"/>
    <path d="M-198 -116L-42 -262L146 -168L252 -276M-42 -262L14 -12L214 82M14 -12L-156 196L34 292" fill="none" stroke="#F8FAFC" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M-170 104C-10 -36 166 -56 316 10" fill="none" stroke="#8B5CF6" stroke-width="12" stroke-linecap="round"/>
    <circle cx="-42" cy="-262" r="30" fill="#F8FAFC"/><circle cx="252" cy="-276" r="22" fill="#67E8F9"/><circle cx="214" cy="82" r="26" fill="#8B5CF6"/><circle cx="-156" cy="196" r="24" fill="#67E8F9"/><circle cx="34" cy="292" r="20" fill="#F8FAFC"/>
  </g>
  <g>
    <text x="180" y="410" class="mono" font-size="34">AI SYSTEMS ENGINEER</text>
    <text x="170" y="675" class="display" font-size="184">Sharveesh M</text>
    <text x="180" y="805" class="body" font-size="50">Multi-Agent Systems / Context Engineering</text>
    <text x="180" y="880" class="body" font-size="50">Inference Infrastructure / Backend Systems</text>
  </g>
  <g class="body" font-size="31" fill="#E2E8F0">
    <text x="180" y="1180">Building production AI systems with orchestration, retrieval, tools, APIs, and deployment discipline.</text>
    <path d="M180 1238H930" stroke="#67E8F9" stroke-width="3"/>
  </g>
  <g class="mono" font-size="22" fill="#94A3B8">
    <text x="2840" y="1265">CONTEXT</text>
    <text x="2840" y="1325">AGENTS</text>
    <text x="2840" y="1385">RETRIEVAL</text>
    <text x="2840" y="1445">INFRASTRUCTURE</text>
  </g>
</svg>
