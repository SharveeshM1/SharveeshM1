<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="900" viewBox="0 0 2400 900" role="img" aria-labelledby="title desc">
  <title id="title">Icon Constellation</title>
  <desc id="desc">A giant constellation of SVG technology icons around an AI systems core.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="48%" r="80%">
      <stop stop-color="#101a35"/>
      <stop offset=".55" stop-color="#070b1d"/>
      <stop offset="1" stop-color="#050816"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop stop-color="#f8fafc" stop-opacity=".9"/>
      <stop offset=".16" stop-color="#22d3ee" stop-opacity=".62"/>
      <stop offset=".54" stop-color="#8b5cf6" stop-opacity=".2"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="stroke" x1="440" y1="710" x2="1960" y2="190" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee" stop-opacity=".18"/>
      <stop offset=".5" stop-color="#67e8f9" stop-opacity=".68"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity=".24"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feDropShadow dx="0" dy="22" stdDeviation="26" flood-color="#000" flood-opacity=".38"/>
      <feDropShadow dx="0" dy="0" stdDeviation="15" flood-color="#22d3ee" flood-opacity=".22"/>
    </filter>
    <style>
      .mono{font:700 20px "IBM Plex Mono","Geist Mono",ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:6px;fill:#22d3ee}
      .title{font:800 72px Geist,Satoshi,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#f8fafc}
      .copy{font:560 30px Geist,Satoshi,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#aebbcc}
      .iconText{font:800 25px Geist,Satoshi,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#eef6ff}
      .label{font:700 17px "IBM Plex Mono","Geist Mono",ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:2px;fill:#aebbcc}
      .line{stroke:url(#stroke);stroke-width:1.4;stroke-opacity:.58}
      @keyframes rotate{to{transform:rotate(360deg)}}
      .rings{animation:rotate 42s linear infinite;transform-origin:1200px 494px}
      @media (prefers-reduced-motion:reduce){*{animation:none!important}}
    </style>
  </defs>
  <rect width="2400" height="900" rx="34" fill="url(#bg)"/>
  <rect x="1" y="1" width="2398" height="898" rx="34" fill="none" stroke="#1f2a44" stroke-opacity=".72"/>
  <text x="130" y="104" class="mono">TECH CONSTELLATION</text>
  <text x="130" y="194" class="title">Icons as an ecosystem.</text>
  <text x="130" y="250" class="copy">AI models, backend systems and product clients orbit the same engineering core.</text>
  <g class="rings" opacity=".75">
    <ellipse cx="1200" cy="494" rx="720" ry="210" fill="none" stroke="url(#stroke)" stroke-width="2" stroke-dasharray="18 24"/>
    <ellipse cx="1200" cy="494" rx="560" ry="164" fill="none" stroke="#8b5cf6" stroke-opacity=".28" stroke-width="2" transform="rotate(18 1200 494)"/>
    <ellipse cx="1200" cy="494" rx="880" ry="270" fill="none" stroke="#22d3ee" stroke-opacity=".16" stroke-width="1.5" transform="rotate(-13 1200 494)"/>
  </g>
  <g opacity=".38">
    <path class="line" d="M1200 494L718 380M1200 494L920 662M1200 494L1514 334M1200 494L1718 602M1200 494L484 604M1200 494L1906 338"/>
  </g>
  <circle cx="1200" cy="494" r="210" fill="url(#core)"/>
  <g filter="url(#glow)">
    <path d="M1200 326L1346 410V578L1200 662L1054 578V410Z" fill="#0a1024" fill-opacity=".78" stroke="#22d3ee" stroke-opacity=".48" stroke-width="2"/>
    <path d="M1134 486L1190 430L1270 454L1322 402M1190 430L1222 530L1308 562M1222 530L1148 598L1220 632" fill="none" stroke="#67e8f9" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g filter="url(#glow)" text-anchor="middle">
    <g transform="translate(522 338)"><circle r="58" fill="#0a1024" stroke="#22d3ee" stroke-opacity=".45"/><path d="M-18 -20H18L34 0L18 20H-18L-34 0Z" fill="none" stroke="#67e8f9" stroke-width="5"/><text y="94" class="label">OPENAI</text></g>
    <g transform="translate(742 590)"><circle r="58" fill="#0a1024" stroke="#8b5cf6" stroke-opacity=".45"/><path d="M0 -32L34 28H-34Z" fill="none" stroke="#a78bfa" stroke-width="6"/><text y="94" class="label">GEMINI</text></g>
    <g transform="translate(986 304)"><circle r="58" fill="#0a1024" stroke="#22d3ee" stroke-opacity=".45"/><text y="10" text-anchor="middle" class="iconText">LC</text><text y="94" class="label">LANGCHAIN</text></g>
    <g transform="translate(1430 306)"><circle r="58" fill="#0a1024" stroke="#8b5cf6" stroke-opacity=".45"/><path d="M-26 -4H26M-8 -28L26 -4L-8 20" fill="none" stroke="#a78bfa" stroke-width="6" stroke-linecap="round"/><text y="94" class="label">LANGGRAPH</text></g>
    <g transform="translate(1682 590)"><circle r="58" fill="#0a1024" stroke="#22d3ee" stroke-opacity=".45"/><path d="M-30 24V-10L0 -28L30 -10V24Z" fill="none" stroke="#67e8f9" stroke-width="5"/><text y="94" class="label">SPRING</text></g>
    <g transform="translate(1904 348)"><circle r="58" fill="#0a1024" stroke="#8b5cf6" stroke-opacity=".45"/><path d="M-28 -18H28V24H-28Z M-12 -34H12V-18" fill="none" stroke="#a78bfa" stroke-width="5"/><text y="94" class="label">FLUTTER</text></g>
    <g transform="translate(472 638)"><circle r="58" fill="#0a1024" stroke="#22d3ee" stroke-opacity=".45"/><ellipse rx="30" ry="12" cy="-20" fill="none" stroke="#67e8f9" stroke-width="5"/><path d="M-30 -20V20C-30 36 30 36 30 20V-20" fill="none" stroke="#67e8f9" stroke-width="5"/><text y="94" class="label">POSTGRES</text></g>
    <g transform="translate(1986 646)"><circle r="58" fill="#0a1024" stroke="#8b5cf6" stroke-opacity=".45"/><path d="M-28 18H28M-20 18V-18M0 18V-30M20 18V-6" stroke="#a78bfa" stroke-width="7" stroke-linecap="round"/><text y="94" class="label">DOCKER</text></g>
  </g>
  <text x="1200" y="784" text-anchor="middle" class="copy">RAG / tool calling / structured outputs / distributed systems / event-driven APIs / realtime clients</text>
</svg>
