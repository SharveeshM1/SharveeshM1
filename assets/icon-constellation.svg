<svg xmlns="http://www.w3.org/2000/svg" width="3200" height="1700" viewBox="0 0 3200 1700" role="img" aria-labelledby="title desc">
  <title id="title">Expanded Tech Constellation</title>
  <desc id="desc">OpenAI, Gemini, Claude, LangChain, LangGraph, embeddings, vector databases, backend, frontend and infrastructure icons orbit around HELIOS.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="78%">
      <stop stop-color="#141228"/>
      <stop offset=".48" stop-color="#080b18"/>
      <stop offset="1" stop-color="#02030a"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="44%" r="58%">
      <stop stop-color="#ffffff"/>
      <stop offset=".1" stop-color="#67e8f9"/>
      <stop offset=".34" stop-color="#8b5cf6"/>
      <stop offset=".72" stop-color="#312e81" stop-opacity=".26"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="orbit" x1="300" y1="1300" x2="2900" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee" stop-opacity=".16"/>
      <stop offset=".32" stop-color="#8b5cf6" stop-opacity=".72"/>
      <stop offset=".62" stop-color="#f8fafc" stop-opacity=".42"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity=".2"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000" flood-opacity=".46"/>
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#22d3ee" flood-opacity=".24"/>
    </filter>
    <filter id="coreGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feDropShadow dx="0" dy="40" stdDeviation="48" flood-color="#000" flood-opacity=".58"/>
      <feDropShadow dx="0" dy="0" stdDeviation="34" flood-color="#8b5cf6" flood-opacity=".52"/>
      <feDropShadow dx="0" dy="0" stdDeviation="24" flood-color="#22d3ee" flood-opacity=".42"/>
    </filter>
    <style>
      .title{font:900 112px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;letter-spacing:0;fill:#f8fafc}
      .mono{font:800 24px "SFMono-Regular",Menlo,Consolas,monospace;letter-spacing:8px;fill:#67e8f9}
      .label{font:800 25px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#edf7ff}
      .group{font:800 20px "SFMono-Regular",Menlo,Consolas,monospace;letter-spacing:5px;fill:#94a3b8}
      .tiny{font:900 28px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#f8fafc}
      @keyframes spin{to{transform:rotate(360deg)}}
      @keyframes spinBack{to{transform:rotate(-360deg)}}
      @keyframes dash{to{stroke-dashoffset:-1200}}
      .rings{animation:spin 58s linear infinite;transform-origin:1600px 910px}
      .ringsBack{animation:spinBack 72s linear infinite;transform-origin:1600px 910px}
      .dash{animation:dash 10s linear infinite}
      @media (prefers-reduced-motion:reduce){*{animation:none!important}}
    </style>
  </defs>
  <rect width="3200" height="1700" fill="url(#bg)"/>
  <g opacity=".62">
    <circle cx="250" cy="240" r="4" fill="#fff"/><circle cx="470" cy="510" r="3" fill="#67e8f9"/><circle cx="3030" cy="290" r="5" fill="#fff"/><circle cx="2810" cy="1180" r="6" fill="#a78bfa"/><circle cx="1260" cy="1480" r="4" fill="#fff"/><circle cx="2040" cy="230" r="4" fill="#67e8f9"/>
    <path d="M2320 250L2610 152M370 1370L710 1256M2570 1450L2920 1300" stroke="#fff" stroke-width="5" stroke-linecap="round" opacity=".35"/>
  </g>
  <text x="155" y="150" class="mono">TECH CONSTELLATION</text>
  <text x="150" y="284" class="title">Everything orbits HELIOS.</text>
  <text x="156" y="352" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="34" font-weight="650" fill="#b8c4d6">AI, knowledge systems, APIs, clients and infrastructure pulled into one engineering gravity well.</text>

  <g class="rings">
    <ellipse cx="1600" cy="910" rx="1050" ry="335" fill="none" stroke="url(#orbit)" stroke-width="4" stroke-dasharray="34 28" class="dash"/>
    <ellipse cx="1600" cy="910" rx="820" ry="250" fill="none" stroke="#8b5cf6" stroke-opacity=".28" stroke-width="3" transform="rotate(19 1600 910)"/>
    <ellipse cx="1600" cy="910" rx="1250" ry="410" fill="none" stroke="#67e8f9" stroke-opacity=".17" stroke-width="3" transform="rotate(-14 1600 910)"/>
  </g>
  <g class="ringsBack">
    <ellipse cx="1600" cy="910" rx="610" ry="186" fill="none" stroke="#f8fafc" stroke-opacity=".16" stroke-width="2" transform="rotate(42 1600 910)"/>
    <ellipse cx="1600" cy="910" rx="1430" ry="465" fill="none" stroke="#a78bfa" stroke-opacity=".13" stroke-width="2" transform="rotate(7 1600 910)"/>
  </g>

  <circle cx="1600" cy="910" r="360" fill="url(#core)"/>
  <g filter="url(#coreGlow)">
    <path d="M1600 574L1890 742V1078L1600 1246L1310 1078V742Z" fill="#070b19" stroke="#67e8f9" stroke-opacity=".58" stroke-width="6"/>
    <path d="M1440 850L1588 716L1752 790L1842 680M1588 716L1640 946L1805 1036M1640 946L1478 1110L1620 1192" fill="none" stroke="#f8fafc" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="1600" y="1380" text-anchor="middle" class="group" fill="#67e8f9">CENTRAL HELIOS SYMBOL</text>
  </g>

  <g filter="url(#glow)" text-anchor="middle">
    <g transform="translate(520 520)"><circle r="62" fill="#0a1024" stroke="#67e8f9" stroke-width="3"/><path d="M-23 -24H23L38 0L23 24H-23L-38 0Z" fill="none" stroke="#67e8f9" stroke-width="6"/><text y="104" class="label">OpenAI</text><text y="136" class="group">AI</text></g>
    <g transform="translate(790 462)"><circle r="62" fill="#0a1024" stroke="#a78bfa" stroke-width="3"/><path d="M0 -36L12 -10L40 0L12 10L0 38L-12 10L-40 0L-12 -10Z" fill="#a78bfa"/><text y="104" class="label">Gemini</text><text y="136" class="group">AI</text></g>
    <g transform="translate(1110 454)"><circle r="62" fill="#0a1024" stroke="#f0abfc" stroke-width="3"/><text y="12" class="tiny">C</text><path d="M-30 20C-10 42 18 42 36 16" fill="none" stroke="#f0abfc" stroke-width="6" stroke-linecap="round"/><text y="104" class="label">Claude</text><text y="136" class="group">AI</text></g>
    <g transform="translate(2030 454)"><circle r="62" fill="#0a1024" stroke="#67e8f9" stroke-width="3"/><text y="11" class="tiny">LC</text><text y="104" class="label">LangChain</text><text y="136" class="group">AI</text></g>
    <g transform="translate(2390 500)"><circle r="62" fill="#0a1024" stroke="#a78bfa" stroke-width="3"/><path d="M-34 -8H18M-8 -34L34 -8L-8 20M-28 28H28" fill="none" stroke="#a78bfa" stroke-width="6" stroke-linecap="round"/><text y="104" class="label">LangGraph</text><text y="136" class="group">AI</text></g>

    <g transform="translate(350 840)"><circle r="58" fill="#0a1024" stroke="#38bdf8" stroke-width="3"/><path d="M-36 0C-14 -30 16 -30 36 0C14 30 -16 30 -36 0Z" fill="none" stroke="#38bdf8" stroke-width="6"/><circle r="8" fill="#fff"/><text y="100" class="label">Embeddings</text><text y="132" class="group">KNOWLEDGE</text></g>
    <g transform="translate(600 1130)"><circle r="58" fill="#0a1024" stroke="#67e8f9" stroke-width="3"/><path d="M-30 -22L0 -38L30 -22V22L0 38L-30 22Z" fill="none" stroke="#67e8f9" stroke-width="6"/><text y="100" class="label">Pinecone</text><text y="132" class="group">KNOWLEDGE</text></g>
    <g transform="translate(940 1270)"><circle r="58" fill="#0a1024" stroke="#a78bfa" stroke-width="3"/><circle r="30" fill="none" stroke="#a78bfa" stroke-width="6"/><path d="M-18 -18L18 18M18 -18L-18 18" stroke="#a78bfa" stroke-width="5"/><text y="100" class="label">Qdrant</text><text y="132" class="group">KNOWLEDGE</text></g>
    <g transform="translate(1320 1360)"><circle r="58" fill="#0a1024" stroke="#38bdf8" stroke-width="3"/><text y="11" class="tiny">F</text><path d="M-26 -24H30M-26 0H18M-26 24H8" stroke="#38bdf8" stroke-width="6" stroke-linecap="round"/><text y="100" class="label">FAISS</text><text y="132" class="group">KNOWLEDGE</text></g>

    <g transform="translate(2800 760)"><circle r="58" fill="#0a1024" stroke="#f87171" stroke-width="3"/><text y="12" class="tiny">J</text><path d="M-24 28C-4 42 26 38 34 18" fill="none" stroke="#f87171" stroke-width="5" stroke-linecap="round"/><text y="100" class="label">Java</text><text y="132" class="group">BACKEND</text></g>
    <g transform="translate(2600 1060)"><circle r="58" fill="#0a1024" stroke="#facc15" stroke-width="3"/><text y="11" class="tiny">Py</text><text y="100" class="label">Python</text><text y="132" class="group">BACKEND</text></g>
    <g transform="translate(2290 1275)"><circle r="58" fill="#0a1024" stroke="#86efac" stroke-width="3"/><path d="M-34 26V-8L0 -30L34 -8V26Z" fill="none" stroke="#86efac" stroke-width="6"/><text y="100" class="label">Spring Boot</text><text y="132" class="group">BACKEND</text></g>
    <g transform="translate(1920 1390)"><circle r="58" fill="#0a1024" stroke="#38bdf8" stroke-width="3"/><path d="M0 -36L36 28H-36Z" fill="none" stroke="#38bdf8" stroke-width="6"/><text y="100" class="label">FastAPI</text><text y="132" class="group">BACKEND</text></g>
    <g transform="translate(2680 510)"><circle r="58" fill="#0a1024" stroke="#93c5fd" stroke-width="3"/><ellipse rx="32" ry="12" cy="-22" fill="none" stroke="#93c5fd" stroke-width="6"/><path d="M-32 -22V22C-32 38 32 38 32 22V-22" fill="none" stroke="#93c5fd" stroke-width="6"/><text y="100" class="label">PostgreSQL</text><text y="132" class="group">BACKEND</text></g>
    <g transform="translate(2860 1130)"><circle r="58" fill="#0a1024" stroke="#fb7185" stroke-width="3"/><path d="M-30 -8L0 -24L30 -8L0 8Z M-30 8L0 24L30 8" fill="none" stroke="#fb7185" stroke-width="6"/><text y="100" class="label">Redis</text><text y="132" class="group">BACKEND</text></g>

    <g transform="translate(540 1430)"><circle r="54" fill="#0a1024" stroke="#38bdf8" stroke-width="3"/><path d="M-28 16L0 -34L30 16L0 34Z" fill="none" stroke="#38bdf8" stroke-width="6"/><text y="96" class="label">Flutter</text><text y="128" class="group">FRONTEND</text></g>
    <g transform="translate(1600 430)"><circle r="54" fill="#0a1024" stroke="#fff" stroke-width="3"/><text y="11" class="tiny">N</text><text y="96" class="label">Next.js</text><text y="128" class="group">FRONTEND</text></g>
    <g transform="translate(2480 1450)"><circle r="54" fill="#0a1024" stroke="#f59e0b" stroke-width="3"/><path d="M-26 30L-12 -34L10 -10L28 30Z" fill="none" stroke="#f59e0b" stroke-width="6"/><text y="96" class="label">Firebase</text><text y="128" class="group">FRONTEND</text></g>

    <g transform="translate(310 1210)"><circle r="54" fill="#0a1024" stroke="#60a5fa" stroke-width="3"/><path d="M-30 18H30M-22 18V-16M0 18V-32M22 18V-4" stroke="#60a5fa" stroke-width="7" stroke-linecap="round"/><text y="96" class="label">Docker</text><text y="128" class="group">INFRA</text></g>
    <g transform="translate(3010 930)"><circle r="54" fill="#0a1024" stroke="#f8fafc" stroke-width="3"/><text y="11" class="tiny">Lx</text><text y="96" class="label">Linux</text><text y="128" class="group">INFRA</text></g>
    <g transform="translate(3000 1320)"><circle r="54" fill="#0a1024" stroke="#a78bfa" stroke-width="3"/><path d="M-30 -6H-8L4 18H30M4 18L18 -12" fill="none" stroke="#a78bfa" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/><text y="96" class="label">GitHub Actions</text><text y="128" class="group">INFRA</text></g>
  </g>
</svg>
