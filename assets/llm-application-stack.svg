<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="520" viewBox="0 0 2400 520" role="img" aria-labelledby="title desc">
  <title id="title">LLM Application Stack</title>
  <desc id="desc">Premium dashboard with six equal cards for frontend, backend, AI, knowledge, inference, and infrastructure layers.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="78%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#070B14"/>
    </radialGradient>
    <linearGradient id="edge" x1="120" y1="80" x2="2280" y2="450" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE" stop-opacity=".62"/>
      <stop offset=".5" stop-color="#8B5CF6" stop-opacity=".68"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity=".32"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#101827" stop-opacity=".95"/>
      <stop offset="1" stop-color="#090F1D" stop-opacity=".92"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-35%" width="140%" height="170%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity=".48"/>
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#22D3EE" flood-opacity=".16"/>
    </filter>
    <style>
      .h{font:800 42px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#F8FAFC}
      .t{font:700 26px "SFMono-Regular","Cascadia Code","Courier New",monospace;fill:#22D3EE}
      .item{font:650 27px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#CBD5E1}
    </style>
  </defs>
  <rect width="2400" height="520" rx="34" fill="url(#bg)"/>
  <rect x="70" y="54" width="2260" height="412" rx="32" fill="#0B1020" fill-opacity=".78" stroke="url(#edge)" stroke-width="3" filter="url(#glow)"/>
  <g filter="url(#glow)">
    <rect x="130" y="105" width="680" height="130" rx="24" fill="url(#card)" stroke="#22D3EE" stroke-opacity=".42" stroke-width="2"/>
    <rect x="860" y="105" width="680" height="130" rx="24" fill="url(#card)" stroke="#8B5CF6" stroke-opacity=".45" stroke-width="2"/>
    <rect x="1590" y="105" width="680" height="130" rx="24" fill="url(#card)" stroke="#22D3EE" stroke-opacity=".42" stroke-width="2"/>
    <rect x="130" y="285" width="680" height="130" rx="24" fill="url(#card)" stroke="#8B5CF6" stroke-opacity=".45" stroke-width="2"/>
    <rect x="860" y="285" width="680" height="130" rx="24" fill="url(#card)" stroke="#22D3EE" stroke-opacity=".42" stroke-width="2"/>
    <rect x="1590" y="285" width="680" height="130" rx="24" fill="url(#card)" stroke="#8B5CF6" stroke-opacity=".45" stroke-width="2"/>
  </g>
  <text x="170" y="157" class="t">Frontend</text>
  <text x="170" y="203" class="item">Flutter · Next.js</text>
  <text x="900" y="157" class="t">Backend</text>
  <text x="900" y="203" class="item">Spring Boot · FastAPI</text>
  <text x="1630" y="157" class="t">AI Layer</text>
  <text x="1630" y="203" class="item">LangChain · LangGraph</text>
  <text x="170" y="337" class="t">Knowledge Layer</text>
  <text x="170" y="383" class="item">Embeddings · Pinecone · Qdrant · FAISS</text>
  <text x="900" y="337" class="t">Inference Layer</text>
  <text x="900" y="383" class="item">OpenAI · Gemini · Claude</text>
  <text x="1630" y="337" class="t">Infrastructure</text>
  <text x="1630" y="383" class="item">Docker · GitHub Actions · Linux</text>
</svg>
