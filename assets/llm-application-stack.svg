<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="620" viewBox="0 0 2400 620" role="img" aria-labelledby="title desc">
  <title id="title">LLM Application Stack</title>
  <desc id="desc">Six-card application stack for LLM products.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="0%" r="105%">
      <stop stop-color="#101a35"/>
      <stop offset=".6" stop-color="#070b1d"/>
      <stop offset="1" stop-color="#050816"/>
    </radialGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#22d3ee" stop-opacity=".42"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity=".42"/>
    </linearGradient>
    <filter id="card" x="-20%" y="-40%" width="140%" height="180%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#000000" flood-opacity=".38"/>
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#8b5cf6" flood-opacity=".12"/>
    </filter>
    <style>
      .mono{font:700 20px "IBM Plex Mono","Geist Mono",ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:5px;fill:#22d3ee}
      .h{font:760 58px Geist,Satoshi,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#f8fafc}
      .name{font:760 33px Geist,Satoshi,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#f8fafc}
      .body{font:610 25px Geist,Satoshi,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#aebbcc}
    </style>
  </defs>
  <rect width="2400" height="620" rx="34" fill="url(#bg)"/>
  <rect x="1" y="1" width="2398" height="618" rx="34" fill="none" stroke="#1f2a44" stroke-opacity=".72"/>
  <text x="130" y="92" class="mono">LLM APPLICATION STACK</text>
  <text x="130" y="170" class="h">From interface to inference.</text>
  <g transform="translate(130 250)" filter="url(#card)">
    <g><rect width="320" height="220" rx="28" fill="#0a1024" fill-opacity=".86" stroke="url(#edge)" stroke-width="1.4"/><text x="36" y="64" class="name">Frontend</text><text x="36" y="120" class="body">Flutter</text><text x="36" y="162" class="body">NextJS</text></g>
    <g transform="translate(364)"><rect width="320" height="220" rx="28" fill="#0a1024" fill-opacity=".86" stroke="url(#edge)" stroke-width="1.4"/><text x="36" y="64" class="name">Backend</text><text x="36" y="120" class="body">Spring Boot</text><text x="36" y="162" class="body">FastAPI</text></g>
    <g transform="translate(728)"><rect width="320" height="220" rx="28" fill="#0a1024" fill-opacity=".86" stroke="url(#edge)" stroke-width="1.4"/><text x="36" y="64" class="name">AI Layer</text><text x="36" y="120" class="body">LangChain</text><text x="36" y="162" class="body">LangGraph</text></g>
    <g transform="translate(1092)"><rect width="320" height="220" rx="28" fill="#0a1024" fill-opacity=".86" stroke="url(#edge)" stroke-width="1.4"/><text x="36" y="64" class="name">Knowledge</text><text x="36" y="120" class="body">Embeddings</text><text x="36" y="162" class="body">Pinecone / Qdrant</text><text x="36" y="202" class="body">FAISS</text></g>
    <g transform="translate(1456)"><rect width="320" height="220" rx="28" fill="#0a1024" fill-opacity=".86" stroke="url(#edge)" stroke-width="1.4"/><text x="36" y="64" class="name">Inference</text><text x="36" y="120" class="body">OpenAI</text><text x="36" y="162" class="body">Gemini / Claude</text></g>
    <g transform="translate(1820)"><rect width="320" height="220" rx="28" fill="#0a1024" fill-opacity=".86" stroke="url(#edge)" stroke-width="1.4"/><text x="36" y="64" class="name">Infra</text><text x="36" y="120" class="body">Docker</text><text x="36" y="162" class="body">GitHub Actions</text><text x="36" y="202" class="body">Linux</text></g>
  </g>
</svg>
