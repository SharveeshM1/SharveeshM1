<svg xmlns="http://www.w3.org/2000/svg" width="3840" height="2160" viewBox="0 0 3840 2160" role="img" aria-labelledby="title desc">
  <title id="title">Purple cyan AI matrix rain</title>
  <desc id="desc">A restrained black matrix rain field using premium cyan and purple glyph columns with holographic depth.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="72%">
      <stop offset="0%" stop-color="#121827"/>
      <stop offset="56%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#04060A"/>
    </radialGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="2160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0"/>
      <stop offset="18%" stop-color="#22D3EE" stop-opacity=".46"/>
      <stop offset="68%" stop-color="#8B5CF6" stop-opacity=".34"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 .133 0 0 0 0 .827 0 0 0 0 .933 0 0 0 .68 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .mono{font-family:"Courier New",monospace}
      @keyframes fallA{0%{transform:translateY(-260px);opacity:.18}40%{opacity:.9}100%{transform:translateY(360px);opacity:.16}}
      @keyframes fallB{0%{transform:translateY(-160px);opacity:.12}50%{opacity:.66}100%{transform:translateY(280px);opacity:.12}}
      .a{animation:fallA 7s linear infinite}
      .b{animation:fallB 10s linear infinite}
      @media (prefers-reduced-motion:reduce){*{animation:none!important}}
    </style>
  </defs>
  <rect width="3840" height="2160" fill="url(#bg)"/>
  <rect width="3840" height="2160" fill="url(#fade)" opacity=".22"/>
  <g class="mono" font-size="32" fill="#22D3EE" filter="url(#glow)" opacity=".72">
    <text class="a" x="300" y="260">01 context embed route infer cache stream</text>
    <text class="b" x="620" y="620" fill="#8B5CF6">agent graph memory vector event shard</text>
    <text class="a" x="980" y="420">1011 0010 1110 0101 1001 0110</text>
    <text class="b" x="1280" y="900">planner retriever verifier executor</text>
    <text class="a" x="1620" y="320">latency tokens throughput fallback</text>
    <text class="b" x="1940" y="720" fill="#F8FAFC" fill-opacity=".7">distributed systems ai runtime</text>
    <text class="a" x="2300" y="540">0100 1111 0011 1000 1010 1101</text>
    <text class="b" x="2620" y="840" fill="#8B5CF6">spring postgres flutter firebase</text>
    <text class="a" x="3020" y="300">HELIOS MIDAS whole_app</text>
    <text class="b" x="3340" y="760">observe evaluate compact deploy</text>
  </g>
  <g class="mono" font-size="26" fill="#F8FAFC" fill-opacity=".18">
    <text x="420" y="1280">model.context.protocol</text>
    <text x="900" y="1540">semantic.cache.hit_rate=0.94</text>
    <text x="1460" y="1360">router.policy=adaptive</text>
    <text x="2140" y="1580">inference.mesh.online</text>
    <text x="2780" y="1320">event_bus.stream.active</text>
  </g>
  <g opacity=".38" fill="none" stroke-linecap="round" filter="url(#glow)">
    <path d="M0 640H3840" stroke="#22D3EE" stroke-opacity=".16" stroke-width="2"/>
    <path d="M0 1120H3840" stroke="#8B5CF6" stroke-opacity=".14" stroke-width="2"/>
    <path d="M0 1600H3840" stroke="#22D3EE" stroke-opacity=".1" stroke-width="2"/>
  </g>
</svg>
