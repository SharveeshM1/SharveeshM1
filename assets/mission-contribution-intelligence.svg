<svg xmlns="http://www.w3.org/2000/svg" width="3600" height="1760" viewBox="0 0 3600 1760" role="img" aria-labelledby="title desc">
  <title id="title">Contribution intelligence dashboard</title>
  <desc id="desc">A meaningful engineering contribution visualization showing cadence, surface area, shipping rhythm, review loops, and system focus.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="3600" y2="1760" gradientUnits="userSpaceOnUse"><stop stop-color="#030712"/><stop offset=".6" stop-color="#050814"/><stop offset="1" stop-color="#0A0F1C"/></linearGradient>
    <radialGradient id="light" cx="62%" cy="30%" r="62%"><stop stop-color="#34D399" stop-opacity=".12"/><stop offset=".32" stop-color="#67E8F9" stop-opacity=".1"/><stop offset=".75" stop-color="#030712" stop-opacity="0"/></radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#F8FAFC" stop-opacity=".12"/><stop offset=".52" stop-color="#111827" stop-opacity=".76"/><stop offset="1" stop-color="#020617" stop-opacity=".92"/></linearGradient>
    <linearGradient id="edge" x1="180" y1="260" x2="3320" y2="1440" gradientUnits="userSpaceOnUse"><stop stop-color="#67E8F9"/><stop offset=".44" stop-color="#34D399"/><stop offset=".76" stop-color="#F59E0B"/><stop offset="1" stop-color="#A78BFA"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="28" stdDeviation="32" flood-color="#000" flood-opacity=".38"/></filter>
    <style>
      .display{font-family:"Clash Display","SF Pro Display","General Sans","Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-weight:900;letter-spacing:0;fill:#F8FAFC}
      .body{font-family:"SF Pro Text","General Sans","Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-weight:720;fill:#CBD5E1}
      .mono{font-family:"SFMono-Regular","General Sans",Menlo,Consolas,monospace;font-weight:820;letter-spacing:7px;fill:#67E8F9}
      .cap{font-family:"SFMono-Regular","General Sans",Menlo,Consolas,monospace;font-weight:760;letter-spacing:4px;fill:#94A3B8}
      .metric{font-family:"SF Pro Display","General Sans","Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-weight:900;fill:#F8FAFC}
      @keyframes dash{to{stroke-dashoffset:-1000}}.dash{animation:dash 20s linear infinite}
      @media (prefers-reduced-motion:reduce){*{animation:none!important}}
    </style>
  </defs>
  <rect width="3600" height="1760" fill="url(#bg)"/>
  <rect width="3600" height="1760" fill="url(#light)"/>
  <text x="150" y="150" class="mono" font-size="25">CONTRIBUTION INTELLIGENCE</text>
  <text x="146" y="304" class="display" font-size="116">Shipping rhythm, decoded.</text>
  <text x="152" y="378" class="body" font-size="36">A contribution view focused on cadence, focus areas, review loops, and operational consistency.</text>

  <g transform="translate(144 520)" filter="url(#shadow)">
    <rect width="2100" height="920" rx="34" fill="url(#panel)" stroke="url(#edge)" stroke-width="2"/>
    <text x="56" y="74" class="cap" font-size="18">CADENCE HEATFIELD</text>
    <g transform="translate(70 142)">
      <g opacity=".28" stroke="#334155"><path d="M0 0H1900M0 120H1900M0 240H1900M0 360H1900M0 480H1900M0 600H1900"/><path d="M0 0V650M190 0V650M380 0V650M570 0V650M760 0V650M950 0V650M1140 0V650M1330 0V650M1520 0V650M1710 0V650M1900 0V650"/></g>
      <path d="M0 512C126 420 218 494 340 382C478 254 612 330 742 230C902 106 1050 168 1188 272C1368 408 1490 278 1638 172C1742 96 1844 126 1900 76" fill="none" stroke="#67E8F9" stroke-width="9" stroke-linecap="round"/>
      <path d="M0 610C138 570 250 590 382 500C520 406 640 462 786 382C920 308 1046 350 1188 438C1356 542 1490 486 1648 370C1758 288 1848 310 1900 248" fill="none" stroke="#34D399" stroke-width="7" stroke-linecap="round"/>
      <path d="M0 344C138 382 226 272 352 300C504 334 608 180 746 210C904 244 1028 120 1188 142C1364 166 1508 96 1664 134C1760 158 1846 110 1900 132" fill="none" stroke="#F59E0B" stroke-width="5" stroke-linecap="round"/>
      <path d="M0 512C126 420 218 494 340 382C478 254 612 330 742 230C902 106 1050 168 1188 272C1368 408 1490 278 1638 172C1742 96 1844 126 1900 76" fill="none" stroke="#67E8F9" stroke-opacity=".28" stroke-width="24" stroke-linecap="round"/>
      <g fill="#F8FAFC"><circle cx="742" cy="230" r="12"/><circle cx="1188" cy="272" r="12"/><circle cx="1638" cy="172" r="12"/></g>
      <text x="0" y="724" class="cap" font-size="18">DESIGN</text><text x="350" y="724" class="cap" font-size="18">BUILD</text><text x="740" y="724" class="cap" font-size="18">INTEGRATE</text><text x="1200" y="724" class="cap" font-size="18">VERIFY</text><text x="1630" y="724" class="cap" font-size="18">SHIP</text>
    </g>
  </g>

  <g transform="translate(2368 520)" filter="url(#shadow)">
    <rect width="1088" height="920" rx="34" fill="url(#panel)" stroke="#334155" stroke-width="1.5"/>
    <text x="54" y="74" class="cap" font-size="18">ENGINEERING DISTRIBUTION</text>
    <g transform="translate(544 406)">
      <circle r="238" fill="#020617" stroke="#1F2937" stroke-width="32"/>
      <circle r="238" fill="none" stroke="#67E8F9" stroke-width="32" stroke-dasharray="560 940" transform="rotate(-90)"/>
      <circle r="178" fill="none" stroke="#34D399" stroke-width="24" stroke-dasharray="430 690" transform="rotate(38)"/>
      <circle r="126" fill="none" stroke="#F59E0B" stroke-width="18" stroke-dasharray="260 520" transform="rotate(140)"/>
      <circle r="76" fill="none" stroke="#A78BFA" stroke-width="14" stroke-dasharray="170 310" transform="rotate(220)"/>
      <text y="-10" text-anchor="middle" class="metric" font-size="82">OPS</text>
      <text y="42" text-anchor="middle" class="cap" font-size="18">CENTERED</text>
    </g>
    <g transform="translate(80 730)">
      <circle cx="0" cy="0" r="9" fill="#67E8F9"/><text x="30" y="8" class="body" font-size="28">AI orchestration and tools</text>
      <circle cx="0" cy="58" r="9" fill="#34D399"/><text x="30" y="66" class="body" font-size="28">Backend and data systems</text>
      <circle cx="0" cy="116" r="9" fill="#F59E0B"/><text x="30" y="124" class="body" font-size="28">Frontend product surfaces</text>
      <circle cx="0" cy="174" r="9" fill="#A78BFA"/><text x="30" y="182" class="body" font-size="28">Infra and release loops</text>
    </g>
  </g>

  <g transform="translate(144 1506)">
    <text x="0" y="0" class="cap" font-size="20">RECRUITER TAKEAWAY</text>
    <text x="360" y="0" class="body" font-size="30">The signal is not volume. It is repeatable shipping across architecture, product surface, infrastructure, and evaluation.</text>
  </g>
</svg>
