<svg xmlns="http://www.w3.org/2000/svg" width="3600" height="1040" viewBox="0 0 3600 1040" role="img" aria-labelledby="title desc">
  <title id="title">Education and certifications carousel</title>
  <desc id="desc">Education card for VIT-AP University and premium certification badges.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="3600" y2="1040" gradientUnits="userSpaceOnUse"><stop stop-color="#0a0507"/><stop offset=".55" stop-color="#120c18"/><stop offset="1" stop-color="#0a0507"/></linearGradient>
    <linearGradient id="heading" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#b794f6"/><stop offset=".5" stop-color="#ec4899"/><stop offset="1" stop-color="#06b6d4"/></linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#120c18" stop-opacity=".56"/><stop offset="1" stop-color="#1a0f2e" stop-opacity=".42"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="28" stdDeviation="34" flood-color="#b794f6" flood-opacity=".10"/><feDropShadow dx="0" dy="52" stdDeviation="60" flood-color="#ec4899" flood-opacity=".05"/></filter>
    <style>
      .h{font-family:"Inter","Segoe UI",Arial,sans-serif;font-weight:700;letter-spacing:-.5px;fill:url(#heading)}
      .b{font-family:"Inter","Segoe UI",system-ui,sans-serif;font-weight:400;letter-spacing:.3px;fill:#e5e7eb}
      .m{font-family:"Fira Code","SFMono-Regular",monospace;font-weight:400;letter-spacing:.5px;fill:#c4b5d8}
      .title{font-family:"Inter","Segoe UI",Arial,sans-serif;font-weight:700;fill:#f8f5ff}
      .card{fill:url(#glass);stroke:rgba(183,148,246,.15);stroke-width:2;filter:url(#shadow)}
      @keyframes pulse{0%,100%{opacity:.45}50%{opacity:1}}.pulse{animation:pulse 2.4s ease-in-out infinite}
      @media (prefers-reduced-motion:reduce){*{animation:none!important}}
    </style>
  </defs>
  <rect width="3600" height="1040" fill="url(#bg)"/>
  <text x="150" y="142" class="m" font-size="24">EDUCATION / CERTIFICATIONS</text>
  <text x="148" y="260" class="h" font-size="84">Credentials as signal, not decoration.</text>
  <text x="152" y="326" class="b" font-size="32">Academic foundation and applied AI/software engineering validation.</text>
  <g transform="translate(150 430)">
    <rect class="card" width="1240" height="430" rx="24"/>
    <text x="54" y="86" class="m" font-size="20">VIT-AP UNIVERSITY</text>
    <text x="54" y="158" class="title" font-size="58">B.Tech - Computer Science Engineering</text>
    <text x="54" y="222" class="b" font-size="32">Expected Graduation: May 2027</text>
    <circle cx="54" cy="312" r="15" fill="#10b981" class="pulse"/><text x="88" y="323" class="m" font-size="20" fill="#10b981">ACTIVE</text>
    <path d="M54 370H1110" stroke="#b794f6" stroke-width="8" stroke-linecap="round" opacity=".55"/>
    <path d="M54 370H760" stroke="#ec4899" stroke-width="8" stroke-linecap="round"/>
  </g>
  <g transform="translate(1530 430)">
    <rect class="card" width="390" height="190" rx="20"/><text x="36" y="70" class="title" font-size="31">JP Morgan Chase</text><text x="36" y="122" class="b" font-size="24">Software Engineering</text>
    <rect class="card" x="430" width="390" height="190" rx="20"/><text x="466" y="70" class="title" font-size="31">Oracle</text><text x="466" y="122" class="b" font-size="24">AI Foundations Associate</text>
    <rect class="card" x="860" width="390" height="190" rx="20"/><text x="896" y="70" class="title" font-size="31">Qualcomm</text><text x="896" y="122" class="b" font-size="24">AI Foundations</text>
    <rect class="card" y="240" width="390" height="190" rx="20"/><text x="36" y="310" class="title" font-size="31">Vista Equity</text><text x="36" y="362" class="b" font-size="24">AI in Action</text>
    <rect class="card" x="430" y="240" width="390" height="190" rx="20"/><text x="466" y="310" class="title" font-size="31">Kaggle</text><text x="466" y="362" class="b" font-size="24">Intro to Machine Learning</text>
    <rect class="card" x="860" y="240" width="390" height="190" rx="20"/><text x="896" y="310" class="title" font-size="31">Applied Track</text><text x="896" y="362" class="b" font-size="24">AI + Software Systems</text>
  </g>
</svg>
