<svg xmlns="http://www.w3.org/2000/svg" width="3600" height="1420" viewBox="0 0 3600 1420" role="img" aria-labelledby="title desc">
  <title id="title">Experience control room</title>
  <desc id="desc">Resume-driven 3D timeline cards for Itomata AI Engineer Intern and Rablo Flutter Developer Intern.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="3600" y2="1420" gradientUnits="userSpaceOnUse"><stop stop-color="#0a0507"/><stop offset=".55" stop-color="#120c18"/><stop offset="1" stop-color="#0a0507"/></linearGradient>
    <radialGradient id="light" cx="58%" cy="20%" r="64%"><stop stop-color="#b794f6" stop-opacity=".18"/><stop offset=".42" stop-color="#ec4899" stop-opacity=".10"/><stop offset="1" stop-color="#0a0507" stop-opacity="0"/></radialGradient>
    <linearGradient id="heading" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#b794f6"/><stop offset=".5" stop-color="#ec4899"/><stop offset="1" stop-color="#06b6d4"/></linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#120c18" stop-opacity=".55"/><stop offset="1" stop-color="#1a0f2e" stop-opacity=".42"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="28" stdDeviation="32" flood-color="#b794f6" flood-opacity=".10"/><feDropShadow dx="0" dy="42" stdDeviation="56" flood-color="#ec4899" flood-opacity=".06"/></filter>
    <style>
      .h{font-family:"Inter","Segoe UI",Arial,sans-serif;font-weight:700;letter-spacing:-.5px;fill:url(#heading)}
      .b{font-family:"Inter","Segoe UI",system-ui,sans-serif;font-weight:400;letter-spacing:.3px;fill:#e5e7eb}
      .m{font-family:"Fira Code","SFMono-Regular",monospace;font-weight:400;letter-spacing:.5px;fill:#c4b5d8}
      .title{font-family:"Inter","Segoe UI",Arial,sans-serif;font-weight:700;fill:#f8f5ff}
      .card{fill:url(#glass);stroke:rgba(183,148,246,.15);stroke-width:2;filter:url(#shadow)}
      .pill{fill:#1a0f2e;stroke:rgba(183,148,246,.25);stroke-width:1.5}
      @keyframes live{0%,100%{opacity:.45;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}.live{animation:live 2s ease-in-out infinite;transform-origin:center}
      @keyframes draw{to{stroke-dashoffset:0}}.draw{stroke-dasharray:1500;stroke-dashoffset:1500;animation:draw 3.5s ease-out forwards}
      @media (prefers-reduced-motion:reduce){*{animation:none!important}}
    </style>
  </defs>
  <rect width="3600" height="1420" fill="url(#bg)"/>
  <rect width="3600" height="1420" fill="url(#light)"/>
  <g opacity=".16" stroke="rgba(183,148,246,.15)"><path d="M0 284H3600M0 568H3600M0 852H3600M0 1136H3600"/><path d="M450 0V1420M900 0V1420M1350 0V1420M1800 0V1420M2250 0V1420M2700 0V1420M3150 0V1420"/></g>
  <text x="150" y="144" class="m" font-size="24">EXPERIENCE / LIVE OPERATIONS</text>
  <text x="148" y="270" class="h" font-size="74">Internships as live systems.</text>
  <text x="152" y="340" class="b" font-size="31">Agentic workflows, mobile release cycles, and production delivery discipline.</text>
  <path d="M1800 470V1190" stroke="#b794f6" stroke-width="7" stroke-linecap="round" class="draw"/>
  <path d="M1800 470V1190" stroke="#ec4899" stroke-width="22" stroke-linecap="round" opacity=".06"/>
  <g transform="translate(220 500)">
    <rect class="card" width="1390" height="420" rx="24"/>
    <text x="54" y="72" class="m" font-size="20">ITOMATA</text>
    <text x="54" y="134" class="title" font-size="54">AI Engineer Intern</text>
    <text x="54" y="184" class="b" font-size="28">June 2026 - Present</text>
    <circle cx="1240" cy="74" r="14" fill="#10b981" class="live"/><text x="1270" y="84" class="m" font-size="18" fill="#10b981">LIVE</text>
    <text x="54" y="258" class="b" font-size="26">Engineering AI systems and agentic workflows with LLMs.</text>
    <text x="54" y="310" class="b" font-size="26">Building autonomous prompt pipelines and orchestration layers.</text>
    <text x="54" y="362" class="b" font-size="26">Shipping AI-assisted UX inside live application infrastructure.</text>
    <g transform="translate(54 386)"><rect class="pill" width="270" height="48" rx="10"/><text x="24" y="31" class="m" font-size="15">LLM ORCHESTRATION</text><rect class="pill" x="294" width="254" height="48" rx="10"/><text x="318" y="31" class="m" font-size="15">AGENTIC WORKFLOWS</text><rect class="pill" x="572" width="272" height="48" rx="10"/><text x="596" y="31" class="m" font-size="15">PRODUCTION DEPLOY</text></g>
  </g>
  <g transform="translate(1990 760)">
    <rect class="card" width="1390" height="420" rx="24"/>
    <text x="54" y="72" class="m" font-size="20">RABLO</text>
    <text x="54" y="134" class="title" font-size="54">Flutter Developer Intern</text>
    <text x="54" y="184" class="b" font-size="28">May 2026 - Present</text>
    <circle cx="1240" cy="74" r="14" fill="#10b981" class="live"/><text x="1270" y="84" class="m" font-size="18" fill="#10b981">LIVE</text>
    <text x="54" y="258" class="b" font-size="26">Developing production mobile applications with Flutter.</text>
    <text x="54" y="310" class="b" font-size="26">Contributing from feature development to release-ready builds.</text>
    <text x="54" y="362" class="b" font-size="26">Optimizing performance across cross-platform workflows.</text>
    <g transform="translate(54 386)"><rect class="pill" width="150" height="48" rx="10"/><text x="24" y="31" class="m" font-size="15">FLUTTER</text><rect class="pill" x="174" width="236" height="48" rx="10"/><text x="198" y="31" class="m" font-size="15">UI ARCHITECTURE</text><rect class="pill" x="434" width="254" height="48" rx="10"/><text x="458" y="31" class="m" font-size="15">MOBILE RELEASE</text></g>
  </g>
  <g fill="#ec4899"><circle cx="1800" cy="612" r="20"/><circle cx="1800" cy="872" r="20"/></g>
</svg>
