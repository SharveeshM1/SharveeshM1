<svg xmlns="http://www.w3.org/2000/svg" width="3600" height="1260" viewBox="0 0 3600 1260" role="img" aria-labelledby="title desc">
  <title id="title">Experience and operating timeline</title>
  <desc id="desc">A vertical timeline showing engineering operating modes, system building, validation, and launch readiness.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="3600" y2="1260" gradientUnits="userSpaceOnUse"><stop stop-color="#0a0507"/><stop offset="1" stop-color="#120c18"/></linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#b794f6" stop-opacity=".05"/><stop offset="1" stop-color="#ec4899" stop-opacity=".02"/></linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#b794f6"/><stop offset=".5" stop-color="#10b981"/><stop offset="1" stop-color="#ec4899"/></linearGradient>
    <style>
      .h{font-family:"Inter","Segoe UI",Arial,sans-serif;font-weight:700;letter-spacing:.5px;fill:url(#textGrad)}
      .b{font-family:"Inter","Segoe UI",Arial,sans-serif;font-weight:400;fill:#e5e7eb}
      .m{font-family:"Fira Code","SFMono-Regular",Menlo,monospace;font-weight:400;letter-spacing:1px;fill:#c4b5d8}
      .title{font-family:"Inter","Segoe UI",Arial,sans-serif;font-weight:700;letter-spacing:.5px;fill:#f8f5ff}
      .card{fill:url(#card);stroke:rgba(183,148,246,.15);stroke-width:2;filter:drop-shadow(0 0 20px rgba(183,148,246,.08)) drop-shadow(0 0 40px rgba(236,72,153,.04))}
      @keyframes draw{to{stroke-dashoffset:0}}.draw{stroke-dasharray:1200;stroke-dashoffset:1200;animation:draw 3s ease-out forwards}
      @media (prefers-reduced-motion:reduce){*{animation:none!important}}
    </style>
  </defs>
  <rect width="3600" height="1260" fill="url(#bg)"/>
  <text x="150" y="142" class="m" font-size="24">OPERATING TIMELINE</text>
  <text x="148" y="260" class="h" font-size="82">How the work compounds.</text>
  <text x="152" y="326" class="b" font-size="32">Map the system, build the runtime, verify the loop, ship the surface.</text>
  <path d="M1800 430V1080" stroke="#b794f6" stroke-width="6" stroke-linecap="round" class="draw"/>
  <g transform="translate(450 430)">
    <rect class="card" width="1040" height="170" rx="16"/><text x="44" y="62" class="m" font-size="20">01 / SYSTEM MAPPING</text><text x="44" y="112" class="title" font-size="40">Turn ambiguity into architecture</text><text x="44" y="148" class="b" font-size="24">Requirements become surfaces, services, context boundaries, and observability points.</text>
  </g>
  <g transform="translate(2110 590)">
    <rect class="card" width="1040" height="170" rx="16"/><text x="44" y="62" class="m" font-size="20">02 / RUNTIME BUILD</text><text x="44" y="112" class="title" font-size="40">Compose agents, APIs, and retrieval</text><text x="44" y="148" class="b" font-size="24">Planner, tools, memory, backend contracts, and data systems move together.</text>
  </g>
  <g transform="translate(450 750)">
    <rect class="card" width="1040" height="170" rx="16"/><text x="44" y="62" class="m" font-size="20">03 / VALIDATION</text><text x="44" y="112" class="title" font-size="40">Instrument before claiming victory</text><text x="44" y="148" class="b" font-size="24">Latency, retrieval quality, failure states, and release behavior are visible.</text>
  </g>
  <g transform="translate(2110 910)">
    <rect class="card" width="1040" height="170" rx="16"/><text x="44" y="62" class="m" font-size="20">04 / LAUNCH</text><text x="44" y="112" class="title" font-size="40">Package the system as a product</text><text x="44" y="148" class="b" font-size="24">The final interface helps people inspect, trust, and use the engineering.</text>
  </g>
  <g fill="#10b981"><circle cx="1800" cy="515" r="18"/><circle cx="1800" cy="675" r="18"/><circle cx="1800" cy="835" r="18"/><circle cx="1800" cy="995" r="18"/></g>
</svg>
