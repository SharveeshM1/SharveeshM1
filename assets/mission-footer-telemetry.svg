<svg xmlns="http://www.w3.org/2000/svg" width="3600" height="720" viewBox="0 0 3600 720" role="img" aria-labelledby="title desc">
  <title id="title">Footer telemetry rail</title>
  <desc id="desc">A compact closing telemetry rail for the engineering dashboard.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="3600" y2="720" gradientUnits="userSpaceOnUse"><stop stop-color="#0a0e27"/><stop offset=".55" stop-color="#0a0e27"/><stop offset="1" stop-color="#0a0e27"/></linearGradient>
    <linearGradient id="edge" x1="120" y1="120" x2="3480" y2="600" gradientUnits="userSpaceOnUse"><stop stop-color="#00d9ff"/><stop offset=".44" stop-color="#00ff88"/><stop offset=".75" stop-color="#a78bfa"/><stop offset="1" stop-color="#ff6b35"/></linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#f8fafc" stop-opacity=".12"/><stop offset="1" stop-color="#0a0e27" stop-opacity=".88"/></linearGradient>
    <style>
      .display{font-family:"Inter","Segoe UI",-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-weight:900;letter-spacing:0;fill:#f8fafc}
      .body{font-family:"Inter","Segoe UI",-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-weight:720;fill:#d1d5db}
      .mono{font-family:"Fira Code","SFMono-Regular",Menlo,Consolas,monospace;font-weight:820;letter-spacing:7px;fill:#00d9ff}
      .cap{font-family:"Fira Code","SFMono-Regular",Menlo,Consolas,monospace;font-weight:760;letter-spacing:4px;fill:#94a3b8}
      @keyframes blink{0%,100%{opacity:.35}50%{opacity:1}}.blink{animation:blink 2.4s ease-in-out infinite}
      @media (prefers-reduced-motion:reduce){*{animation:none!important}}
    </style>
  </defs>
  <rect width="3600" height="720" fill="url(#bg)"/>
  <rect x="120" y="112" width="3360" height="496" rx="34" fill="url(#panel)" stroke="url(#edge)" stroke-width="2"/>
  <text x="190" y="218" class="mono" font-size="24">CLOSING SIGNAL</text>
  <text x="188" y="342" class="display" font-size="92">Production-grade engineering, packaged as a system.</text>
  <text x="192" y="420" class="body" font-size="36">Explore the surfaces above, then open the source, inspect the projects, or start a conversation.</text>
  <g transform="translate(192 520)">
    <circle cx="0" cy="-7" r="10" fill="#00ff88" class="blink"/><text x="34" y="0" class="cap" font-size="20">AVAILABLE FOR HIGH-SIGNAL ENGINEERING ROLES</text>
    <text x="1290" y="0" class="cap" font-size="20">AI SYSTEMS</text>
    <text x="1710" y="0" class="cap" font-size="20">BACKEND</text>
    <text x="2058" y="0" class="cap" font-size="20">INFRASTRUCTURE</text>
    <text x="2652" y="0" class="cap" font-size="20">PRODUCT SURFACES</text>
  </g>
</svg>
