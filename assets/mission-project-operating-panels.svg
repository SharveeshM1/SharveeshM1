<svg xmlns="http://www.w3.org/2000/svg" width="3600" height="1840" viewBox="0 0 3600 1840" role="img" aria-labelledby="title desc">
  <title id="title">Project operating panels</title>
  <desc id="desc">Premium product panels for HELIOS, MIDAS, and whole_app with system purpose, architecture lane, telemetry, and readiness signals.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="3600" y2="1840" gradientUnits="userSpaceOnUse"><stop stop-color="#030712"/><stop offset=".55" stop-color="#060A12"/><stop offset="1" stop-color="#0B1020"/></linearGradient>
    <radialGradient id="light" cx="50%" cy="22%" r="65%"><stop stop-color="#F8FAFC" stop-opacity=".1"/><stop offset=".32" stop-color="#67E8F9" stop-opacity=".11"/><stop offset=".7" stop-color="#030712" stop-opacity="0"/></radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#F8FAFC" stop-opacity=".13"/><stop offset=".54" stop-color="#111827" stop-opacity=".74"/><stop offset="1" stop-color="#020617" stop-opacity=".9"/></linearGradient>
    <linearGradient id="edgeA" x1="0" y1="0" x2="1080" y2="820" gradientUnits="userSpaceOnUse"><stop stop-color="#67E8F9"/><stop offset=".55" stop-color="#34D399"/><stop offset="1" stop-color="#E5E7EB" stop-opacity=".45"/></linearGradient>
    <linearGradient id="edgeB" x1="0" y1="0" x2="1080" y2="820" gradientUnits="userSpaceOnUse"><stop stop-color="#F59E0B"/><stop offset=".5" stop-color="#A78BFA"/><stop offset="1" stop-color="#67E8F9"/></linearGradient>
    <linearGradient id="edgeC" x1="0" y1="0" x2="1080" y2="820" gradientUnits="userSpaceOnUse"><stop stop-color="#34D399"/><stop offset=".5" stop-color="#67E8F9"/><stop offset="1" stop-color="#A78BFA"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="32" stdDeviation="34" flood-color="#000" flood-opacity=".4"/></filter>
    <style>
      .display{font-family:"Clash Display","SF Pro Display","General Sans","Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-weight:900;letter-spacing:0;fill:#F8FAFC}
      .body{font-family:"SF Pro Text","General Sans","Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-weight:720;fill:#CBD5E1}
      .mono{font-family:"SFMono-Regular","General Sans",Menlo,Consolas,monospace;font-weight:820;letter-spacing:7px;fill:#67E8F9}
      .cap{font-family:"SFMono-Regular","General Sans",Menlo,Consolas,monospace;font-weight:760;letter-spacing:4px;fill:#94A3B8}
      .metric{font-family:"SF Pro Display","General Sans","Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-weight:900;fill:#F8FAFC}
      @keyframes rise{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}.rise{animation:rise 8s ease-in-out infinite}
      @media (prefers-reduced-motion:reduce){*{animation:none!important}}
    </style>
  </defs>
  <rect width="3600" height="1840" fill="url(#bg)"/>
  <rect width="3600" height="1840" fill="url(#light)"/>
  <text x="150" y="154" class="mono" font-size="25">PROJECT OPERATING SURFACES</text>
  <text x="146" y="308" class="display" font-size="116">Not repositories. Product systems.</text>
  <text x="152" y="382" class="body" font-size="36">Each project is framed by responsibility, interfaces, runtime signals, and engineering leverage.</text>

  <g transform="translate(132 552)" filter="url(#shadow)">
    <g class="rise">
      <rect width="1050" height="980" rx="34" fill="url(#panel)" stroke="url(#edgeA)" stroke-width="2"/>
      <text x="56" y="78" class="cap" font-size="18">PRIMARY SYSTEM</text>
      <text x="56" y="178" class="display" font-size="96">HELIOS</text>
      <text x="56" y="252" class="body" font-size="32">Agentic engineering runtime for orchestration, context, tools, and retrieval-backed workflows.</text>
      <g transform="translate(96 384)" fill="none">
        <circle cx="424" cy="150" r="142" stroke="#67E8F9" stroke-width="5"/>
        <circle cx="424" cy="150" r="82" stroke="#34D399" stroke-width="4"/>
        <path d="M424 8V292M282 150H566M324 50L524 250M524 50L324 250" stroke="#334155" stroke-width="3"/>
        <path d="M424 62L500 106V194L424 238L348 194V106Z" stroke="#F8FAFC" stroke-width="6"/>
        <path d="M386 188L424 98L478 168" stroke="#67E8F9" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <g transform="translate(56 724)">
        <text x="0" y="0" class="cap" font-size="18">SYSTEM VALUE</text>
        <text x="0" y="58" class="body" font-size="30">Turns ambiguous tasks into planned, tool-using, observable execution loops.</text>
        <path d="M0 138H880" stroke="#1F2937" stroke-width="14" stroke-linecap="round"/><path d="M0 138H704" stroke="#34D399" stroke-width="14" stroke-linecap="round"/>
        <text x="0" y="204" class="cap" font-size="18">ORCHESTRATION</text><text x="352" y="204" class="cap" font-size="18">RAG</text><text x="568" y="204" class="cap" font-size="18">TOOLS</text><text x="760" y="204" class="cap" font-size="18">EVALS</text>
      </g>
    </g>

    <g transform="translate(1152 0)" class="rise" style="animation-delay:1.2s">
      <rect width="1050" height="980" rx="34" fill="url(#panel)" stroke="url(#edgeB)" stroke-width="2"/>
      <text x="56" y="78" class="cap" font-size="18">INTELLIGENCE LAYER</text>
      <text x="56" y="178" class="display" font-size="96">MIDAS</text>
      <text x="56" y="252" class="body" font-size="32">Decision intelligence surface for extracting structure, ranking signal, and turning data into action.</text>
      <g transform="translate(86 376)">
        <path d="M0 330C148 210 242 318 382 170C524 20 690 122 856 44" fill="none" stroke="#F59E0B" stroke-width="8" stroke-linecap="round"/>
        <path d="M0 256C138 286 236 140 374 188C536 244 694 108 856 146" fill="none" stroke="#A78BFA" stroke-width="6" stroke-linecap="round"/>
        <path d="M0 404C156 354 252 430 398 312C548 190 686 344 856 246" fill="none" stroke="#67E8F9" stroke-width="6" stroke-linecap="round"/>
        <g stroke="#334155" opacity=".75"><path d="M0 88H856M0 196H856M0 304H856M0 412H856"/><path d="M0 44V440M214 44V440M428 44V440M642 44V440M856 44V440"/></g>
      </g>
      <g transform="translate(56 724)">
        <text x="0" y="0" class="cap" font-size="18">SYSTEM VALUE</text>
        <text x="0" y="58" class="body" font-size="30">Moves from raw inputs to ranked decisions with explainable thresholds.</text>
        <g transform="translate(0 126)"><text x="0" y="58" class="metric" font-size="68">Signal</text><text x="318" y="58" class="metric" font-size="68">Rank</text><text x="594" y="58" class="metric" font-size="68">Act</text></g>
      </g>
    </g>

    <g transform="translate(2304 0)" class="rise" style="animation-delay:2.2s">
      <rect width="1050" height="980" rx="34" fill="url(#panel)" stroke="url(#edgeC)" stroke-width="2"/>
      <text x="56" y="78" class="cap" font-size="18">APPLICATION PLATFORM</text>
      <text x="56" y="178" class="display" font-size="96">whole_app</text>
      <text x="56" y="252" class="body" font-size="32">Full-stack product surface connecting user experience, backend contracts, state, and release flow.</text>
      <g transform="translate(74 360)">
        <rect x="0" y="0" width="902" height="500" rx="24" fill="#020617" stroke="#334155"/>
        <rect x="28" y="30" width="250" height="440" rx="18" fill="#0F172A" stroke="#334155"/>
        <rect x="308" y="30" width="566" height="150" rx="18" fill="#0F172A" stroke="#67E8F9" stroke-opacity=".45"/>
        <rect x="308" y="210" width="266" height="260" rx="18" fill="#0F172A" stroke="#34D399" stroke-opacity=".45"/>
        <rect x="608" y="210" width="266" height="260" rx="18" fill="#0F172A" stroke="#A78BFA" stroke-opacity=".45"/>
        <path d="M62 100H238M62 166H222M62 232H248M62 298H210M62 364H230" stroke="#475569" stroke-width="12" stroke-linecap="round"/>
        <path d="M350 94H724M350 132H650" stroke="#67E8F9" stroke-width="10" stroke-linecap="round"/>
        <circle cx="442" cy="334" r="74" fill="none" stroke="#34D399" stroke-width="12"/>
        <path d="M704 390L742 276L788 352L826 304" fill="none" stroke="#A78BFA" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <g transform="translate(56 900)">
        <text x="0" y="0" class="cap" font-size="18">UX</text><text x="230" y="0" class="cap" font-size="18">API</text><text x="460" y="0" class="cap" font-size="18">STATE</text><text x="700" y="0" class="cap" font-size="18">DEPLOY</text>
      </g>
    </g>
  </g>
</svg>
