<svg xmlns="http://www.w3.org/2000/svg" width="3600" height="1850" viewBox="0 0 3600 1850" role="img" aria-labelledby="title desc">
  <title id="title">Interstellar Neural Galaxy</title>
  <desc id="desc">A deep interstellar neural galaxy with constellations, particle fields, shooting stars, nebulae, orbit trails, parallax and depth.</desc>
  <defs>
    <radialGradient id="bg" cx="52%" cy="48%" r="78%"><stop stop-color="#1e1b4b"/><stop offset=".28" stop-color="#0f2747"/><stop offset=".58" stop-color="#07091a"/><stop offset=".82" stop-color="#030712"/><stop offset="1" stop-color="#010208"/></radialGradient>
    <radialGradient id="nebula" cx="54%" cy="54%" r="56%"><stop stop-color="#f8fafc" stop-opacity=".66"/><stop offset=".12" stop-color="#67e8f9" stop-opacity=".7"/><stop offset=".35" stop-color="#8b5cf6" stop-opacity=".44"/><stop offset=".72" stop-color="#0f172a" stop-opacity=".06"/><stop offset="1" stop-color="#020617" stop-opacity="0"/></radialGradient>
    <linearGradient id="trail" x1="420" y1="1320" x2="3260" y2="260" gradientUnits="userSpaceOnUse"><stop stop-color="#22d3ee" stop-opacity=".1"/><stop offset=".38" stop-color="#a78bfa" stop-opacity=".82"/><stop offset=".67" stop-color="#f8fafc" stop-opacity=".48"/><stop offset="1" stop-color="#38bdf8" stop-opacity=".14"/></linearGradient>
    <linearGradient id="goldTrail" x1="500" y1="420" x2="3180" y2="1500" gradientUnits="userSpaceOnUse"><stop stop-color="#f59e0b" stop-opacity=".1"/><stop offset=".42" stop-color="#f8fafc" stop-opacity=".36"/><stop offset="1" stop-color="#67e8f9" stop-opacity=".12"/></linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%"><feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#67e8f9" flood-opacity=".48"/><feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#000" flood-opacity=".42"/></filter>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="34"/></filter>
    <style>
      .display{font-family:"Clash Display","Satoshi","General Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-weight:900;letter-spacing:0;fill:#f8fafc}
      .body{font-family:"Satoshi","General Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}
      .mono{font-family:"General Sans","SFMono-Regular",Menlo,Consolas,monospace;font-weight:800;letter-spacing:8px;fill:#67e8f9}
      @keyframes far{0%,100%{transform:translate(0,0)}50%{transform:translate(-36px,22px)}}@keyframes near{0%,100%{transform:translate(0,0)}50%{transform:translate(48px,-30px)}}@keyframes dash{to{stroke-dashoffset:-1500}}@keyframes pulse{0%,100%{opacity:.32}50%{opacity:.88}}@keyframes breathe{0%,100%{opacity:.2}50%{opacity:.62}}
      .far{animation:far 16s ease-in-out infinite}.near{animation:near 10s ease-in-out infinite}.dash{animation:dash 11s linear infinite}.pulse{animation:pulse 5s ease-in-out infinite}
      .breathe{animation:breathe 7s ease-in-out infinite}
      @media (prefers-reduced-motion:reduce){*{animation:none!important}}
    </style>
  </defs>
  <rect width="3600" height="1850" fill="url(#bg)"/>
  <ellipse cx="1820" cy="980" rx="1180" ry="470" fill="#8b5cf6" opacity=".18" filter="url(#blur)"/>
  <ellipse cx="2320" cy="640" rx="860" ry="340" fill="#67e8f9" opacity=".12" filter="url(#blur)"/>
  <g class="far" opacity=".58"><circle cx="190" cy="220" r="3" fill="#fff"/><circle cx="460" cy="560" r="4" fill="#67e8f9"/><circle cx="720" cy="250" r="2" fill="#fff"/><circle cx="3250" cy="260" r="5" fill="#fff"/><circle cx="3060" cy="1080" r="3" fill="#67e8f9"/><circle cx="1230" cy="1510" r="4" fill="#fff"/><circle cx="2060" cy="210" r="3" fill="#a78bfa"/><circle cx="2460" cy="1430" r="4" fill="#fff"/></g>
  <g class="near" opacity=".86" filter="url(#glow)"><path d="M2660 238L3110 90" stroke="#fff" stroke-width="7" stroke-linecap="round" opacity=".62"/><path d="M380 1450L780 1280" stroke="#67e8f9" stroke-width="7" stroke-linecap="round" opacity=".52"/><path d="M2700 1320L3200 1120" stroke="#a78bfa" stroke-width="6" stroke-linecap="round" opacity=".5"/><circle cx="590" cy="380" r="8" fill="#67e8f9"/><circle cx="2920" cy="690" r="10" fill="#a78bfa"/><circle cx="900" cy="1160" r="7" fill="#fff"/></g>
  <text x="150" y="150" class="mono" font-size="24">NEURAL GALAXY</text>
  <text x="145" y="292" class="display" font-size="116">Signals with gravitational depth.</text>
  <text x="150" y="360" class="body" font-size="36" font-weight="700" fill="#c0cad8">Constellations, particles, shooting stars, nebulae and parallax layers around the system core.</text>
  <circle cx="1850" cy="980" r="620" fill="url(#nebula)" class="pulse"/>
  <g class="breathe" opacity=".42"><ellipse cx="1850" cy="980" rx="1320" ry="420" fill="none" stroke="#67e8f9" stroke-width="2" transform="rotate(-12 1850 980)"/><ellipse cx="1850" cy="980" rx="980" ry="310" fill="none" stroke="#a78bfa" stroke-width="2" transform="rotate(24 1850 980)"/></g>
  <g opacity=".9"><path d="M470 1070C900 530 1320 1320 1820 860C2260 460 2600 1130 3150 690" fill="none" stroke="url(#trail)" stroke-width="5" stroke-dasharray="40 32" class="dash"/><path d="M600 650C1020 820 1260 570 1660 810C2110 1080 2400 650 2990 1040" fill="none" stroke="#67e8f9" stroke-opacity=".25" stroke-width="3"/><path d="M900 1350C1240 940 1520 1450 1900 1040C2260 650 2540 1340 2940 920" fill="none" stroke="#a78bfa" stroke-opacity=".22" stroke-width="3"/><path d="M430 430C980 760 1280 360 1770 640C2230 902 2620 580 3180 1330" fill="none" stroke="url(#goldTrail)" stroke-width="4" stroke-dasharray="22 34" class="dash"/></g>
  <g filter="url(#glow)">
    <circle cx="1850" cy="980" r="126" fill="#070b19" stroke="#67e8f9" stroke-width="5"/>
    <path d="M1770 968L1838 894L1938 934L1988 874M1838 894L1876 1014L1972 1070M1876 1014L1788 1118L1878 1168" fill="none" stroke="#f8fafc" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <g fill="#67e8f9"><circle cx="1130" cy="690" r="16"/><circle cx="1290" cy="1180" r="12"/><circle cx="2440" cy="690" r="15"/><circle cx="2580" cy="1180" r="13"/><circle cx="1540" cy="500" r="10"/><circle cx="2050" cy="1380" r="12"/><circle cx="910" cy="930" r="9"/><circle cx="2780" cy="910" r="10"/><circle cx="1660" cy="1490" r="8"/><circle cx="2220" cy="430" r="9"/></g>
    <g stroke="#67e8f9" stroke-width="3" stroke-opacity=".42" fill="none"><path d="M1130 690L1850 980L2440 690M1290 1180L1850 980L2580 1180M1540 500L1850 980L2050 1380"/><path d="M910 930L1290 1180L1660 1490L2050 1380L2580 1180L2780 910L2440 690L2220 430L1540 500L1130 690Z"/></g>
  </g>
</svg>
