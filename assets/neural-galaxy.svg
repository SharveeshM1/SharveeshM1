<svg xmlns="http://www.w3.org/2000/svg" width="3200" height="1600" viewBox="0 0 3200 1600" role="img" aria-labelledby="title desc">
  <title id="title">Neural Galaxy</title>
  <desc id="desc">A maximal neural galaxy with parallax stars, particles, shooting stars, orbit trails and depth.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="48%" r="78%">
      <stop stop-color="#172554"/>
      <stop offset=".42" stop-color="#080b1f"/>
      <stop offset=".78" stop-color="#030712"/>
      <stop offset="1" stop-color="#010208"/>
    </radialGradient>
    <radialGradient id="nebula" cx="50%" cy="52%" r="52%">
      <stop stop-color="#f8fafc" stop-opacity=".72"/>
      <stop offset=".11" stop-color="#67e8f9" stop-opacity=".72"/>
      <stop offset=".34" stop-color="#8b5cf6" stop-opacity=".42"/>
      <stop offset=".72" stop-color="#0f172a" stop-opacity=".04"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="trail" x1="360" y1="1240" x2="2900" y2="250" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee" stop-opacity=".1"/>
      <stop offset=".42" stop-color="#a78bfa" stop-opacity=".82"/>
      <stop offset=".68" stop-color="#f8fafc" stop-opacity=".46"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity=".14"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feDropShadow dx="0" dy="0" stdDeviation="16" flood-color="#67e8f9" flood-opacity=".48"/>
      <feDropShadow dx="0" dy="20" stdDeviation="28" flood-color="#000" flood-opacity=".42"/>
    </filter>
    <style>
      .title{font:900 118px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;letter-spacing:0;fill:#f8fafc}
      .mono{font:800 24px "SFMono-Regular",Menlo,Consolas,monospace;letter-spacing:8px;fill:#67e8f9}
      .copy{font:650 34px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#c0cad8}
      @keyframes far{0%,100%{transform:translate(0,0)}50%{transform:translate(-32px,18px)}}
      @keyframes near{0%,100%{transform:translate(0,0)}50%{transform:translate(42px,-26px)}}
      @keyframes dash{to{stroke-dashoffset:-1300}}
      @keyframes pulse{0%,100%{opacity:.35}50%{opacity:.9}}
      .far{animation:far 16s ease-in-out infinite}.near{animation:near 10s ease-in-out infinite}.dash{animation:dash 11s linear infinite}.pulse{animation:pulse 5s ease-in-out infinite}
      @media (prefers-reduced-motion:reduce){*{animation:none!important}}
    </style>
  </defs>
  <rect width="3200" height="1600" fill="url(#bg)"/>
  <g class="far" opacity=".58">
    <circle cx="190" cy="220" r="3" fill="#fff"/><circle cx="420" cy="520" r="4" fill="#67e8f9"/><circle cx="710" cy="250" r="2" fill="#fff"/><circle cx="2850" cy="260" r="5" fill="#fff"/><circle cx="2970" cy="980" r="3" fill="#67e8f9"/><circle cx="1230" cy="1350" r="4" fill="#fff"/><circle cx="1860" cy="210" r="3" fill="#a78bfa"/><circle cx="2360" cy="1310" r="4" fill="#fff"/>
  </g>
  <g class="near" opacity=".88" filter="url(#glow)">
    <path d="M2460 238L2850 98" stroke="#fff" stroke-width="7" stroke-linecap="round" opacity=".62"/>
    <path d="M380 1260L730 1110" stroke="#67e8f9" stroke-width="7" stroke-linecap="round" opacity=".52"/>
    <path d="M2450 1190L2890 1020" stroke="#a78bfa" stroke-width="6" stroke-linecap="round" opacity=".5"/>
    <circle cx="560" cy="360" r="8" fill="#67e8f9"/><circle cx="2720" cy="610" r="10" fill="#a78bfa"/><circle cx="890" cy="1040" r="7" fill="#fff"/>
  </g>
  <circle cx="1640" cy="820" r="560" fill="url(#nebula)" class="pulse"/>
  <g opacity=".9">
    <path d="M430 930C850 450 1220 1190 1620 770C1990 380 2310 1000 2780 610" fill="none" stroke="url(#trail)" stroke-width="5" stroke-dasharray="36 28" class="dash"/>
    <path d="M560 570C930 720 1160 500 1500 710C1900 960 2160 550 2650 920" fill="none" stroke="#67e8f9" stroke-opacity=".26" stroke-width="3"/>
    <path d="M840 1180C1160 830 1400 1260 1720 910C2050 550 2300 1190 2630 820" fill="none" stroke="#a78bfa" stroke-opacity=".22" stroke-width="3"/>
  </g>
  <g filter="url(#glow)">
    <circle cx="1640" cy="820" r="115" fill="#070b19" stroke="#67e8f9" stroke-width="5"/>
    <path d="M1568 810L1628 748L1714 782L1758 730M1628 748L1660 850L1740 898M1660 850L1588 938L1662 980" fill="none" stroke="#f8fafc" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <g fill="#67e8f9">
      <circle cx="1030" cy="590" r="16"/><circle cx="1170" cy="1040" r="12"/><circle cx="2190" cy="600" r="15"/><circle cx="2320" cy="1030" r="13"/><circle cx="1380" cy="420" r="10"/><circle cx="1830" cy="1210" r="12"/>
    </g>
    <g stroke="#67e8f9" stroke-width="3" stroke-opacity=".42">
      <path d="M1030 590L1640 820L2190 600M1170 1040L1640 820L2320 1030M1380 420L1640 820L1830 1210"/>
    </g>
  </g>
  <text x="150" y="172" class="mono">NEURAL GALAXY</text>
  <text x="146" y="306" class="title">Signals with depth.</text>
  <text x="152" y="376" class="copy">Floating stars, shooting trails, neural particles and parallax layers around the system core.</text>
</svg>
