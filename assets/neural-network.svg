<svg xmlns="http://www.w3.org/2000/svg" width="3840" height="2160" viewBox="0 0 3840 2160" role="img" aria-labelledby="title desc">
  <title id="title">Holographic neural network field</title>
  <desc id="desc">A black 4K neural network visualization with floating cyan and purple nodes, glass panels, and subtle 3D depth.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="48%" r="70%">
      <stop offset="0%" stop-color="#151026"/>
      <stop offset="52%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#05070B"/>
    </radialGradient>
    <linearGradient id="edge" x1="420" y1="1660" x2="3420" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity=".1"/>
      <stop offset="50%" stop-color="#22D3EE" stop-opacity=".78"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity=".18"/>
    </linearGradient>
    <linearGradient id="panel" x1="760" y1="378" x2="3060" y2="1780" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F8FAFC" stop-opacity=".14"/>
      <stop offset="52%" stop-color="#22D3EE" stop-opacity=".035"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity=".12"/>
    </linearGradient>
    <pattern id="grid" width="120" height="120" patternUnits="userSpaceOnUse">
      <path d="M120 0H0V120" fill="none" stroke="#22D3EE" stroke-opacity=".045" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-90%" y="-90%" width="280%" height="280%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 .133 0 0 0 0 .827 0 0 0 0 .933 0 0 0 .75 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="purpleGlow" x="-90%" y="-90%" width="280%" height="280%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 .545 0 0 0 0 .361 0 0 0 0 .965 0 0 0 .7 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="depth" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="42" stdDeviation="42" flood-color="#000000" flood-opacity=".54"/>
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#22D3EE" flood-opacity=".18"/>
    </filter>
    <style>
      @keyframes drift{0%,100%{transform:translate3d(0,0,0)}50%{transform:translate3d(18px,-28px,0)}}
      @keyframes dash{to{stroke-dashoffset:-900}}
      @keyframes pulse{0%,100%{opacity:.52}50%{opacity:.96}}
      #network{animation:drift 10s ease-in-out infinite}
      .link{animation:dash 12s linear infinite}
      .nodePulse{animation:pulse 5s ease-in-out infinite}
      @media (prefers-reduced-motion:reduce){*{animation:none!important}}
    </style>
  </defs>
  <rect width="3840" height="2160" fill="url(#bg)"/>
  <rect width="3840" height="2160" fill="url(#grid)" opacity=".7"/>
  <text x="1920" y="220" text-anchor="middle" font-family="Space Grotesk, Inter, system-ui, sans-serif" font-size="124" font-weight="700" fill="#F8FAFC">AI Systems</text>
  <text x="1920" y="306" text-anchor="middle" font-family="JetBrains Mono, IBM Plex Mono, monospace" font-size="32" fill="#22D3EE" letter-spacing="5">CONTEXT GRAPH / INFERENCE MESH / AGENT ROUTING</text>
  <path d="M0 1640C716 1416 1132 1598 1716 1262C2280 938 2558 530 3840 416V2160H0Z" fill="#8B5CF6" opacity=".035"/>
  <path d="M0 488C536 616 1078 472 1620 688C2222 928 2776 1188 3840 1018V0H0Z" fill="#22D3EE" opacity=".03"/>
  <g filter="url(#depth)">
    <path d="M742 552L1920 230L3100 552V1608L1920 1930L742 1608Z" fill="#0D1117" fill-opacity=".48" stroke="url(#panel)" stroke-width="3"/>
    <path d="M932 662L1920 392L2908 662V1498L1920 1768L932 1498Z" fill="none" stroke="#F8FAFC" stroke-opacity=".08" stroke-width="2"/>
    <path d="M1126 772L1920 556L2714 772V1388L1920 1604L1126 1388Z" fill="none" stroke="#22D3EE" stroke-opacity=".12" stroke-width="2"/>
  </g>
  <g id="network" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <g opacity=".82" filter="url(#glow)">
      <path class="link" d="M548 1412L880 1118L1168 1242L1456 938L1768 1048L2038 744L2380 868L2708 590L3188 754" stroke="url(#edge)" stroke-width="4" stroke-dasharray="34 30"/>
      <path class="link" d="M650 786L1032 636L1324 814L1768 1048L2116 1232L2488 1052L2932 1254L3284 1082" stroke="#22D3EE" stroke-opacity=".42" stroke-width="3" stroke-dasharray="20 26"/>
      <path class="link" d="M880 1118L1032 636L1456 938L1324 814L1768 1048L2116 1232L2038 744L2488 1052L2380 868L2932 1254" stroke="#8B5CF6" stroke-opacity=".34" stroke-width="3"/>
      <path class="link" d="M1168 1242L1424 1510L1768 1048L1908 1436L2116 1232L2380 1466L2488 1052L2708 590" stroke="#F8FAFC" stroke-opacity=".16" stroke-width="2" stroke-dasharray="12 22"/>
      <path class="link" d="M548 1412L904 1590L1424 1510L1908 1436L2380 1466L2932 1254L3368 1480" stroke="#8B5CF6" stroke-opacity=".28" stroke-width="3"/>
    </g>
    <g filter="url(#purpleGlow)">
      <circle class="nodePulse" cx="548" cy="1412" r="17" fill="#8B5CF6"/>
      <circle class="nodePulse" cx="880" cy="1118" r="19" fill="#22D3EE"/>
      <circle class="nodePulse" cx="1168" cy="1242" r="14" fill="#F8FAFC"/>
      <circle class="nodePulse" cx="1456" cy="938" r="22" fill="#8B5CF6"/>
      <circle class="nodePulse" cx="1768" cy="1048" r="30" fill="#22D3EE"/>
      <circle class="nodePulse" cx="2038" cy="744" r="18" fill="#F8FAFC"/>
      <circle class="nodePulse" cx="2380" cy="868" r="21" fill="#8B5CF6"/>
      <circle class="nodePulse" cx="2708" cy="590" r="15" fill="#22D3EE"/>
      <circle class="nodePulse" cx="3188" cy="754" r="18" fill="#8B5CF6"/>
      <circle class="nodePulse" cx="650" cy="786" r="14" fill="#22D3EE"/>
      <circle class="nodePulse" cx="1032" cy="636" r="16" fill="#8B5CF6"/>
      <circle class="nodePulse" cx="1324" cy="814" r="12" fill="#22D3EE"/>
      <circle class="nodePulse" cx="2116" cy="1232" r="18" fill="#8B5CF6"/>
      <circle class="nodePulse" cx="2488" cy="1052" r="16" fill="#22D3EE"/>
      <circle class="nodePulse" cx="2932" cy="1254" r="20" fill="#F8FAFC"/>
      <circle class="nodePulse" cx="3284" cy="1082" r="14" fill="#22D3EE"/>
      <circle class="nodePulse" cx="1424" cy="1510" r="16" fill="#8B5CF6"/>
      <circle class="nodePulse" cx="1908" cy="1436" r="15" fill="#22D3EE"/>
      <circle class="nodePulse" cx="2380" cy="1466" r="17" fill="#F8FAFC"/>
      <circle class="nodePulse" cx="3368" cy="1480" r="15" fill="#8B5CF6"/>
    </g>
  </g>
  <g opacity=".32" class="mono" font-family="JetBrains Mono, IBM Plex Mono, monospace" font-size="28" fill="#F8FAFC">
    <text x="214" y="268">context.graph / inference.mesh / agent.routing</text>
    <text x="2642" y="1944">distributed intelligence substrate</text>
  </g>
</svg>
