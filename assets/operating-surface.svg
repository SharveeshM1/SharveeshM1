<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="760" viewBox="0 0 2400 760" role="img" aria-labelledby="title desc">
  <title id="title">Operating Surface</title>
  <desc id="desc">AI operations dashboard and terminal status for Sharveesh M.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="0%" r="100%">
      <stop stop-color="#101a35"/>
      <stop offset=".56" stop-color="#070b1d"/>
      <stop offset="1" stop-color="#050816"/>
    </radialGradient>
    <linearGradient id="edge" x1="130" y1="170" x2="2270" y2="650" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee" stop-opacity=".44"/>
      <stop offset=".5" stop-color="#8b5cf6" stop-opacity=".42"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity=".2"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="2400" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee" stop-opacity=".12"/>
      <stop offset=".5" stop-color="#8b5cf6" stop-opacity=".38"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity=".12"/>
    </linearGradient>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0H0V80" fill="none" stroke="#22d3ee" stroke-opacity=".045"/>
    </pattern>
    <filter id="card" x="-20%" y="-40%" width="140%" height="180%">
      <feDropShadow dx="0" dy="22" stdDeviation="28" flood-color="#000000" flood-opacity=".42"/>
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#22d3ee" flood-opacity=".12"/>
    </filter>
    <style>
      .mono{font:700 20px "IBM Plex Mono","Geist Mono",ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:5px;fill:#22d3ee}
      .h{font:760 56px Geist,Satoshi,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#f8fafc}
      .cardh{font:740 34px Geist,Satoshi,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#f8fafc}
      .label{font:650 22px Geist,Satoshi,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#aebbcc}
      .metric{font:760 40px Geist,Satoshi,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#f8fafc}
      .term{font:700 24px "IBM Plex Mono","Geist Mono",ui-monospace,SFMono-Regular,Menlo,monospace;fill:#dbeafe}
      .ok{fill:#22d3ee}.purple{fill:#a78bfa}.muted{fill:#7786a1}
    </style>
  </defs>
  <rect width="2400" height="760" rx="34" fill="url(#bg)"/>
  <rect width="2400" height="760" rx="34" fill="url(#grid)"/>
  <rect x="1" y="1" width="2398" height="758" rx="34" fill="none" stroke="#1f2a44" stroke-opacity=".78"/>
  <path d="M0 640C420 548 760 690 1160 590C1540 496 1840 430 2400 514V760H0Z" fill="url(#wave)"/>
  <text x="130" y="92" class="mono">OPERATING SURFACE</text>
  <text x="130" y="170" class="h">AI command surface</text>
  <g transform="translate(130 236)" filter="url(#card)">
    <rect width="1020" height="404" rx="30" fill="#0a1024" fill-opacity=".84" stroke="url(#edge)" stroke-width="1.5"/>
    <text x="46" y="66" class="cardh">AI Operations Dashboard</text>
    <g transform="translate(46 112)">
      <g>
        <text y="30" class="label">Latency</text><text y="84" class="metric">128ms</text>
        <path d="M0 126C70 94 128 142 196 104C248 74 304 82 374 52" fill="none" stroke="#22d3ee" stroke-width="5" stroke-linecap="round"/>
      </g>
      <g transform="translate(470 0)">
        <text y="30" class="label">Requests</text><text y="84" class="metric">42.8k</text>
        <rect y="118" width="52" height="82" rx="12" fill="#22d3ee" fill-opacity=".5"/>
        <rect x="72" y="82" width="52" height="118" rx="12" fill="#8b5cf6" fill-opacity=".58"/>
        <rect x="144" y="42" width="52" height="158" rx="12" fill="#38bdf8" fill-opacity=".56"/>
        <rect x="216" y="96" width="52" height="104" rx="12" fill="#a78bfa" fill-opacity=".5"/>
      </g>
    </g>
    <g transform="translate(46 316)">
      <rect width="210" height="58" rx="18" fill="#081223" stroke="#22d3ee" stroke-opacity=".32"/>
      <text x="28" y="38" class="label">Agents 12</text>
      <rect x="242" width="302" height="58" rx="18" fill="#081223" stroke="#8b5cf6" stroke-opacity=".32"/>
      <text x="270" y="38" class="label">Context windows 8</text>
      <rect x="576" width="272" height="58" rx="18" fill="#081223" stroke="#22d3ee" stroke-opacity=".32"/>
      <text x="604" y="38" class="label">Throughput 94%</text>
    </g>
  </g>
  <g transform="translate(1210 236)" filter="url(#card)">
    <rect width="1060" height="404" rx="30" fill="#060a18" fill-opacity=".9" stroke="url(#edge)" stroke-width="1.5"/>
    <rect x="0" y="0" width="1060" height="58" rx="30" fill="#10172a" fill-opacity=".86"/>
    <circle cx="42" cy="30" r="8" fill="#22d3ee"/><circle cx="72" cy="30" r="8" fill="#8b5cf6"/><circle cx="102" cy="30" r="8" fill="#64748b"/>
    <text x="46" y="112" class="term"><tspan class="muted">planner</tspan> <tspan class="ok">-&gt;</tspan> retriever <tspan class="ok">-&gt;</tspan> tool <tspan class="ok">-&gt;</tspan> inference <tspan class="ok">-&gt;</tspan> output</text>
    <text x="46" y="178" class="term"><tspan class="ok">openai</tspan> online    <tspan class="purple">gemini</tspan> online</text>
    <text x="46" y="236" class="term"><tspan class="purple">claude</tspan> online    <tspan class="ok">langgraph</tspan> online</text>
    <text x="46" y="302" class="term"><tspan class="muted">$</tspan> route --context long --tools enabled</text>
    <path d="M46 346H1014" stroke="#22d3ee" stroke-opacity=".22"/>
    <text x="46" y="374" class="term"><tspan class="ok">status</tspan> orchestration layer stable</text>
  </g>
</svg>
