<svg xmlns="http://www.w3.org/2000/svg" width="2048" height="2048" viewBox="0 0 2048 2048" role="img" aria-labelledby="title desc">
  <title id="title">Holographic AI core orb</title>
  <desc id="desc">A premium black-background 3D-style holographic orb with purple and cyan energy rings and neural filaments.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#161022"/>
      <stop offset="58%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#05070B"/>
    </radialGradient>
    <radialGradient id="orbFill" cx="42%" cy="34%" r="64%">
      <stop offset="0%" stop-color="#F8FAFC" stop-opacity=".88"/>
      <stop offset="14%" stop-color="#22D3EE" stop-opacity=".86"/>
      <stop offset="42%" stop-color="#8B5CF6" stop-opacity=".55"/>
      <stop offset="72%" stop-color="#0D1117" stop-opacity=".78"/>
      <stop offset="100%" stop-color="#030409" stop-opacity=".96"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity=".3"/>
      <stop offset="48%" stop-color="#8B5CF6" stop-opacity=".18"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rim" x1="428" y1="404" x2="1624" y2="1644" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F8FAFC" stop-opacity=".68"/>
      <stop offset="34%" stop-color="#22D3EE" stop-opacity=".78"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity=".7"/>
    </linearGradient>
    <linearGradient id="ring" x1="252" y1="1238" x2="1800" y2="780" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity=".02"/>
      <stop offset="48%" stop-color="#22D3EE" stop-opacity=".76"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity=".08"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 .545 0 0 0 0 .361 0 0 0 0 .965 0 0 0 .72 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cyan" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 .133 0 0 0 0 .827 0 0 0 0 .933 0 0 0 .76 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="56" stdDeviation="58" flood-color="#000000" flood-opacity=".68"/>
      <feDropShadow dx="0" dy="0" stdDeviation="38" flood-color="#8B5CF6" flood-opacity=".44"/>
    </filter>
    <clipPath id="orbClip">
      <circle cx="1024" cy="1024" r="504"/>
    </clipPath>
    <style>
      @keyframes orbit{to{transform:rotate(360deg)}}
      @keyframes breathe{0%,100%{opacity:.56;transform:scale(1)}50%{opacity:.92;transform:scale(1.025)}}
      @keyframes dash{to{stroke-dashoffset:-520}}
      #outerRings{animation:orbit 32s linear infinite;transform-origin:1024px 1024px}
      #innerRings{animation:orbit 44s linear infinite reverse;transform-origin:1024px 1024px}
      #energy{animation:breathe 6s ease-in-out infinite;transform-origin:1024px 1024px}
      .flow{animation:dash 8s linear infinite}
      @media (prefers-reduced-motion:reduce){*{animation:none!important}}
    </style>
  </defs>
  <rect width="2048" height="2048" fill="url(#bg)"/>
  <circle cx="1024" cy="1024" r="900" fill="url(#halo)" opacity=".95"/>
  <g id="outerRings" fill="none" stroke-linecap="round" filter="url(#cyan)">
    <ellipse cx="1024" cy="1024" rx="782" ry="238" stroke="url(#ring)" stroke-width="6" stroke-dasharray="56 44"/>
    <ellipse cx="1024" cy="1024" rx="680" ry="196" stroke="#8B5CF6" stroke-opacity=".36" stroke-width="3" transform="rotate(22 1024 1024)"/>
    <ellipse cx="1024" cy="1024" rx="828" ry="282" stroke="#22D3EE" stroke-opacity=".18" stroke-width="2.5" transform="rotate(-18 1024 1024)"/>
  </g>
  <g filter="url(#shadow)">
    <circle cx="1024" cy="1024" r="504" fill="url(#orbFill)" stroke="url(#rim)" stroke-width="3"/>
    <circle cx="1024" cy="1024" r="398" fill="none" stroke="#F8FAFC" stroke-opacity=".09" stroke-width="2"/>
    <circle cx="1024" cy="1024" r="290" fill="none" stroke="#22D3EE" stroke-opacity=".13" stroke-width="2"/>
  </g>
  <g clip-path="url(#orbClip)" opacity=".92">
    <path d="M548 1108C702 1002 808 1072 914 924C1030 764 1166 800 1328 714C1420 665 1480 580 1542 490" fill="none" stroke="#22D3EE" stroke-opacity=".42" stroke-width="4" filter="url(#cyan)"/>
    <path d="M504 906C676 860 808 764 988 836C1176 912 1268 1068 1548 1010" fill="none" stroke="#8B5CF6" stroke-opacity=".42" stroke-width="4" filter="url(#glow)"/>
    <path d="M630 1296C784 1194 956 1252 1084 1138C1206 1028 1346 1090 1508 932" fill="none" stroke="#F8FAFC" stroke-opacity=".18" stroke-width="2"/>
    <g fill="#22D3EE" filter="url(#cyan)">
      <circle cx="704" cy="1012" r="8"/>
      <circle cx="914" cy="924" r="10"/>
      <circle cx="1166" cy="800" r="8"/>
      <circle cx="1328" cy="714" r="9"/>
      <circle cx="988" cy="836" r="7"/>
      <circle cx="1268" cy="1068" r="8"/>
      <circle cx="1084" cy="1138" r="9"/>
    </g>
  </g>
  <g id="innerRings" fill="none" stroke-linecap="round">
    <circle cx="1024" cy="1024" r="566" stroke="#8B5CF6" stroke-opacity=".2" stroke-width="2" stroke-dasharray="10 28"/>
    <circle cx="1024" cy="1024" r="642" stroke="#22D3EE" stroke-opacity=".18" stroke-width="2" stroke-dasharray="4 24"/>
  </g>
  <g id="energy">
    <circle cx="824" cy="748" r="72" fill="#F8FAFC" fill-opacity=".12" filter="url(#cyan)"/>
    <circle cx="782" cy="708" r="18" fill="#F8FAFC" fill-opacity=".74"/>
    <circle cx="1252" cy="1320" r="110" fill="#8B5CF6" fill-opacity=".12" filter="url(#glow)"/>
  </g>
  <g opacity=".8" fill="#F8FAFC" filter="url(#glow)">
    <circle cx="330" cy="540" r="3"/>
    <circle cx="492" cy="350" r="2"/>
    <circle cx="1612" cy="420" r="2.8"/>
    <circle cx="1764" cy="1194" r="3.2"/>
    <circle cx="440" cy="1512" r="2.4"/>
    <circle cx="1458" cy="1664" r="2.8"/>
  </g>
</svg>
