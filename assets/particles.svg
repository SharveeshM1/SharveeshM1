<svg xmlns="http://www.w3.org/2000/svg" width="3840" height="2160" viewBox="0 0 3840 2160" role="img" aria-labelledby="title desc">
  <title id="title">Premium holographic particle field</title>
  <desc id="desc">A black 4K particle field with minimal purple and cyan glows, depth layers, and holographic motion paths.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="72%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="58%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#04060A"/>
    </radialGradient>
    <radialGradient id="purpleFog" cx="30%" cy="40%" r="42%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity=".2"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cyanFog" cx="70%" cy="54%" r="44%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity=".16"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="trace" x1="420" y1="1720" x2="3340" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#22D3EE" stop-opacity=".72"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 .133 0 0 0 0 .827 0 0 0 0 .933 0 0 0 .75 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="purple" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 .545 0 0 0 0 .361 0 0 0 0 .965 0 0 0 .72 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      @keyframes floatA{0%,100%{transform:translate3d(0,0,0)}50%{transform:translate3d(22px,-36px,0)}}
      @keyframes floatB{0%,100%{transform:translate3d(0,0,0)}50%{transform:translate3d(-28px,22px,0)}}
      @keyframes dash{to{stroke-dashoffset:-620}}
      #near{animation:floatA 8s ease-in-out infinite}
      #far{animation:floatB 12s ease-in-out infinite}
      .trace{animation:dash 9s linear infinite}
      @media (prefers-reduced-motion:reduce){*{animation:none!important}}
    </style>
  </defs>
  <rect width="3840" height="2160" fill="url(#bg)"/>
  <rect width="3840" height="2160" fill="url(#purpleFog)"/>
  <rect width="3840" height="2160" fill="url(#cyanFog)"/>
  <g opacity=".28" fill="none" stroke-linecap="round">
    <path class="trace" d="M372 1476C850 1176 1198 1396 1662 1064C2144 720 2680 798 3470 438" stroke="url(#trace)" stroke-width="3" stroke-dasharray="18 34"/>
    <path class="trace" d="M450 620C1032 888 1274 558 1812 814C2308 1052 2758 1342 3416 1112" stroke="url(#trace)" stroke-width="2" stroke-dasharray="10 28"/>
    <path class="trace" d="M642 1836C1194 1590 1608 1740 2088 1450C2568 1160 2874 1562 3398 1314" stroke="#8B5CF6" stroke-opacity=".34" stroke-width="2" stroke-dasharray="14 30"/>
  </g>
  <g id="far" opacity=".58" filter="url(#purple)">
    <circle cx="258" cy="342" r="2.2" fill="#F8FAFC"/>
    <circle cx="512" cy="1058" r="2.8" fill="#8B5CF6"/>
    <circle cx="730" cy="590" r="2.4" fill="#22D3EE"/>
    <circle cx="910" cy="1510" r="2.2" fill="#F8FAFC"/>
    <circle cx="1148" cy="298" r="2.6" fill="#8B5CF6"/>
    <circle cx="1398" cy="1174" r="2.8" fill="#22D3EE"/>
    <circle cx="1660" cy="1826" r="2.4" fill="#F8FAFC"/>
    <circle cx="1848" cy="462" r="3" fill="#22D3EE"/>
    <circle cx="2134" cy="1048" r="2.2" fill="#8B5CF6"/>
    <circle cx="2422" cy="330" r="2.6" fill="#F8FAFC"/>
    <circle cx="2708" cy="1562" r="2.4" fill="#22D3EE"/>
    <circle cx="3022" cy="760" r="2.8" fill="#8B5CF6"/>
    <circle cx="3350" cy="438" r="2.2" fill="#F8FAFC"/>
    <circle cx="3548" cy="1738" r="3" fill="#22D3EE"/>
  </g>
  <g id="near" filter="url(#glow)">
    <circle cx="392" cy="1286" r="5" fill="#22D3EE"/>
    <circle cx="602" cy="822" r="4" fill="#8B5CF6"/>
    <circle cx="846" cy="1668" r="5.5" fill="#F8FAFC"/>
    <circle cx="1104" cy="1120" r="4.5" fill="#22D3EE"/>
    <circle cx="1360" cy="684" r="6" fill="#8B5CF6"/>
    <circle cx="1648" cy="958" r="4" fill="#F8FAFC"/>
    <circle cx="1920" cy="1328" r="7" fill="#22D3EE"/>
    <circle cx="2204" cy="730" r="4.5" fill="#8B5CF6"/>
    <circle cx="2488" cy="1184" r="5" fill="#F8FAFC"/>
    <circle cx="2788" cy="520" r="6" fill="#22D3EE"/>
    <circle cx="3062" cy="1432" r="4.5" fill="#8B5CF6"/>
    <circle cx="3340" cy="1034" r="5.5" fill="#F8FAFC"/>
    <circle cx="3572" cy="674" r="4" fill="#22D3EE"/>
  </g>
  <g opacity=".3" stroke="#F8FAFC" stroke-width="1" stroke-linecap="round">
    <path d="M392 1286L846 1668L1104 1120L1648 958L1920 1328L2488 1184L3062 1432" fill="none"/>
    <path d="M602 822L1360 684L1648 958L2204 730L2788 520L3572 674" fill="none"/>
  </g>
</svg>
