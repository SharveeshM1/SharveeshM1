<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="520" viewBox="0 0 2400 520" role="img" aria-labelledby="title desc">
  <title id="title">Current Focus</title>
  <desc id="desc">Current focus and engineering domains for Sharveesh M.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="0%" r="96%">
      <stop stop-color="#101522"/>
      <stop offset=".56" stop-color="#080B11"/>
      <stop offset="1" stop-color="#05070B"/>
    </radialGradient>
    <linearGradient id="hair" x1="120" y1="0" x2="2280" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE" stop-opacity="0"/>
      <stop offset=".5" stop-color="#64748B" stop-opacity=".52"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#22D3EE" stop-opacity=".36"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity=".36"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-45%" width="140%" height="190%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000000" flood-opacity=".34"/>
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#22D3EE" flood-opacity=".10"/>
    </filter>
    <style>
      .kicker{font:700 20px "IBM Plex Mono","Geist Mono",ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:6px;fill:#22D3EE}
      .h1{font:760 58px Geist,Satoshi,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#F8FAFC}
      .body{font:560 29px Geist,Satoshi,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#B7C2D0}
      .chip{font:650 21px Geist,Satoshi,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#DDE7F3}
      .small{font:650 22px Geist,Satoshi,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#A6B4C6}
    </style>
  </defs>
  <rect width="2400" height="520" rx="34" fill="url(#bg)"/>
  <rect x="1" y="1" width="2398" height="518" rx="34" fill="none" stroke="#1F2937" stroke-opacity=".62"/>
  <path d="M120 118H2280" stroke="url(#hair)" stroke-width="1.5"/>
  <g transform="translate(130 78)">
    <text class="kicker">CURRENT FOCUS</text>
    <text y="92" class="h1">HELIOS</text>
    <text y="148" class="body">Multi-agent infrastructure for LLM applications, tool calling,</text>
    <text y="194" class="body">context engineering and multi-provider orchestration.</text>
  </g>
  <g transform="translate(1660 118)" filter="url(#soft)">
    <rect width="600" height="168" rx="28" fill="#0B1020" fill-opacity=".74" stroke="url(#edge)" stroke-width="1.5"/>
    <text x="38" y="58" class="kicker" style="font-size:16px;letter-spacing:4px">SYSTEM SIGNAL</text>
    <text x="38" y="110" class="small">AI systems / backend infrastructure</text>
  </g>
  <path d="M120 330H2280" stroke="url(#hair)" stroke-width="1.5"/>
  <text x="130" y="392" class="kicker">ENGINEERING DOMAINS</text>
  <g transform="translate(130 430)" text-anchor="middle">
    <g><rect width="230" height="48" rx="24" fill="#0D1320" stroke="#22D3EE" stroke-opacity=".42"/><text x="115" y="31" class="chip">AI Systems</text></g>
    <g transform="translate(260)"><rect width="285" height="48" rx="24" fill="#0D1320" stroke="#8B5CF6" stroke-opacity=".42"/><text x="142" y="31" class="chip">LLM Applications</text></g>
    <g transform="translate(575)"><rect width="350" height="48" rx="24" fill="#0D1320" stroke="#22D3EE" stroke-opacity=".42"/><text x="175" y="31" class="chip">Backend Infrastructure</text></g>
    <g transform="translate(955)"><rect width="315" height="48" rx="24" fill="#0D1320" stroke="#8B5CF6" stroke-opacity=".42"/><text x="158" y="31" class="chip">Distributed Systems</text></g>
    <g transform="translate(1300)"><rect width="335" height="48" rx="24" fill="#0D1320" stroke="#22D3EE" stroke-opacity=".42"/><text x="168" y="31" class="chip">Context Engineering</text></g>
    <g transform="translate(1665)"><rect width="300" height="48" rx="24" fill="#0D1320" stroke="#8B5CF6" stroke-opacity=".42"/><text x="150" y="31" class="chip">Scalable Platforms</text></g>
  </g>
</svg>
