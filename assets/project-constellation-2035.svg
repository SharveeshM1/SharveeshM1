<svg xmlns="http://www.w3.org/2000/svg" width="3000" height="1450" viewBox="0 0 3000 1450" role="img" aria-labelledby="title desc">
  <title id="title">Project Constellation</title>
  <desc id="desc">Three distinct project worlds: purple HELIOS, gold MIDAS, and blue whole_app connected by deep-space constellation trails.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="80%">
      <stop stop-color="#111827"/>
      <stop offset=".55" stop-color="#070916"/>
      <stop offset="1" stop-color="#02030a"/>
    </radialGradient>
    <radialGradient id="purple" cx="42%" cy="32%" r="68%">
      <stop stop-color="#f8fafc"/>
      <stop offset=".1" stop-color="#c4b5fd"/>
      <stop offset=".38" stop-color="#8b5cf6"/>
      <stop offset=".76" stop-color="#3b0764"/>
      <stop offset="1" stop-color="#12051f"/>
    </radialGradient>
    <radialGradient id="gold" cx="38%" cy="30%" r="68%">
      <stop stop-color="#fff7ed"/>
      <stop offset=".14" stop-color="#fde68a"/>
      <stop offset=".48" stop-color="#f59e0b"/>
      <stop offset=".82" stop-color="#78350f"/>
      <stop offset="1" stop-color="#1c0b03"/>
    </radialGradient>
    <radialGradient id="blue" cx="40%" cy="30%" r="70%">
      <stop stop-color="#eff6ff"/>
      <stop offset=".13" stop-color="#93c5fd"/>
      <stop offset=".5" stop-color="#2563eb"/>
      <stop offset=".82" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#020617"/>
    </radialGradient>
    <linearGradient id="trail" x1="260" y1="980" x2="2740" y2="410" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee" stop-opacity=".16"/>
      <stop offset=".32" stop-color="#8b5cf6" stop-opacity=".76"/>
      <stop offset=".62" stop-color="#f59e0b" stop-opacity=".7"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity=".2"/>
    </linearGradient>
    <filter id="depth" x="-80%" y="-80%" width="260%" height="260%">
      <feDropShadow dx="0" dy="42" stdDeviation="54" flood-color="#000" flood-opacity=".58"/>
      <feDropShadow dx="0" dy="0" stdDeviation="32" flood-color="#8b5cf6" flood-opacity=".28"/>
    </filter>
    <filter id="goldGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feDropShadow dx="0" dy="42" stdDeviation="52" flood-color="#000" flood-opacity=".6"/>
      <feDropShadow dx="0" dy="0" stdDeviation="30" flood-color="#f59e0b" flood-opacity=".38"/>
    </filter>
    <filter id="blueGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feDropShadow dx="0" dy="42" stdDeviation="52" flood-color="#000" flood-opacity=".6"/>
      <feDropShadow dx="0" dy="0" stdDeviation="30" flood-color="#38bdf8" flood-opacity=".4"/>
    </filter>
    <style>
      .title{font:900 116px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;letter-spacing:0;fill:#f8fafc}
      .mono{font:800 25px "SFMono-Regular",Menlo,Consolas,monospace;letter-spacing:8px;fill:#67e8f9}
      .name{font:900 82px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#f8fafc}
      .copy{font:650 31px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#bdc8da}
      @keyframes driftA{0%,100%{transform:translate(0,0)}50%{transform:translate(0,-26px)}}
      @keyframes driftB{0%,100%{transform:translate(0,0)}50%{transform:translate(18px,22px)}}
      @keyframes orbit{to{stroke-dashoffset:-900}}
      .driftA{animation:driftA 8s ease-in-out infinite}
      .driftB{animation:driftB 10s ease-in-out infinite}
      .orbit{animation:orbit 12s linear infinite}
      @media (prefers-reduced-motion:reduce){*{animation:none!important}}
    </style>
  </defs>
  <rect width="3000" height="1450" fill="url(#bg)"/>
  <g opacity=".68">
    <circle cx="170" cy="178" r="3" fill="#fff"/><circle cx="430" cy="388" r="5" fill="#67e8f9"/><circle cx="2620" cy="228" r="4" fill="#fff"/><circle cx="2790" cy="850" r="7" fill="#a78bfa"/><circle cx="1250" cy="1220" r="5" fill="#fde68a"/><circle cx="560" cy="1040" r="4" fill="#fff"/><circle cx="2090" cy="1130" r="4" fill="#67e8f9"/>
    <path d="M2310 190L2554 106M290 1150L570 1026M2440 1180L2740 1070" stroke="#fff" stroke-width="5" stroke-linecap="round" opacity=".42"/>
  </g>
  <text x="160" y="142" class="mono">PROJECT CONSTELLATION</text>
  <text x="155" y="276" class="title">Three worlds. One orbiting system.</text>
  <path d="M430 910C820 560 1130 1110 1508 736C1900 348 2160 800 2570 500" fill="none" stroke="url(#trail)" stroke-width="5" stroke-dasharray="28 24" class="orbit"/>
  <path d="M530 440C910 690 1128 450 1490 704C1834 946 2170 508 2548 900" fill="none" stroke="#67e8f9" stroke-opacity=".18" stroke-width="3"/>

  <g class="driftA" transform="translate(650 780)" filter="url(#depth)">
    <ellipse rx="390" ry="92" fill="none" stroke="#a78bfa" stroke-opacity=".42" stroke-width="4" transform="rotate(-12)"/>
    <ellipse rx="300" ry="72" fill="none" stroke="#67e8f9" stroke-opacity=".22" stroke-width="3" transform="rotate(18)"/>
    <circle r="230" fill="url(#purple)"/>
    <path d="M-120 -20L0 -116L132 -18L92 118L-92 118Z" fill="none" stroke="#fff" stroke-opacity=".72" stroke-width="8"/>
    <path d="M-92 118L0 -8L92 118M0 -116V-8" stroke="#67e8f9" stroke-width="7" stroke-linecap="round"/>
    <text x="-205" y="340" class="name">HELIOS</text>
    <text x="-252" y="392" class="copy">Multi-agent AI platform</text>
  </g>

  <g class="driftB" transform="translate(1510 640)" filter="url(#goldGlow)">
    <ellipse rx="340" ry="80" fill="none" stroke="#fde68a" stroke-opacity=".44" stroke-width="4" transform="rotate(11)"/>
    <ellipse rx="255" ry="58" fill="none" stroke="#f59e0b" stroke-opacity=".3" stroke-width="3" transform="rotate(-24)"/>
    <circle r="205" fill="url(#gold)"/>
    <path d="M-100 -76H96L146 0L96 76H-100L-146 0Z" fill="none" stroke="#fff7ed" stroke-width="8" stroke-opacity=".76"/>
    <path d="M-76 0H76M0 -76V76" stroke="#fde68a" stroke-width="8" stroke-linecap="round"/>
    <text x="-142" y="318" class="name">MIDAS</text>
    <text x="-240" y="370" class="copy">AI-powered fintech engine</text>
  </g>

  <g class="driftA" transform="translate(2350 810)" filter="url(#blueGlow)">
    <ellipse rx="360" ry="86" fill="none" stroke="#93c5fd" stroke-opacity=".45" stroke-width="4" transform="rotate(-17)"/>
    <ellipse rx="275" ry="64" fill="none" stroke="#38bdf8" stroke-opacity=".3" stroke-width="3" transform="rotate(22)"/>
    <circle r="220" fill="url(#blue)"/>
    <path d="M-104 -84H104V84H-104Z" fill="none" stroke="#eff6ff" stroke-width="8" stroke-opacity=".76"/>
    <path d="M-52 -28H54M-52 24H54M-104 -84L104 84M104 -84L-104 84" stroke="#93c5fd" stroke-width="6" stroke-linecap="round"/>
    <text x="-208" y="334" class="name">whole_app</text>
    <text x="-255" y="386" class="copy">Full-stack product universe</text>
  </g>
</svg>
