<svg xmlns="http://www.w3.org/2000/svg" width="3600" height="1500" viewBox="0 0 3600 1500" role="img" aria-labelledby="title desc">
  <title id="title">Premium glass project windows</title>
  <desc id="desc">Three sharp Apple Vision Pro inspired glass windows for HELIOS, MIDAS, and whole_app.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="3600" y2="1500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/><stop offset=".55" stop-color="#030712"/><stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <radialGradient id="light" cx="50%" cy="45%" r="62%">
      <stop stop-color="#1D4ED8" stop-opacity=".16"/><stop offset=".44" stop-color="#7C3AED" stop-opacity=".08"/><stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC" stop-opacity=".12"/><stop offset=".5" stop-color="#0F172A" stop-opacity=".5"/><stop offset="1" stop-color="#020617" stop-opacity=".78"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="820" y2="820" gradientUnits="userSpaceOnUse"><stop stop-color="#C4B5FD"/><stop offset=".55" stop-color="#8B5CF6"/><stop offset="1" stop-color="#67E8F9"/></linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="820" y2="820" gradientUnits="userSpaceOnUse"><stop stop-color="#FDE68A"/><stop offset=".55" stop-color="#F59E0B"/><stop offset="1" stop-color="#FB923C"/></linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="820" y2="820" gradientUnits="userSpaceOnUse"><stop stop-color="#BFDBFE"/><stop offset=".55" stop-color="#2563EB"/><stop offset="1" stop-color="#38BDF8"/></linearGradient>
    <style>
      .display{font-family:"Clash Display","General Sans","Satoshi",-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-weight:900;letter-spacing:0;fill:#F8FAFC}
      .body{font-family:"General Sans","Satoshi",-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-weight:760;fill:#CBD5E1}
      .mono{font-family:"General Sans","Satoshi","SFMono-Regular",Menlo,Consolas,monospace;font-weight:850;letter-spacing:10px;fill:#67E8F9}
      .tag{font-family:"General Sans","Satoshi",-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-size:30px;font-weight:850;fill:#E2E8F0}
    </style>
  </defs>
  <rect width="3600" height="1500" fill="url(#bg)"/>
  <rect width="3600" height="1500" fill="url(#light)"/>
  <g opacity=".22" stroke="#334155"><path d="M0 375H3600M0 750H3600M0 1125H3600M720 0V1500M1440 0V1500M2160 0V1500M2880 0V1500"/></g>
  <text x="140" y="145" class="mono" font-size="24">PROJECT SYSTEMS</text>
  <text x="136" y="286" class="display" font-size="108">Production windows.</text>
  <text x="142" y="354" class="body" font-size="34">Three systems presented as software surfaces: readable, technical, and expensive.</text>
  <g transform="translate(210 500)">
    <rect x="0" y="0" width="980" height="720" rx="44" fill="url(#panel)" stroke="url(#purple)" stroke-width="3"/>
    <path d="M0 104H980" stroke="#334155" stroke-width="2"/><circle cx="58" cy="52" r="12" fill="#C4B5FD"/><circle cx="102" cy="52" r="12" fill="#8B5CF6"/><circle cx="146" cy="52" r="12" fill="#67E8F9"/>
    <text x="70" y="205" class="display" font-size="82">HELIOS</text>
    <text x="74" y="272" class="body" font-size="35">Multi-Agent AI Platform</text>
    <path d="M74 335H520" stroke="url(#purple)" stroke-width="4"/>
    <g class="tag"><text x="74" y="430">LangGraph</text><text x="74" y="492">RAG</text><text x="74" y="554">Tool Calling</text><text x="390" y="430">Context Eng.</text><text x="390" y="492">FastAPI</text></g>
    <path d="M710 260L828 328V464L710 532L592 464V328Z" fill="#020617" stroke="url(#purple)" stroke-width="5"/>
    <path d="M642 412L704 330L784 376L816 318M704 330L728 444L796 478" fill="none" stroke="#F8FAFC" stroke-width="9" stroke-linecap="round"/>
  </g>
  <g transform="translate(1310 500)">
    <rect x="0" y="0" width="980" height="720" rx="44" fill="url(#panel)" stroke="url(#gold)" stroke-width="3"/>
    <path d="M0 104H980" stroke="#334155" stroke-width="2"/><circle cx="58" cy="52" r="12" fill="#FDE68A"/><circle cx="102" cy="52" r="12" fill="#F59E0B"/><circle cx="146" cy="52" r="12" fill="#FB923C"/>
    <text x="70" y="205" class="display" font-size="82">MIDAS</text>
    <text x="74" y="272" class="body" font-size="35">Fintech Platform</text>
    <path d="M74 335H520" stroke="url(#gold)" stroke-width="4"/>
    <g class="tag"><text x="74" y="430">Spring Boot</text><text x="74" y="492">PostgreSQL</text><text x="74" y="554">Microservices</text></g>
    <path d="M598 338H830L888 430L830 522H598L540 430Z" fill="#020617" stroke="url(#gold)" stroke-width="5"/>
    <path d="M610 430H820M714 338V522" stroke="#FDE68A" stroke-width="9" stroke-linecap="round"/>
  </g>
  <g transform="translate(2410 500)">
    <rect x="0" y="0" width="980" height="720" rx="44" fill="url(#panel)" stroke="url(#blue)" stroke-width="3"/>
    <path d="M0 104H980" stroke="#334155" stroke-width="2"/><circle cx="58" cy="52" r="12" fill="#BFDBFE"/><circle cx="102" cy="52" r="12" fill="#2563EB"/><circle cx="146" cy="52" r="12" fill="#38BDF8"/>
    <text x="70" y="205" class="display" font-size="74">whole_app</text>
    <text x="74" y="272" class="body" font-size="35">Cross Platform Commerce Platform</text>
    <path d="M74 335H520" stroke="url(#blue)" stroke-width="4"/>
    <g class="tag"><text x="74" y="430">Flutter</text><text x="74" y="492">Firebase</text><text x="74" y="554">Realtime Systems</text></g>
    <rect x="582" y="326" width="276" height="212" rx="22" fill="#020617" stroke="url(#blue)" stroke-width="5"/>
    <path d="M632 382H808M632 448H808M582 326L858 538M858 326L582 538" stroke="#BFDBFE" stroke-width="8" stroke-linecap="round"/>
  </g>
</svg>
