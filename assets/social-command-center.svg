<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="260" viewBox="0 0 2400 260" role="img" aria-labelledby="title desc">
  <title id="title">Social Command Center</title>
  <desc id="desc">A compact neon command strip for Sharveesh M links.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="0%" r="95%">
      <stop stop-color="#11182d"/>
      <stop offset=".58" stop-color="#070b1d"/>
      <stop offset="1" stop-color="#050816"/>
    </radialGradient>
    <linearGradient id="edge" x1="120" y1="40" x2="2280" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee" stop-opacity=".45"/>
      <stop offset=".52" stop-color="#8b5cf6" stop-opacity=".38"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity=".18"/>
    </linearGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="2400" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset=".5" stop-color="#22d3ee" stop-opacity=".58"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-80%" width="160%" height="260%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000000" flood-opacity=".38"/>
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#22d3ee" flood-opacity=".22"/>
    </filter>
    <style>
      .mono{font:700 22px "IBM Plex Mono","Geist Mono",ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:6px;fill:#22d3ee}
      .h{font:760 54px Geist,Satoshi,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#f8fafc}
      .sub{font:560 24px Geist,Satoshi,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#aebbcc}
      .node{font:700 22px "IBM Plex Mono","Geist Mono",ui-monospace,SFMono-Regular,Menlo,monospace;fill:#dbeafe}
    </style>
  </defs>
  <rect width="2400" height="260" rx="34" fill="url(#bg)"/>
  <rect x="1" y="1" width="2398" height="258" rx="34" fill="none" stroke="url(#edge)" stroke-width="1.4"/>
  <path d="M130 216H2270" stroke="url(#hair)" stroke-width="1.5"/>
  <g opacity=".72">
    <circle cx="1910" cy="84" r="3" fill="#22d3ee"/>
    <circle cx="2048" cy="144" r="2.5" fill="#8b5cf6"/>
    <circle cx="2212" cy="76" r="3" fill="#f8fafc"/>
    <path d="M1910 84L2048 144L2212 76" fill="none" stroke="#22d3ee" stroke-opacity=".24" stroke-width="1.4"/>
  </g>
  <g transform="translate(130 72)">
    <text class="mono">SOCIAL COMMAND CENTER</text>
    <text y="76" class="h">Signal routes</text>
    <text x="470" y="76" class="sub">glass links below connect the public surface.</text>
  </g>
  <g transform="translate(1330 78)" filter="url(#glow)">
    <rect width="330" height="78" rx="22" fill="#0a1024" fill-opacity=".82" stroke="#22d3ee" stroke-opacity=".36"/>
    <text x="165" y="50" text-anchor="middle" class="node">LINKEDIN</text>
  </g>
  <g transform="translate(1690 78)" filter="url(#glow)">
    <rect width="250" height="78" rx="22" fill="#0a1024" fill-opacity=".82" stroke="#8b5cf6" stroke-opacity=".38"/>
    <text x="125" y="50" text-anchor="middle" class="node">GITHUB</text>
  </g>
  <g transform="translate(1970 78)" filter="url(#glow)">
    <rect width="300" height="78" rx="22" fill="#0a1024" fill-opacity=".82" stroke="#22d3ee" stroke-opacity=".36"/>
    <text x="150" y="50" text-anchor="middle" class="node">HELIOS</text>
  </g>
</svg>
