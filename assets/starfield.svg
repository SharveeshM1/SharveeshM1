<svg xmlns="http://www.w3.org/2000/svg" width="3840" height="2160" viewBox="0 0 3840 2160" role="img" aria-labelledby="title desc">
  <title id="title">Deep space AI startup starfield</title>
  <desc id="desc">A minimal black starfield with purple and cyan nebula glow, premium depth and subtle holographic points.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="72%">
      <stop offset="0%" stop-color="#121827"/>
      <stop offset="60%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#030409"/>
    </radialGradient>
    <radialGradient id="nebulaA" cx="32%" cy="42%" r="44%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity=".22"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebulaB" cx="68%" cy="54%" r="42%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity=".18"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 .133 0 0 0 0 .827 0 0 0 0 .933 0 0 0 .72 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes twinkle{0%,100%{opacity:.35}50%{opacity:1}}
      @keyframes drift{0%,100%{transform:translate3d(0,0,0)}50%{transform:translate3d(18px,-18px,0)}}
      #stars{animation:drift 14s ease-in-out infinite}
      .t{animation:twinkle 4.5s ease-in-out infinite}
      @media (prefers-reduced-motion:reduce){*{animation:none!important}}
    </style>
  </defs>
  <rect width="3840" height="2160" fill="url(#bg)"/>
  <rect width="3840" height="2160" fill="url(#nebulaA)"/>
  <rect width="3840" height="2160" fill="url(#nebulaB)"/>
  <g id="stars" filter="url(#glow)">
    <circle class="t" cx="280" cy="320" r="2.5" fill="#F8FAFC"/>
    <circle cx="520" cy="700" r="1.8" fill="#22D3EE"/>
    <circle class="t" cx="840" cy="430" r="2.2" fill="#8B5CF6"/>
    <circle cx="1080" cy="1180" r="2.4" fill="#F8FAFC"/>
    <circle class="t" cx="1320" cy="820" r="1.8" fill="#22D3EE"/>
    <circle cx="1580" cy="300" r="2.6" fill="#F8FAFC"/>
    <circle class="t" cx="1860" cy="1420" r="2.4" fill="#8B5CF6"/>
    <circle cx="2160" cy="620" r="2.8" fill="#22D3EE"/>
    <circle class="t" cx="2460" cy="1080" r="1.9" fill="#F8FAFC"/>
    <circle cx="2740" cy="360" r="2.2" fill="#8B5CF6"/>
    <circle class="t" cx="3040" cy="860" r="2.7" fill="#22D3EE"/>
    <circle cx="3340" cy="520" r="1.9" fill="#F8FAFC"/>
    <circle class="t" cx="3580" cy="1340" r="2.5" fill="#8B5CF6"/>
    <circle cx="420" cy="1660" r="2.2" fill="#22D3EE"/>
    <circle class="t" cx="760" cy="1900" r="2.6" fill="#F8FAFC"/>
    <circle cx="1260" cy="1720" r="1.8" fill="#8B5CF6"/>
    <circle class="t" cx="2320" cy="1840" r="2.4" fill="#22D3EE"/>
    <circle cx="2940" cy="1660" r="2.1" fill="#F8FAFC"/>
    <circle class="t" cx="3500" cy="1880" r="2.8" fill="#22D3EE"/>
  </g>
  <g opacity=".32" fill="none" stroke-linecap="round" filter="url(#glow)">
    <path d="M280 320L840 430L1320 820L2160 620L3040 860" stroke="#22D3EE" stroke-opacity=".28" stroke-width="2"/>
    <path d="M1080 1180L1860 1420L2460 1080L3580 1340" stroke="#8B5CF6" stroke-opacity=".3" stroke-width="2"/>
    <path d="M420 1660L760 1900L1260 1720L2320 1840L2940 1660L3500 1880" stroke="#F8FAFC" stroke-opacity=".14" stroke-width="2"/>
  </g>
</svg>
