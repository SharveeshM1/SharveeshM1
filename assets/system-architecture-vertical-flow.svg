<svg xmlns="http://www.w3.org/2000/svg" width="3200" height="2100" viewBox="0 0 3200 2100" role="img" aria-labelledby="title desc">
  <title id="title">System Architecture vertical flow</title>
  <desc id="desc">A giant Apple silicon inspired vertical architecture flow from frontend to backend, orchestration, knowledge, inference, and infrastructure.</desc>
  <defs>
    <radialGradient id="bg" cx="52%" cy="50%" r="82%"><stop stop-color="#172554"/><stop offset=".34" stop-color="#0b1029"/><stop offset=".72" stop-color="#030712"/><stop offset="1" stop-color="#010208"/></radialGradient>
    <radialGradient id="reactor" cx="50%" cy="50%" r="58%"><stop stop-color="#67e8f9" stop-opacity=".52"/><stop offset=".28" stop-color="#8b5cf6" stop-opacity=".24"/><stop offset="1" stop-color="#020617" stop-opacity="0"/></radialGradient>
    <linearGradient id="spine" x1="1600" y1="360" x2="1600" y2="1880" gradientUnits="userSpaceOnUse"><stop stop-color="#67e8f9"/><stop offset=".32" stop-color="#8b5cf6"/><stop offset=".62" stop-color="#f8fafc"/><stop offset="1" stop-color="#38bdf8"/></linearGradient>
    <linearGradient id="wafer" x1="900" y1="490" x2="2300" y2="1740" gradientUnits="userSpaceOnUse"><stop stop-color="#f8fafc" stop-opacity=".18"/><stop offset=".38" stop-color="#22d3ee" stop-opacity=".1"/><stop offset=".68" stop-color="#8b5cf6" stop-opacity=".16"/><stop offset="1" stop-color="#020617" stop-opacity=".08"/></linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%"><feDropShadow dx="0" dy="28" stdDeviation="32" flood-color="#000" flood-opacity=".52"/><feDropShadow dx="0" dy="0" stdDeviation="22" flood-color="#22d3ee" flood-opacity=".32"/></filter>
    <filter id="chipShadow" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="38" stdDeviation="34" flood-color="#000" flood-opacity=".46"/></filter>
    <style>
      .display{font-family:"Clash Display","Satoshi","General Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-weight:900;letter-spacing:0;fill:#f8fafc}
      .body{font-family:"Satoshi","General Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}
      .mono{font-family:"General Sans","SFMono-Regular",Menlo,Consolas,monospace;font-weight:800;letter-spacing:8px;fill:#67e8f9}
      @keyframes pulse{0%,100%{opacity:.34}50%{opacity:.9}}@keyframes flow{to{stroke-dashoffset:-900}}@keyframes scan{0%,100%{opacity:.18}50%{opacity:.62}}.pulse{animation:pulse 5s ease-in-out infinite}.flow{animation:flow 8s linear infinite}.scan{animation:scan 4s ease-in-out infinite}
      @media (prefers-reduced-motion:reduce){*{animation:none!important}}
    </style>
  </defs>
  <rect width="3200" height="2100" fill="url(#bg)"/>
  <ellipse cx="1600" cy="1130" rx="980" ry="840" fill="url(#reactor)" opacity=".46"/>
  <g opacity=".55"><circle cx="250" cy="220" r="4" fill="#fff"/><circle cx="2850" cy="330" r="5" fill="#67e8f9"/><circle cx="410" cy="1740" r="5" fill="#a78bfa"/><circle cx="2580" cy="1820" r="4" fill="#fff"/><path d="M2480 200L2860 80M330 1880L730 1700" stroke="#fff" stroke-width="5" stroke-linecap="round" opacity=".35"/></g>
  <text x="150" y="150" class="mono" font-size="24">SYSTEM ARCHITECTURE</text>
  <text x="145" y="292" class="display" font-size="112">Vertical silicon flow.</text>
  <text x="150" y="360" class="body" font-size="36" font-weight="700" fill="#c0cad8">A giant operating stack, not a dashboard: product surfaces descend into models, memory and infrastructure.</text>
  <path d="M1600 475V1840" fill="none" stroke="url(#spine)" stroke-width="9" stroke-linecap="round" stroke-dasharray="48 34" class="flow"/>
  <g class="scan" opacity=".28" stroke="#67e8f9" stroke-width="2"><path d="M820 460H2380M700 720H2500M610 980H2590M700 1240H2500M820 1500H2380M910 1760H2290"/><path d="M960 420V1870M1280 420V1870M1920 420V1870M2240 420V1870"/></g>
  <g filter="url(#chipShadow)" opacity=".22"><path d="M1010 430H2190L2390 620V1710L2190 1900H1010L810 1710V620Z" fill="none" stroke="#f8fafc" stroke-width="3"/></g>
  <g filter="url(#glow)" text-anchor="middle">
    <g transform="translate(1600 520)"><path d="M-520 -86H520L610 0L520 86H-520L-610 0Z" fill="url(#wafer)" stroke="#67e8f9" stroke-opacity=".64" stroke-width="4"/><text y="-8" class="display" font-size="64">Frontend</text><text y="48" class="body" font-size="28" font-weight="700" fill="#b8c4d6">Flutter / Next.js / Firebase clients</text></g>
    <g transform="translate(1600 780)"><path d="M-560 -88H560L650 0L560 88H-560L-650 0Z" fill="url(#wafer)" stroke="#8b5cf6" stroke-opacity=".66" stroke-width="4"/><text y="-8" class="display" font-size="64">Backend</text><text y="48" class="body" font-size="28" font-weight="700" fill="#b8c4d6">Spring Boot / FastAPI / Java / Python APIs</text></g>
    <g transform="translate(1600 1040)"><path d="M-600 -90H600L700 0L600 90H-600L-700 0Z" fill="url(#wafer)" stroke="#c4b5fd" stroke-opacity=".68" stroke-width="4"/><text y="-8" class="display" font-size="64">Orchestration</text><text y="48" class="body" font-size="28" font-weight="700" fill="#b8c4d6">Agents / tools / routing / context control</text></g>
    <g transform="translate(1600 1300)"><path d="M-560 -88H560L650 0L560 88H-560L-650 0Z" fill="url(#wafer)" stroke="#38bdf8" stroke-opacity=".64" stroke-width="4"/><text y="-8" class="display" font-size="64">Knowledge</text><text y="48" class="body" font-size="28" font-weight="700" fill="#b8c4d6">Embeddings / FAISS / Qdrant / Pinecone</text></g>
    <g transform="translate(1600 1560)"><path d="M-520 -86H520L610 0L520 86H-520L-610 0Z" fill="url(#wafer)" stroke="#f8fafc" stroke-opacity=".5" stroke-width="4"/><text y="-8" class="display" font-size="64">Inference</text><text y="48" class="body" font-size="28" font-weight="700" fill="#b8c4d6">OpenAI / Gemini / Claude / structured outputs</text></g>
    <g transform="translate(1600 1820)"><path d="M-500 -84H500L590 0L500 84H-500L-590 0Z" fill="url(#wafer)" stroke="#60a5fa" stroke-opacity=".6" stroke-width="4"/><text y="-8" class="display" font-size="64">Infrastructure</text><text y="48" class="body" font-size="28" font-weight="700" fill="#b8c4d6">Docker / Linux / GitHub Actions / PostgreSQL / Redis</text></g>
  </g>
  <g opacity=".26" stroke="#67e8f9" stroke-width="2"><path d="M730 520C1120 600 1280 710 1600 780C1980 860 2210 940 2510 1040"/><path d="M2480 520C2180 650 1940 840 1600 1040C1220 1265 1020 1460 690 1820"/><path d="M900 1300C1160 1200 1360 1340 1600 1560C1840 1780 2180 1680 2500 1820"/></g>
</svg>
