    <g class="planet" transform="translate(2120 1600)"><circle r="54" fill="#07111f" stroke="#f59e0b" stroke-width="3"/><path d="M-26 30L-12 -34L10 -10L28 30Z" fill="none" stroke="#f59e0b" stroke-width="6"/><text y="96" class="label">Firebase</text><text y="128" class="layer">FRONTEND</text></g>
    <g class="planet" transform="translate(250 1370)"><circle r="54" fill="#07111f" stroke="#60a5fa" stroke-width="3"/><path d="M-30 18H30M-22 18V-16M0 18V-32M22 18V-4" stroke="#60a5fa" stroke-width="7" stroke-linecap="round"/><text y="96" class="label">Docker</text><text y="128" class="layer">INFRA</text></g>
