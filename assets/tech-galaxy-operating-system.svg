    <g class="planet" transform="translate(360 1040)"><circle r="58" fill="#07111f" stroke="#38bdf8" stroke-width="3"/><path d="M-36 0C-14 -30 16 -30 36 0C14 30 -16 30 -36 0Z" fill="none" stroke="#38bdf8" stroke-width="6"/><circle r="8" fill="#fff"/><text y="100" class="label">Embeddings</text><text y="132" class="layer">KNOWLEDGE</text></g>
    <g class="planet" transform="translate(690 1330)"><circle r="58" fill="#07111f" stroke="#38bdf8" stroke-width="3"/><text y="12" class="label">F</text><path d="M-28 -26H30M-28 0H18M-28 26H8" stroke="#38bdf8" stroke-width="6" stroke-linecap="round"/><text y="100" class="label">FAISS</text><text y="132" class="layer">KNOWLEDGE</text></g>
    <g class="planet" transform="translate(1090 1470)"><circle r="58" fill="#07111f" stroke="#a78bfa" stroke-width="3"/><circle r="30" fill="none" stroke="#a78bfa" stroke-width="6"/><path d="M-18 -18L18 18M18 -18L-18 18" stroke="#a78bfa" stroke-width="5"/><text y="100" class="label">Qdrant</text><text y="132" class="layer">KNOWLEDGE</text></g>
    <g class="planet" transform="translate(590 930)"><circle r="58" fill="#07111f" stroke="#67e8f9" stroke-width="3"/><path d="M-30 -22L0 -38L30 -22V22L0 38L-30 22Z" fill="none" stroke="#67e8f9" stroke-width="6"/><text y="100" class="label">Pinecone</text><text y="132" class="layer">KNOWLEDGE</text></g>
