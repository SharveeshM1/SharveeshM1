<svg xmlns="http://www.w3.org/2000/svg" width="3600" height="1850" viewBox="0 0 3600 1850" role="img" aria-labelledby="title desc">
  <title id="title">Tech Galaxy operating system</title>
  <desc id="desc">AI, knowledge, backend, frontend, and infrastructure technologies orbit around HELIOS like planets rather than rows.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="82%"><stop stop-color="#172554"/><stop offset=".32" stop-color="#0b1029"/><stop offset=".68" stop-color="#050617"/><stop offset="1" stop-color="#02030a"/></radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="60%"><stop stop-color="#67e8f9" stop-opacity=".58"/><stop offset=".28" stop-color="#8b5cf6" stop-opacity=".26"/><stop offset="1" stop-color="#020617" stop-opacity="0"/></radialGradient>
    <radialGradient id="core" cx="50%" cy="45%" r="62%"><stop stop-color="#fff"/><stop offset=".12" stop-color="#67e8f9"/><stop offset=".38" stop-color="#8b5cf6" stop-opacity=".64"/><stop offset=".78" stop-color="#020617" stop-opacity=".08"/><stop offset="1" stop-color="#020617" stop-opacity="0"/></radialGradient>
    <linearGradient id="trail" x1="300" y1="1450" x2="3280" y2="360" gradientUnits="userSpaceOnUse"><stop stop-color="#22d3ee" stop-opacity=".12"/><stop offset=".36" stop-color="#8b5cf6" stop-opacity=".78"/><stop offset=".65" stop-color="#f8fafc" stop-opacity=".44"/><stop offset="1" stop-color="#38bdf8" stop-opacity=".18"/></linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%"><feDropShadow dx="0" dy="28" stdDeviation="30" flood-color="#000" flood-opacity=".5"/><feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#22d3ee" flood-opacity=".28"/></filter>
    <filter id="coreGlow" x="-80%" y="-80%" width="260%" height="260%"><feDropShadow dx="0" dy="44" stdDeviation="52" flood-color="#000" flood-opacity=".58"/><feDropShadow dx="0" dy="0" stdDeviation="36" flood-color="#8b5cf6" flood-opacity=".5"/><feDropShadow dx="0" dy="0" stdDeviation="24" flood-color="#22d3ee" flood-opacity=".42"/></filter>
    <style>
      .display{font-family:"Clash Display","Satoshi","General Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-weight:900;letter-spacing:0;fill:#f8fafc}
      .body{font-family:"Satoshi","General Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}
      .mono{font-family:"General Sans","SFMono-Regular",Menlo,Consolas,monospace;font-weight:800;letter-spacing:8px;fill:#67e8f9}
      .label{font:800 28px "Satoshi","General Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#edf7ff}.layer{font:800 18px "General Sans",monospace;letter-spacing:5px;fill:#94a3b8}
      @keyframes spin{to{transform:rotate(360deg)}}@keyframes back{to{transform:rotate(-360deg)}}@keyframes dash{to{stroke-dashoffset:-1500}}@keyframes shimmer{0%,100%{opacity:.22}50%{opacity:.8}}
      #ringA{animation:spin 64s linear infinite;transform-origin:1800px 1000px}#ringB{animation:back 86s linear infinite;transform-origin:1800px 1000px}.dash{animation:dash 12s linear infinite}
      .planet{transition:opacity .35s ease}.planet:hover{opacity:1}
      .field{animation:shimmer 6s ease-in-out infinite}
      svg:hover #ringA{animation-duration:36s}svg:hover #ringB{animation-duration:48s}
      @media (prefers-reduced-motion:reduce){*{animation:none!important}}
    </style>
  </defs>
  <rect width="3600" height="1850" fill="url(#bg)"/>
  <ellipse cx="1800" cy="1010" rx="1620" ry="670" fill="url(#halo)" opacity=".46"/>
  <g class="field" opacity=".36"><path d="M240 1180C760 940 1050 1220 1480 910C1900 610 2240 760 2620 620C3000 480 3260 520 3520 360" fill="none" stroke="#67e8f9" stroke-width="2"/><path d="M180 1370C710 1160 1010 1490 1540 1240C2100 970 2460 1320 3390 940" fill="none" stroke="#a78bfa" stroke-width="2"/></g>
  <g opacity=".65"><circle cx="210" cy="220" r="4" fill="#fff"/><circle cx="520" cy="520" r="5" fill="#67e8f9"/><circle cx="3200" cy="260" r="4" fill="#fff"/><circle cx="3020" cy="1260" r="6" fill="#a78bfa"/><path d="M2600 220L2960 92M390 1510L790 1360" stroke="#fff" stroke-width="5" stroke-linecap="round" opacity=".38"/></g>
  <text x="150" y="150" class="mono" font-size="25">TECH GALAXY</text>
  <text x="145" y="288" class="display" font-size="118">Everything orbits HELIOS.</text>
  <text x="150" y="356" class="body" font-size="36" font-weight="700" fill="#b8c4d6">No rows. No cards. A planetary stack of AI, knowledge, product and infrastructure systems.</text>
  <g id="ringA"><ellipse cx="1800" cy="1000" rx="1260" ry="390" fill="none" stroke="url(#trail)" stroke-width="5" stroke-dasharray="40 32" class="dash"/><ellipse cx="1800" cy="1000" rx="940" ry="285" fill="none" stroke="#8b5cf6" stroke-opacity=".26" stroke-width="4" transform="rotate(18 1800 1000)"/><ellipse cx="1800" cy="1000" rx="1510" ry="470" fill="none" stroke="#67e8f9" stroke-opacity=".16" stroke-width="3" transform="rotate(-13 1800 1000)"/></g>
  <g id="ringB"><ellipse cx="1800" cy="1000" rx="670" ry="205" fill="none" stroke="#f8fafc" stroke-opacity=".16" stroke-width="2" transform="rotate(43 1800 1000)"/><ellipse cx="1800" cy="1000" rx="1700" ry="520" fill="none" stroke="#a78bfa" stroke-opacity=".11" stroke-width="2" transform="rotate(7 1800 1000)"/></g>
  <circle cx="1800" cy="1000" r="380" fill="url(#core)"/>
  <g filter="url(#coreGlow)"><path d="M1800 650L2102 824V1174L1800 1348L1498 1174V824Z" fill="#050816" stroke="#67e8f9" stroke-opacity=".6" stroke-width="7"/><path d="M1638 936L1790 780L1960 854L2058 742M1790 780L1844 1038L2020 1130M1844 1038L1680 1218L1830 1300" fill="none" stroke="#f8fafc" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/><text x="1800" y="1468" text-anchor="middle" class="mono" font-size="22">HELIOS GRAVITY CORE</text></g>
  <g text-anchor="middle" filter="url(#glow)">
