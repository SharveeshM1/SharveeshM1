    <g transform="translate(820 510)"><circle r="74" fill="#07111F" stroke="#8B5CF6" stroke-width="4"/><path d="M0 -48L18 -14L54 0L18 14L0 50L-18 14L-54 0L-18 -14Z" fill="#8B5CF6"/><text y="122" class="label">Gemini</text><text y="158" class="layer">AI</text></g>
