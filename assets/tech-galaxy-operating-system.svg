    <g transform="translate(2860 1660)"><circle r="62" fill="#07111F" stroke="#8B5CF6" stroke-width="4"/><path d="M-34 -8H-8L4 22H34M4 22L22 -16" fill="none" stroke="#8B5CF6" stroke-width="7" stroke-linecap="round"/><text y="110" class="label">GitHub Actions</text><text y="146" class="layer">INFRA</text></g>
