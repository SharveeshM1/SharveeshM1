    <g transform="translate(3180 570)"><circle r="66" fill="#07111F" stroke="#93C5FD" stroke-width="4"/><ellipse rx="36" ry="13" cy="-26" fill="none" stroke="#93C5FD" stroke-width="7"/><path d="M-36 -26V26C-36 44 36 44 36 26V-26" fill="none" stroke="#93C5FD" stroke-width="7"/><text y="114" class="label">PostgreSQL</text><text y="150" class="layer">BACKEND</text></g>
