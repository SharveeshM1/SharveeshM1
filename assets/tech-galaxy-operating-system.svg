<svg xmlns="http://www.w3.org/2000/svg" width="3600" height="1900" viewBox="0 0 3600 1900" role="img" aria-labelledby="title desc">
  <title id="title">Premium technology constellation around HELIOS</title>
  <desc id="desc">A sharp constellation of AI, knowledge, backend, frontend, and infrastructure technologies arranged around a central HELIOS symbol.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="3600" y2="1900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/><stop offset=".55" stop-color="#030712"/><stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <radialGradient id="field" cx="50%" cy="50%" r="62%">
      <stop stop-color="#1D4ED8" stop-opacity=".22"/><stop offset=".36" stop-color="#7C3AED" stop-opacity=".12"/><stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cyanPurple" x1="860" y1="420" x2="2800" y2="1500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67E8F9"/><stop offset=".5" stop-color="#8B5CF6"/><stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="glass" x1="-80" y1="-80" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC" stop-opacity=".13"/><stop offset="1" stop-color="#0F172A" stop-opacity=".55"/>
    </linearGradient>
    <style>
      .display{font-family:"Clash Display","General Sans","Satoshi",-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-weight:900;letter-spacing:0;fill:#F8FAFC}
      .body{font-family:"General Sans","Satoshi",-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-weight:760;fill:#CBD5E1}
      .mono{font-family:"General Sans","Satoshi","SFMono-Regular",Menlo,Consolas,monospace;font-weight:850;letter-spacing:10px;fill:#67E8F9}
      .label{font-family:"General Sans","Satoshi",-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-size:32px;font-weight:850;fill:#F8FAFC}
      .layer{font-family:"General Sans","Satoshi",monospace;font-size:17px;font-weight:850;letter-spacing:5px;fill:#94A3B8}
      @keyframes trace{to{stroke-dashoffset:-1000}}@keyframes spin{to{transform:rotate(360deg)}}
      .trace{animation:trace 20s linear infinite}#orbitSystem{animation:spin 120s linear infinite;transform-origin:1800px 1040px}
      @media (prefers-reduced-motion:reduce){*{animation:none!important}}
    </style>
  </defs>
  <rect width="3600" height="1900" fill="url(#bg)"/>
  <rect width="3600" height="1900" fill="url(#field)"/>
  <g opacity=".22" stroke="#334155"><path d="M0 475H3600M0 950H3600M0 1425H3600M720 0V1900M1440 0V1900M2160 0V1900M2880 0V1900"/></g>
  <text x="140" y="150" class="mono" font-size="24">TECHNOLOGY CONSTELLATION</text>
  <text x="136" y="292" class="display" font-size="110">Systems orbit the core.</text>
  <text x="142" y="360" class="body" font-size="34">Production AI, retrieval, backend, frontend, and infrastructure tools arranged as one engineering field.</text>
  <g id="orbitSystem" fill="none">
    <ellipse cx="1800" cy="1040" rx="1260" ry="390" stroke="#67E8F9" stroke-opacity=".22" stroke-width="3"/>
    <ellipse cx="1800" cy="1040" rx="960" ry="300" stroke="#8B5CF6" stroke-opacity=".34" stroke-width="5" stroke-dasharray="54 46" class="trace" transform="rotate(-12 1800 1040)"/>
    <ellipse cx="1800" cy="1040" rx="1540" ry="500" stroke="#64748B" stroke-opacity=".28" stroke-width="2" transform="rotate(10 1800 1040)"/>
    <ellipse cx="1800" cy="1040" rx="700" ry="220" stroke="#38BDF8" stroke-opacity=".24" stroke-width="2" transform="rotate(32 1800 1040)"/>
  </g>
  <g stroke="#38BDF8" stroke-opacity=".28" stroke-width="2" fill="none">
    <path d="M520 1010C900 620 1280 1420 1800 1040C2300 680 2620 1280 3160 880"/>
    <path d="M620 620C1000 860 1340 660 1800 1040C2220 1390 2660 1080 3160 1320"/>
  </g>
  <g transform="translate(1800 1040)">
    <circle r="270" fill="#020617" stroke="url(#cyanPurple)" stroke-width="6"/>
    <circle r="218" fill="none" stroke="#334155" stroke-width="2"/>
    <path d="M0 -170L147 -85V85L0 170L-147 85V-85Z" fill="url(#glass)" stroke="#67E8F9" stroke-opacity=".6" stroke-width="4"/>
    <path d="M-70 32L-4 -86L88 -30L118 -112M-4 -86L24 44L108 82M24 44L-50 126" fill="none" stroke="#F8FAFC" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
