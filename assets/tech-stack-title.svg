<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="210" viewBox="0 0 2400 210" role="img" aria-labelledby="title desc">
  <title id="title">Tech Stack Wall</title>
  <desc id="desc">Compact high-contrast title for the technology stack wall.</desc>
  <defs>
    <linearGradient id="line" x1="120" y1="150" x2="2280" y2="60" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B5CF6" stop-opacity=".1"/>
      <stop offset=".48" stop-color="#22D3EE" stop-opacity=".9"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity=".1"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-100%" width="140%" height="300%"><feGaussianBlur stdDeviation="10" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="2400" height="210" fill="#0D1117"/>
  <path d="M120 126H2280" stroke="url(#line)" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  <text x="1200" y="96" text-anchor="middle" font-family="Arial Black, Impact, Arial, sans-serif" font-size="68" font-weight="900" fill="#F8FAFC">TECH STACK WALL</text>
  <text x="1200" y="158" text-anchor="middle" font-family="Courier New, monospace" font-size="25" font-weight="700" fill="#22D3EE" letter-spacing="7">AI / BACKEND / FRONTEND / DEVOPS</text>
</svg>
