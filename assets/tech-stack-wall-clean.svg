<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1700" viewBox="0 0 1600 1700" role="img" aria-labelledby="title desc">
  <title id="title">Tech Stack Wall</title>
  <desc id="desc">Four clean technology stack cards with readable labels for AI, backend, frontend, and DevOps cloud technologies.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070B14"/>
      <stop offset="0.56" stop-color="#0B1020"/>
      <stop offset="1" stop-color="#070B14"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827" stop-opacity=".92"/>
      <stop offset="1" stop-color="#0B1020" stop-opacity=".88"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#22D3EE" stop-opacity=".76"/>
      <stop offset=".52" stop-color="#8B5CF6" stop-opacity=".62"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity=".26"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-25%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000000" flood-opacity=".42"/>
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#22D3EE" flood-opacity=".12"/>
    </filter>
    <style>
      .title{font:800 42px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#F8FAFC}
      .section{font:800 34px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#F8FAFC}
      .meta{font:600 19px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#8EA0B8}
      .label{font:750 21px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#E5E7EB}
      .icon{font:900 22px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#07111F}
      .line{stroke:#263244;stroke-width:1.5}
    </style>
  </defs>

  <rect width="1600" height="1700" rx="28" fill="url(#bg)"/>
  <rect x="1" y="1" width="1598" height="1698" rx="28" fill="none" stroke="#263244" stroke-width="2"/>
  <text x="80" y="90" class="title">Tech Stack Wall</text>
  <text x="80" y="126" class="meta">Readable, grouped, and intentionally spaced. Full names stay visible at GitHub width.</text>

