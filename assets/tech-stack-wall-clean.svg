      <g transform="translate(280 0)"><rect width="260" height="58" rx="14" fill="#0E1A2D" stroke="#8B5CF6" stroke-opacity=".36"/><circle cx="32" cy="29" r="18" fill="#8B5CF6"/><text x="32" y="36" text-anchor="middle" class="icon">C</text><text x="62" y="37" class="label">Claude</text></g>
