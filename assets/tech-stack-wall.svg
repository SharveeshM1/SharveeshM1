<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1680" viewBox="0 0 2400 1680" role="img" aria-labelledby="title desc">
  <title id="title">Massive technology stack wall</title>
  <desc id="desc">A premium glassmorphism wall listing AI, backend, frontend, and DevOps technologies in purple and cyan.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="78%"><stop offset="0%" stop-color="#151026"/><stop offset="56%" stop-color="#0D1117"/><stop offset="100%" stop-color="#05070B"/></radialGradient>
    <linearGradient id="edge" x1="180" y1="180" x2="2220" y2="1500" gradientUnits="userSpaceOnUse"><stop stop-color="#F8FAFC" stop-opacity=".16"/><stop offset=".48" stop-color="#22D3EE" stop-opacity=".5"/><stop offset="1" stop-color="#8B5CF6" stop-opacity=".26"/></linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#F8FAFC" stop-opacity=".12"/><stop offset=".52" stop-color="#22D3EE" stop-opacity=".05"/><stop offset="1" stop-color="#8B5CF6" stop-opacity=".11"/></linearGradient>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse"><path d="M80 0H0V80" fill="none" stroke="#22D3EE" stroke-opacity=".045" stroke-width="1"/></pattern>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="10" result="b"/><feColorMatrix in="b" type="matrix" values="0 0 0 0 .133 0 0 0 0 .827 0 0 0 0 .933 0 0 0 .66 0"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="depth" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="26" stdDeviation="30" flood-color="#000" flood-opacity=".55"/><feDropShadow dx="0" dy="0" stdDeviation="14" flood-color="#8B5CF6" flood-opacity=".2"/></filter>
    <style>
      .display{font-family:"Space Grotesk","Inter",system-ui,sans-serif}
      .mono{font-family:"JetBrains Mono","IBM Plex Mono",ui-monospace,monospace}
      .title{font-size:44px;font-weight:700;fill:#F8FAFC}
      .label{font-size:27px;fill:#F8FAFC;fill-opacity:.86}
      .small{font-size:22px;fill:#22D3EE;letter-spacing:4px}
    </style>
  </defs>
  <rect width="2400" height="1680" fill="url(#bg)"/>
  <rect width="2400" height="1680" fill="url(#grid)" opacity=".8"/>
  <text x="1200" y="116" text-anchor="middle" class="display" font-size="72" font-weight="700" fill="#F8FAFC">Tech Stack Wall</text>
  <text x="1200" y="170" text-anchor="middle" class="mono small">AI STACK / BACKEND STACK / FRONTEND STACK / DEVOPS STACK</text>
  <g filter="url(#depth)">
    <rect x="110" y="230" width="1060" height="650" rx="28" fill="#111827" fill-opacity=".52" stroke="url(#edge)" stroke-width="3"/>
    <rect x="1230" y="230" width="1060" height="650" rx="28" fill="#111827" fill-opacity=".52" stroke="url(#edge)" stroke-width="3"/>
    <rect x="110" y="940" width="1060" height="560" rx="28" fill="#111827" fill-opacity=".52" stroke="url(#edge)" stroke-width="3"/>
    <rect x="1230" y="940" width="1060" height="560" rx="28" fill="#111827" fill-opacity=".52" stroke="url(#edge)" stroke-width="3"/>
  </g>
  <g class="display">
    <text x="180" y="318" class="title">AI Stack</text>
    <text x="1300" y="318" class="title">Backend Stack</text>
    <text x="180" y="1028" class="title">Frontend Stack</text>
    <text x="1300" y="1028" class="title">DevOps Stack</text>
  </g>
  <g class="display label" filter="url(#glow)">
    <g>
      <rect x="180" y="370" width="180" height="82" rx="16" fill="url(#chip)" stroke="#22D3EE" stroke-opacity=".22"/><text x="270" y="422" text-anchor="middle">OpenAI</text>
      <rect x="390" y="370" width="220" height="82" rx="16" fill="url(#chip)" stroke="#22D3EE" stroke-opacity=".22"/><text x="500" y="422" text-anchor="middle">LangChain</text>
      <rect x="640" y="370" width="210" height="82" rx="16" fill="url(#chip)" stroke="#22D3EE" stroke-opacity=".22"/><text x="745" y="422" text-anchor="middle">LangGraph</text>
      <rect x="880" y="370" width="180" height="82" rx="16" fill="url(#chip)" stroke="#22D3EE" stroke-opacity=".22"/><text x="970" y="422" text-anchor="middle">Gemini</text>
      <rect x="180" y="490" width="180" height="82" rx="16" fill="url(#chip)" stroke="#8B5CF6" stroke-opacity=".24"/><text x="270" y="542" text-anchor="middle">Claude</text>
      <rect x="390" y="490" width="250" height="82" rx="16" fill="url(#chip)" stroke="#8B5CF6" stroke-opacity=".24"/><text x="515" y="542" text-anchor="middle">HuggingFace</text>
      <rect x="670" y="490" width="170" height="82" rx="16" fill="url(#chip)" stroke="#8B5CF6" stroke-opacity=".24"/><text x="755" y="542" text-anchor="middle">Ollama</text>
      <rect x="870" y="490" width="190" height="82" rx="16" fill="url(#chip)" stroke="#8B5CF6" stroke-opacity=".24"/><text x="965" y="542" text-anchor="middle">Pinecone</text>
      <rect x="180" y="610" width="170" height="82" rx="16" fill="url(#chip)" stroke="#22D3EE" stroke-opacity=".22"/><text x="265" y="662" text-anchor="middle">Qdrant</text>
      <rect x="380" y="610" width="150" height="82" rx="16" fill="url(#chip)" stroke="#22D3EE" stroke-opacity=".22"/><text x="455" y="662" text-anchor="middle">FAISS</text>
      <rect x="560" y="610" width="180" height="82" rx="16" fill="url(#chip)" stroke="#22D3EE" stroke-opacity=".22"/><text x="650" y="662" text-anchor="middle">PyTorch</text>
      <rect x="770" y="610" width="290" height="82" rx="16" fill="url(#chip)" stroke="#22D3EE" stroke-opacity=".22"/><text x="915" y="662" text-anchor="middle">Scikit-learn</text>
      <rect x="180" y="730" width="230" height="82" rx="16" fill="url(#chip)" stroke="#8B5CF6" stroke-opacity=".24"/><text x="295" y="782" text-anchor="middle">TensorFlow</text>
      <rect x="440" y="730" width="270" height="82" rx="16" fill="url(#chip)" stroke="#8B5CF6" stroke-opacity=".24"/><text x="575" y="782" text-anchor="middle">Transformers</text>
    </g>
    <g>
      <rect x="1300" y="370" width="230" height="82" rx="16" fill="url(#chip)" stroke="#22D3EE" stroke-opacity=".22"/><text x="1415" y="422" text-anchor="middle">Spring Boot</text>
      <rect x="1560" y="370" width="140" height="82" rx="16" fill="url(#chip)" stroke="#22D3EE" stroke-opacity=".22"/><text x="1630" y="422" text-anchor="middle">Java</text>
      <rect x="1730" y="370" width="170" height="82" rx="16" fill="url(#chip)" stroke="#22D3EE" stroke-opacity=".22"/><text x="1815" y="422" text-anchor="middle">Python</text>
      <rect x="1930" y="370" width="170" height="82" rx="16" fill="url(#chip)" stroke="#22D3EE" stroke-opacity=".22"/><text x="2015" y="422" text-anchor="middle">FastAPI</text>
      <rect x="1300" y="490" width="170" height="82" rx="16" fill="url(#chip)" stroke="#8B5CF6" stroke-opacity=".24"/><text x="1385" y="542" text-anchor="middle">Node.js</text>
      <rect x="1500" y="490" width="170" height="82" rx="16" fill="url(#chip)" stroke="#8B5CF6" stroke-opacity=".24"/><text x="1585" y="542" text-anchor="middle">Express</text>
      <rect x="1700" y="490" width="230" height="82" rx="16" fill="url(#chip)" stroke="#8B5CF6" stroke-opacity=".24"/><text x="1815" y="542" text-anchor="middle">PostgreSQL</text>
      <rect x="1960" y="490" width="190" height="82" rx="16" fill="url(#chip)" stroke="#8B5CF6" stroke-opacity=".24"/><text x="2055" y="542" text-anchor="middle">MongoDB</text>
      <rect x="1300" y="610" width="150" height="82" rx="16" fill="url(#chip)" stroke="#22D3EE" stroke-opacity=".22"/><text x="1375" y="662" text-anchor="middle">Redis</text>
      <rect x="1480" y="610" width="150" height="82" rx="16" fill="url(#chip)" stroke="#22D3EE" stroke-opacity=".22"/><text x="1555" y="662" text-anchor="middle">Kafka</text>
      <rect x="1660" y="610" width="160" height="82" rx="16" fill="url(#chip)" stroke="#22D3EE" stroke-opacity=".22"/><text x="1740" y="662" text-anchor="middle">Docker</text>
      <rect x="1850" y="610" width="200" height="82" rx="16" fill="url(#chip)" stroke="#22D3EE" stroke-opacity=".22"/><text x="1950" y="662" text-anchor="middle">RabbitMQ</text>
    </g>
    <g>
      <rect x="180" y="1080" width="160" height="82" rx="16" fill="url(#chip)" stroke="#22D3EE" stroke-opacity=".22"/><text x="260" y="1132" text-anchor="middle">Flutter</text>
      <rect x="370" y="1080" width="130" height="82" rx="16" fill="url(#chip)" stroke="#22D3EE" stroke-opacity=".22"/><text x="435" y="1132" text-anchor="middle">Dart</text>
      <rect x="530" y="1080" width="170" height="82" rx="16" fill="url(#chip)" stroke="#22D3EE" stroke-opacity=".22"/><text x="615" y="1132" text-anchor="middle">Next.js</text>
      <rect x="730" y="1080" width="150" height="82" rx="16" fill="url(#chip)" stroke="#22D3EE" stroke-opacity=".22"/><text x="805" y="1132" text-anchor="middle">React</text>
      <rect x="180" y="1200" width="210" height="82" rx="16" fill="url(#chip)" stroke="#8B5CF6" stroke-opacity=".24"/><text x="285" y="1252" text-anchor="middle">TailwindCSS</text>
      <rect x="420" y="1200" width="180" height="82" rx="16" fill="url(#chip)" stroke="#8B5CF6" stroke-opacity=".24"/><text x="510" y="1252" text-anchor="middle">Firebase</text>
      <rect x="630" y="1200" width="210" height="82" rx="16" fill="url(#chip)" stroke="#8B5CF6" stroke-opacity=".24"/><text x="735" y="1252" text-anchor="middle">TypeScript</text>
    </g>
    <g>
      <rect x="1300" y="1080" width="110" height="82" rx="16" fill="url(#chip)" stroke="#22D3EE" stroke-opacity=".22"/><text x="1355" y="1132" text-anchor="middle">Git</text>
      <rect x="1440" y="1080" width="150" height="82" rx="16" fill="url(#chip)" stroke="#22D3EE" stroke-opacity=".22"/><text x="1515" y="1132" text-anchor="middle">GitHub</text>
      <rect x="1620" y="1080" width="260" height="82" rx="16" fill="url(#chip)" stroke="#22D3EE" stroke-opacity=".22"/><text x="1750" y="1132" text-anchor="middle">GitHub Actions</text>
      <rect x="1910" y="1080" width="140" height="82" rx="16" fill="url(#chip)" stroke="#22D3EE" stroke-opacity=".22"/><text x="1980" y="1132" text-anchor="middle">Linux</text>
      <rect x="1300" y="1200" width="120" height="82" rx="16" fill="url(#chip)" stroke="#8B5CF6" stroke-opacity=".24"/><text x="1360" y="1252" text-anchor="middle">AWS</text>
      <rect x="1450" y="1200" width="120" height="82" rx="16" fill="url(#chip)" stroke="#8B5CF6" stroke-opacity=".24"/><text x="1510" y="1252" text-anchor="middle">GCP</text>
      <rect x="1600" y="1200" width="150" height="82" rx="16" fill="url(#chip)" stroke="#8B5CF6" stroke-opacity=".24"/><text x="1675" y="1252" text-anchor="middle">Vercel</text>
      <rect x="1780" y="1200" width="150" height="82" rx="16" fill="url(#chip)" stroke="#8B5CF6" stroke-opacity=".24"/><text x="1855" y="1252" text-anchor="middle">VSCode</text>
    </g>
  </g>
</svg>
