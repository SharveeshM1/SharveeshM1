<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1380" viewBox="0 0 2400 1380" role="img" aria-labelledby="title desc">
  <title id="title">Tech Stack Wall</title>
  <desc id="desc">Categorized technology wall for AI, backend, frontend, DevOps and cloud.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="0%" r="105%">
      <stop stop-color="#101a35"/>
      <stop offset=".58" stop-color="#070b1d"/>
      <stop offset="1" stop-color="#050816"/>
    </radialGradient>
    <linearGradient id="edge" x1="130" y1="170" x2="2270" y2="1180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee" stop-opacity=".38"/>
      <stop offset=".5" stop-color="#8b5cf6" stop-opacity=".42"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity=".2"/>
    </linearGradient>
    <filter id="card" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="20" stdDeviation="26" flood-color="#000000" flood-opacity=".36"/>
    </filter>
    <style>
      .mono{font:700 20px "IBM Plex Mono","Geist Mono",ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:5px;fill:#22d3ee}
      .h{font:760 58px Geist,Satoshi,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#f8fafc}
      .sub{font:560 27px Geist,Satoshi,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#aebbcc}
      .head{font:760 32px Geist,Satoshi,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#f8fafc}
      .icon{font:740 23px Geist,Satoshi,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#e5eefc}
      .chip{font:650 20px Geist,Satoshi,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#dbeafe}
    </style>
  </defs>
  <rect width="2400" height="1380" rx="34" fill="url(#bg)"/>
  <rect x="1" y="1" width="2398" height="1378" rx="34" fill="none" stroke="#1f2a44" stroke-opacity=".72"/>
  <text x="130" y="92" class="mono">TECH STACK WALL</text>
  <text x="130" y="170" class="h">Aligned by system layer.</text>
  <text x="130" y="220" class="sub">Compact categories, no duplicate walls, no broken external icons.</text>

  <g transform="translate(130 300)" filter="url(#card)">
    <rect width="2140" height="285" rx="30" fill="#0a1024" fill-opacity=".84" stroke="url(#edge)" stroke-width="1.5"/>
    <text x="42" y="62" class="head">AI Stack</text>
    <g transform="translate(42 96)">
      <g><rect width="146" height="68" rx="18" fill="#10172a" stroke="#22d3ee" stroke-opacity=".3"/><text x="73" y="43" text-anchor="middle" class="icon">OpenAI</text></g>
      <g transform="translate(164)"><rect width="146" height="68" rx="18" fill="#10172a" stroke="#8b5cf6" stroke-opacity=".32"/><text x="73" y="43" text-anchor="middle" class="icon">Gemini</text></g>
      <g transform="translate(328)"><rect width="146" height="68" rx="18" fill="#10172a" stroke="#22d3ee" stroke-opacity=".3"/><text x="73" y="43" text-anchor="middle" class="icon">Claude</text></g>
      <g transform="translate(492)"><rect width="166" height="68" rx="18" fill="#10172a" stroke="#8b5cf6" stroke-opacity=".32"/><text x="83" y="43" text-anchor="middle" class="icon">LangChain</text></g>
      <g transform="translate(676)"><rect width="166" height="68" rx="18" fill="#10172a" stroke="#22d3ee" stroke-opacity=".3"/><text x="83" y="43" text-anchor="middle" class="icon">LangGraph</text></g>
      <g transform="translate(860)"><rect width="188" height="68" rx="18" fill="#10172a" stroke="#8b5cf6" stroke-opacity=".32"/><text x="94" y="43" text-anchor="middle" class="icon">HuggingFace</text></g>
      <g transform="translate(1066)"><rect width="132" height="68" rx="18" fill="#10172a" stroke="#22d3ee" stroke-opacity=".3"/><text x="66" y="43" text-anchor="middle" class="icon">Ollama</text></g>
      <g transform="translate(1216)"><rect width="146" height="68" rx="18" fill="#10172a" stroke="#8b5cf6" stroke-opacity=".32"/><text x="73" y="43" text-anchor="middle" class="icon">Pinecone</text></g>
      <g transform="translate(1380)"><rect width="132" height="68" rx="18" fill="#10172a" stroke="#22d3ee" stroke-opacity=".3"/><text x="66" y="43" text-anchor="middle" class="icon">Qdrant</text></g>
      <g transform="translate(1530)"><rect width="132" height="68" rx="18" fill="#10172a" stroke="#8b5cf6" stroke-opacity=".32"/><text x="66" y="43" text-anchor="middle" class="icon">PyTorch</text></g>
      <g transform="translate(1680)"><rect width="166" height="68" rx="18" fill="#10172a" stroke="#22d3ee" stroke-opacity=".3"/><text x="83" y="43" text-anchor="middle" class="icon">TensorFlow</text></g>
    </g>
    <text x="42" y="218" class="chip">Embeddings   RAG   Prompt Engineering   Tool Calling   Structured Outputs   Context Engineering   Multi-Agent Systems   Transformers   Scikit-Learn</text>
  </g>

  <g transform="translate(130 635)" filter="url(#card)">
    <rect width="2140" height="210" rx="30" fill="#0a1024" fill-opacity=".84" stroke="url(#edge)" stroke-width="1.5"/>
    <text x="42" y="62" class="head">Backend</text>
    <text x="42" y="118" class="icon">Java   Python   Spring Boot   FastAPI   NodeJS   Express   PostgreSQL   MongoDB   Redis   Kafka   RabbitMQ   Docker</text>
    <text x="42" y="170" class="chip">REST APIs   Microservices   Distributed Systems   Event Driven Systems</text>
  </g>

  <g transform="translate(130 895)" filter="url(#card)">
    <rect width="1030" height="225" rx="30" fill="#0a1024" fill-opacity=".84" stroke="url(#edge)" stroke-width="1.5"/>
    <text x="42" y="62" class="head">Frontend</text>
    <text x="42" y="124" class="icon">Flutter   Dart   NextJS   React</text>
    <text x="42" y="176" class="icon">TypeScript   TailwindCSS   Firebase   HTML   CSS</text>
  </g>

  <g transform="translate(1240 895)" filter="url(#card)">
    <rect width="1030" height="225" rx="30" fill="#0a1024" fill-opacity=".84" stroke="url(#edge)" stroke-width="1.5"/>
    <text x="42" y="62" class="head">DevOps + Cloud</text>
    <text x="42" y="124" class="icon">Git   GitHub   GitHub Actions   Linux   Docker</text>
    <text x="42" y="176" class="icon">AWS   GCP   Vercel   VSCode</text>
  </g>

  <g transform="translate(130 1190)" filter="url(#card)">
    <rect width="2140" height="92" rx="30" fill="#081223" fill-opacity=".82" stroke="#22d3ee" stroke-opacity=".24"/>
    <text x="42" y="58" class="chip">Systems are grouped by execution path: product surface, API plane, orchestration layer, memory layer, inference providers, deployment substrate.</text>
  </g>
</svg>
