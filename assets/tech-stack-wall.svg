<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1540" viewBox="0 0 2400 1540" role="img" aria-labelledby="title desc">
  <title id="title">Master Tech Stack Wall</title>
  <desc id="desc">One master technology dashboard grouped by AI, backend, frontend, DevOps, cloud, and languages.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="44%" r="78%"><stop offset="0%" stop-color="#151026"/><stop offset="58%" stop-color="#0D1117"/><stop offset="100%" stop-color="#05070B"/></radialGradient>
    <linearGradient id="edge" x1="120" y1="200" x2="2280" y2="1320" gradientUnits="userSpaceOnUse"><stop stop-color="#8B5CF6" stop-opacity=".18"/><stop offset=".52" stop-color="#22D3EE" stop-opacity=".68"/><stop offset="1" stop-color="#8B5CF6" stop-opacity=".24"/></linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#F8FAFC" stop-opacity=".12"/><stop offset=".5" stop-color="#22D3EE" stop-opacity=".05"/><stop offset="1" stop-color="#8B5CF6" stop-opacity=".14"/></linearGradient>
    <filter id="depth" x="-30%" y="-40%" width="160%" height="180%"><feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#000" flood-opacity=".56"/><feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#22D3EE" flood-opacity=".24"/></filter>
    <style>.display{font-family:"Arial Black","Impact",Arial,sans-serif}.mono{font-family:"Courier New",monospace}.h{font-size:38px;font-weight:900;fill:#F8FAFC}.l{font-size:19px;font-weight:700;fill:#F8FAFC}.i{font-size:28px;font-weight:900;fill:#22D3EE}</style>
  </defs>
  <rect width="2400" height="1540" fill="url(#bg)"/>
