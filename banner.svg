<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="520" viewBox="0 0 1400 520" role="img" aria-labelledby="title desc">
  <title id="title">Sharveesh M animated isometric GitHub profile banner</title>
  <desc id="desc">A dark isometric skyline built from contribution metrics with glowing gradient text, floating columns, orbiting particles, and an animated underline.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050816"/>
      <stop offset="0.48" stop-color="#0B1026"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="0.52" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="faceA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="faceB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="faceC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#D97706"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.15 0 0 0 0 0.85 0 0 0 0 1 0 0 0 0.55 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="24" stdDeviation="18" flood-color="#020617" flood-opacity="0.58"/>
    </filter>
    <clipPath id="clip">
      <rect width="1400" height="520" rx="36"/>
    </clipPath>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace; }
      .grid { stroke: #1F2A44; stroke-width: 1; opacity: 0.55; }
      .metric { fill: #94A3B8; font-size: 20px; letter-spacing: 0; }
      .label { fill: #CBD5E1; font-size: 15px; letter-spacing: 0; }
      .tiny { fill: #64748B; font-size: 12px; letter-spacing: 0; }
    </style>
  </defs>

  <g clip-path="url(#clip)">
    <rect width="1400" height="520" fill="url(#bg)"/>
    <path d="M0 402 C240 326 361 458 548 386 C772 300 913 414 1115 340 C1237 296 1331 294 1400 316 L1400 520 L0 520 Z" fill="#0F172A" opacity="0.72"/>
    <path d="M0 98 C222 38 409 143 610 82 C843 12 980 128 1185 70 C1279 43 1352 47 1400 58" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.28"/>

    <g opacity="0.7">
      <path class="grid" d="M714 434 L1014 284 L1314 434 L1014 584 Z"/>
      <path class="grid" d="M784 399 L1084 549"/>
      <path class="grid" d="M854 364 L1154 514"/>
      <path class="grid" d="M924 329 L1224 479"/>
      <path class="grid" d="M994 294 L1294 444"/>
      <path class="grid" d="M784 469 L1084 319"/>
      <path class="grid" d="M854 504 L1154 354"/>
      <path class="grid" d="M924 539 L1224 389"/>
    </g>

    <g transform="translate(755 190)" filter="url(#softShadow)">
      <g>
        <animateTransform attributeName="transform" type="translate" values="0 0;0 -10;0 0" dur="5.5s" repeatCount="indefinite"/>
        <polygon points="60,188 116,160 172,188 116,216" fill="#172554"/>
        <polygon points="60,54 116,26 116,160 60,188" fill="url(#faceA)"/>
        <polygon points="116,26 172,54 172,188 116,160" fill="#1D4ED8"/>
        <polygon points="60,54 116,26 172,54 116,82" fill="#7DD3FC"/>
        <text x="116" y="246" text-anchor="middle" class="mono label">143 contributions</text>
      </g>
      <g transform="translate(178 48)">
        <animateTransform attributeName="transform" type="translate" values="0 -4;0 9;0 -4" dur="6.8s" repeatCount="indefinite" additive="sum"/>
        <polygon points="54,138 103,113 152,138 103,163" fill="#2E1065"/>
        <polygon points="54,48 103,23 103,113 54,138" fill="url(#faceB)"/>
        <polygon points="103,23 152,48 152,138 103,113" fill="#5B21B6"/>
        <polygon points="54,48 103,23 152,48 103,73" fill="#C4B5FD"/>
        <text x="103" y="193" text-anchor="middle" class="mono label">35 commits</text>
      </g>
      <g transform="translate(330 92)">
        <animateTransform attributeName="transform" type="translate" values="0 3;0 -12;0 3" dur="6.1s" repeatCount="indefinite" additive="sum"/>
        <polygon points="45,94 87,73 129,94 87,115" fill="#451A03"/>
        <polygon points="45,46 87,25 87,73 45,94" fill="url(#faceC)"/>
        <polygon points="87,25 129,46 129,94 87,73" fill="#B45309"/>
        <polygon points="45,46 87,25 129,46 87,67" fill="#FDE68A"/>
        <text x="87" y="145" text-anchor="middle" class="mono label">6 day streak</text>
      </g>
      <g transform="translate(467 132)">
        <animateTransform attributeName="transform" type="translate" values="0 -4;0 9;0 -4" dur="6.8s" repeatCount="indefinite" additive="sum"/>
        <polygon points="38,62 72,45 106,62 72,79" fill="#082F49"/>
        <polygon points="38,38 72,21 72,45 38,62" fill="#22D3EE"/>
        <polygon points="72,21 106,38 106,62 72,45" fill="#0891B2"/>
        <polygon points="38,38 72,21 106,38 72,55" fill="#A5F3FC"/>
        <text x="72" y="108" text-anchor="middle" class="mono label">0 stars</text>
      </g>
    </g>

    <g transform="translate(82 108)">
      <text class="sans" x="0" y="0" font-size="76" font-weight="800" fill="url(#accent)" filter="url(#glow)">Sharveesh M</text>
      <rect x="3" y="23" width="520" height="5" rx="3" fill="url(#accent)">
        <animate attributeName="width" values="0;520;520;0" dur="7s" repeatCount="indefinite"/>
      </rect>
      <text class="mono" x="0" y="82" font-size="25" fill="#E2E8F0">AI Engineer Intern | Flutter Developer Intern</text>
      <text class="mono" x="0" y="122" font-size="25" fill="#94A3B8">Full-Stack Systems Builder</text>
      <text class="sans" x="0" y="190" font-size="28" fill="#F8FAFC" font-weight="650">Building systems that think, ship, and scale.</text>
      <text class="mono metric" x="0" y="246">LLM orchestration / backend reliability / polished product UX</text>
    </g>

    <g filter="url(#glow)">
      <circle cx="1138" cy="99" r="5" fill="#22D3EE">
        <animateMotion dur="12s" repeatCount="indefinite" path="M0,0 C40,-35 91,-16 122,14 C81,47 29,40 0,0"/>
      </circle>
      <circle cx="1014" cy="149" r="4" fill="#8B5CF6">
        <animateMotion dur="10s" repeatCount="indefinite" path="M0,0 C-38,28 -74,-8 -33,-43 C14,-53 42,-20 0,0"/>
      </circle>
      <circle cx="1245" cy="246" r="4" fill="#F59E0B">
        <animateMotion dur="14s" repeatCount="indefinite" path="M0,0 C46,22 54,66 10,86 C-35,61 -31,17 0,0"/>
      </circle>
    </g>

    <g opacity="0.38">
      <circle cx="119" cy="421" r="2" fill="#22D3EE"/>
      <circle cx="250" cy="64" r="2" fill="#8B5CF6"/>
      <circle cx="617" cy="444" r="2" fill="#F59E0B"/>
      <circle cx="1340" cy="150" r="2" fill="#22D3EE"/>
    </g>
  </g>
</svg>
