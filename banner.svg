<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="520" viewBox="0 0 1400 520" role="img" aria-labelledby="title desc">
  <title id="title">Sharveesh M GitHub profile hero banner</title>
  <desc id="desc">Animated isometric skyline with crisp text for Sharveesh M, AI Engineer Intern, Flutter Developer Intern, and Full-Stack Systems Builder.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050816"/>
      <stop offset="0.54" stop-color="#0B1026"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="0.52" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="cyanFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#67E8F9"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="violetFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C4B5FD"/>
      <stop offset="1" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="amberFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FDE68A"/>
      <stop offset="1" stop-color="#D97706"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="170%" height="180%">
      <feDropShadow dx="0" dy="22" stdDeviation="16" flood-color="#020617" flood-opacity="0.62"/>
    </filter>
    <filter id="textGlow" x="-20%" y="-30%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.13 0 0 0 0 0.83 0 0 0 0 0.93 0 0 0 0.42 0"/>
    </filter>
    <filter id="particleGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="clip">
      <rect width="1400" height="520" rx="30"/>
    </clipPath>
    <style>
      .display { font-family: "Segoe UI", Helvetica, Arial, system-ui, sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Consolas, "Courier New", monospace; }
      .grid { stroke: #24304F; stroke-width: 1; opacity: 0.62; }
      .label { fill: #CBD5E1; font-size: 15px; }
      .muted { fill: #94A3B8; font-size: 20px; }
    </style>
  </defs>
  <g clip-path="url(#clip)">
    <rect width="1400" height="520" fill="url(#bg)"/>
    <path d="M0 402 C240 326 361 458 548 386 C772 300 913 414 1115 340 C1237 296 1331 294 1400 316 L1400 520 L0 520 Z" fill="#0F172A" opacity="0.72"/>
    <path d="M0 95 C218 39 409 142 610 82 C843 12 980 128 1185 70 C1279 43 1352 47 1400 58" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.28"/>

    <g opacity="0.72">
      <path class="grid" d="M708 434 L1014 281 L1320 434 L1014 587 Z"/>
      <path class="grid" d="M778 399 L1084 552"/>
      <path class="grid" d="M848 364 L1154 517"/>
      <path class="grid" d="M918 329 L1224 482"/>
      <path class="grid" d="M988 294 L1294 447"/>
      <path class="grid" d="M778 469 L1084 316"/>
      <path class="grid" d="M848 504 L1154 351"/>
      <path class="grid" d="M918 539 L1224 386"/>
    </g>

    <g transform="translate(760 188)" filter="url(#shadow)" shape-rendering="geometricPrecision" text-rendering="optimizeLegibility">
      <g>
        <animateTransform attributeName="transform" type="translate" values="0 0;0 -10;0 0" dur="5.8s" repeatCount="indefinite"/>
        <polygon points="56,190 116,160 176,190 116,220" fill="#172554"/>
        <polygon points="56,55 116,25 116,160 56,190" fill="url(#cyanFace)"/>
        <polygon points="116,25 176,55 176,190 116,160" fill="#1D4ED8"/>
        <polygon points="56,55 116,25 176,55 116,85" fill="#A5F3FC"/>
        <text x="116" y="248" text-anchor="middle" class="mono label">143 contributions</text>
      </g>
      <g transform="translate(178 49)">
        <animateTransform attributeName="transform" type="translate" values="0 -4;0 9;0 -4" dur="6.7s" repeatCount="indefinite" additive="sum"/>
        <polygon points="54,139 103,114 152,139 103,164" fill="#2E1065"/>
        <polygon points="54,48 103,23 103,114 54,139" fill="url(#violetFace)"/>
        <polygon points="103,23 152,48 152,139 103,114" fill="#5B21B6"/>
        <polygon points="54,48 103,23 152,48 103,73" fill="#DDD6FE"/>
        <text x="103" y="194" text-anchor="middle" class="mono label">37 commits</text>
      </g>
      <g transform="translate(332 92)">
        <animateTransform attributeName="transform" type="translate" values="0 3;0 -12;0 3" dur="6.2s" repeatCount="indefinite" additive="sum"/>
        <polygon points="45,95 87,74 129,95 87,116" fill="#451A03"/>
        <polygon points="45,46 87,25 87,74 45,95" fill="url(#amberFace)"/>
        <polygon points="87,25 129,46 129,95 87,74" fill="#B45309"/>
        <polygon points="45,46 87,25 129,46 87,67" fill="#FEF3C7"/>
        <text x="87" y="146" text-anchor="middle" class="mono label">6 day streak</text>
      </g>
    </g>

    <g transform="translate(82 108)" text-rendering="optimizeLegibility" shape-rendering="geometricPrecision">
      <text class="display" x="0" y="0" font-size="76" font-weight="800" fill="#22D3EE" opacity="0.34" filter="url(#textGlow)">Sharveesh M</text>
      <text class="display" x="0" y="0" font-size="76" font-weight="800" fill="url(#accent)">Sharveesh M</text>
      <rect x="3" y="24" width="520" height="5" rx="3" fill="url(#accent)">
        <animate attributeName="width" values="0;520;520;0" dur="7s" repeatCount="indefinite"/>
      </rect>
      <text class="mono" x="0" y="83" font-size="25" fill="#E2E8F0">AI Engineer Intern | Flutter Developer Intern</text>
      <text class="mono" x="0" y="123" font-size="25" fill="#94A3B8">Full-Stack Systems Builder</text>
      <text class="display" x="0" y="190" font-size="28" fill="#F8FAFC" font-weight="650">Building systems that think, ship, and scale.</text>
      <text class="mono muted" x="0" y="246">LLM orchestration / backend reliability / polished product UX</text>
    </g>

    <g filter="url(#particleGlow)">
      <circle cx="1138" cy="99" r="5" fill="#22D3EE">
        <animateMotion dur="12s" repeatCount="indefinite" path="M0,0 C40,-35 91,-16 122,14 C81,47 29,40 0,0"/>
      </circle>
      <circle cx="1014" cy="149" r="4" fill="#8B5CF6">
        <animateMotion dur="10s" repeatCount="indefinite" path="M0,0 C-38,28 -74,-8 -33,-43 C14,-53 42,-20 0,0"/>
      </circle>
      <circle cx="1245" cy="246" r="4" fill="#F59E0B">
        <animateMotion dur="14s" repeatCount="indefinite" path="M0,0 C46,22 54,66 10,86 C-35,61 -31,17 0,0"/>
      </circle>
    </g>
  </g>
</svg>
