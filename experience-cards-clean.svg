<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="250" viewBox="0 0 1000 250" role="img" aria-labelledby="title desc">
  <title id="title">Experience</title>
  <desc id="desc">Two clean experience panels for Itomata and Rablo with compact focus lists.</desc>
  <defs>
    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#b85c38" stop-opacity="0"/>
      <stop offset=".5" stop-color="#f1c7a8" stop-opacity=".9"/>
      <stop offset="1" stop-color="#b85c38" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <g font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif">
    <g>
      <rect x="48" y="28" width="424" height="188" rx="3" fill="#0d1117" stroke="#30363d"/>
      <rect x="48" y="28" width="424" height="1" fill="#30363d"/>
      <rect x="48" y="28" width="88" height="1" fill="url(#scan)">
        <animate attributeName="x" values="48;384;48" dur="5s" repeatCount="indefinite"/>
      </rect>
      <text x="72" y="64" fill="#f1c7a8" font-size="12" font-weight="700" letter-spacing="1.8">ITOMATA</text>
      <text x="72" y="93" fill="#e6edf3" font-size="20" font-weight="650">AI Engineer Intern</text>
      <text x="72" y="121" fill="#8b949e" font-size="13" font-weight="600">June 2026 - Present</text>
      <text x="72" y="150" fill="#dbe3ee" font-size="13" font-weight="600">LLM-powered systems</text>
      <text x="72" y="171" fill="#dbe3ee" font-size="13" font-weight="600">Autonomous workflows</text>
      <text x="72" y="192" fill="#dbe3ee" font-size="13" font-weight="600">Production AI features</text>
      <circle cx="62" cy="149" r="2.5" fill="#b85c38"/>
      <circle cx="62" cy="170" r="2.5" fill="#c07a3f"/>
      <circle cx="62" cy="191" r="2.5" fill="#7a9f68"/>
    </g>
    <g>
      <rect x="528" y="28" width="424" height="188" rx="3" fill="#0d1117" stroke="#30363d"/>
      <rect x="528" y="28" width="424" height="1" fill="#30363d"/>
      <rect x="528" y="28" width="88" height="1" fill="url(#scan)">
        <animate attributeName="x" values="528;864;528" dur="5s" begin=".6s" repeatCount="indefinite"/>
      </rect>
      <text x="552" y="64" fill="#f1c7a8" font-size="12" font-weight="700" letter-spacing="1.8">RABLO</text>
      <text x="552" y="93" fill="#e6edf3" font-size="20" font-weight="650">Flutter Developer Intern</text>
      <text x="552" y="121" fill="#8b949e" font-size="13" font-weight="600">May 2026 - Present</text>
      <text x="552" y="150" fill="#dbe3ee" font-size="13" font-weight="600">Scalable mobile experiences</text>
      <text x="552" y="171" fill="#dbe3ee" font-size="13" font-weight="600">Clean architecture</text>
      <text x="552" y="192" fill="#dbe3ee" font-size="13" font-weight="600">Performance-focused UI</text>
      <circle cx="542" cy="149" r="2.5" fill="#b85c38"/>
      <circle cx="542" cy="170" r="2.5" fill="#c07a3f"/>
      <circle cx="542" cy="191" r="2.5" fill="#7a9f68"/>
    </g>
  </g>
</svg>
