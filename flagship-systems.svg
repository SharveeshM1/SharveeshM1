<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="360" viewBox="0 0 1000 360" role="img" aria-labelledby="title desc">
  <title id="title">Flagship Systems</title>
  <desc id="desc">A restrained three-column summary of HELIOS, MIDAS PAY, and WHOLE2.</desc>
  <defs>
    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#b85c38" stop-opacity="0"/>
      <stop offset=".5" stop-color="#f1c7a8" stop-opacity=".9"/>
      <stop offset="1" stop-color="#b85c38" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <g font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif">
    <rect x="32" y="26" width="936" height="292" rx="3" fill="#0d1117" stroke="#30363d"/>
    <rect x="32" y="26" width="936" height="1" fill="#30363d"/>
    <rect x="32" y="26" width="126" height="1" fill="url(#scan)">
      <animate attributeName="x" values="32;842;32" dur="5.8s" repeatCount="indefinite"/>
    </rect>
    <path d="M344 58 V286 M656 58 V286" stroke="#30363d"/>
    <g transform="translate(62 58)">
      <text x="0" y="0" fill="#f1c7a8" font-size="12" font-weight="700" letter-spacing="1.8">HELIOS</text>
      <text x="0" y="31" fill="#e6edf3" font-size="18" font-weight="650">Multi-agent AI OS</text>
      <text x="0" y="72" fill="#8b949e" font-size="11" font-weight="700" letter-spacing="1.2">WHAT</text>
      <text x="0" y="96" fill="#dbe3ee" font-size="13" font-weight="560">Planning, retrieval, memory,</text>
      <text x="0" y="116" fill="#dbe3ee" font-size="13" font-weight="560">execution, and evaluation loops.</text>
      <text x="0" y="158" fill="#8b949e" font-size="11" font-weight="700" letter-spacing="1.2">STACK</text>
      <text x="0" y="182" fill="#dbe3ee" font-size="12.5" font-weight="600">Python · FastAPI · LangGraph · FAISS</text>
      <text x="0" y="224" fill="#8b949e" font-size="11" font-weight="700" letter-spacing="1.2">IMPACT</text>
      <text x="0" y="248" fill="#dbe3ee" font-size="13" font-weight="560">Observable, retryable workflows.</text>
    </g>
    <g transform="translate(374 58)">
      <text x="0" y="0" fill="#f1c7a8" font-size="12" font-weight="700" letter-spacing="1.8">MIDAS PAY</text>
      <text x="0" y="31" fill="#e6edf3" font-size="18" font-weight="650">AI fintech ledger</text>
      <text x="0" y="72" fill="#8b949e" font-size="11" font-weight="700" letter-spacing="1.2">WHAT</text>
      <text x="0" y="96" fill="#dbe3ee" font-size="13" font-weight="560">Event-driven ledger with</text>
      <text x="0" y="116" fill="#dbe3ee" font-size="13" font-weight="560">transaction intelligence.</text>
      <text x="0" y="158" fill="#8b949e" font-size="11" font-weight="700" letter-spacing="1.2">STACK</text>
      <text x="0" y="182" fill="#dbe3ee" font-size="12.5" font-weight="600">Spring Boot · Kafka · PostgreSQL</text>
      <text x="0" y="202" fill="#dbe3ee" font-size="12.5" font-weight="600">Flutter</text>
      <text x="0" y="224" fill="#8b949e" font-size="11" font-weight="700" letter-spacing="1.2">IMPACT</text>
      <text x="0" y="248" fill="#dbe3ee" font-size="13" font-weight="560">Reliable balance state at scale.</text>
    </g>
    <g transform="translate(686 58)">
      <text x="0" y="0" fill="#f1c7a8" font-size="12" font-weight="700" letter-spacing="1.8">WHOLE2</text>
      <text x="0" y="31" fill="#e6edf3" font-size="18" font-weight="650">Commerce platform</text>
      <text x="0" y="72" fill="#8b949e" font-size="11" font-weight="700" letter-spacing="1.2">WHAT</text>
      <text x="0" y="96" fill="#dbe3ee" font-size="13" font-weight="560">Cross-platform seller tools</text>
      <text x="0" y="116" fill="#dbe3ee" font-size="13" font-weight="560">with reusable mobile UI.</text>
      <text x="0" y="158" fill="#8b949e" font-size="11" font-weight="700" letter-spacing="1.2">STACK</text>
      <text x="0" y="182" fill="#dbe3ee" font-size="12.5" font-weight="600">Flutter · Firebase · Dart</text>
      <text x="0" y="202" fill="#dbe3ee" font-size="12.5" font-weight="600">Riverpod</text>
      <text x="0" y="224" fill="#8b949e" font-size="11" font-weight="700" letter-spacing="1.2">IMPACT</text>
      <text x="0" y="248" fill="#dbe3ee" font-size="13" font-weight="560">Modular UX under</text>
      <text x="0" y="268" fill="#dbe3ee" font-size="13" font-weight="560">weak networks.</text>
    </g>
  </g>
</svg>
