      <rect x="24" y="26" width="90" height="36" rx="4" fill="#2a211c"/>
      <rect x="114" y="26" width="156" height="36" rx="4" fill="#b85c38"/>
      <text x="69" y="49" fill="#ffffff" font-size="14" font-weight="800" text-anchor="middle" letter-spacing="2">WHOLE2</text>
      <text x="192" y="49" fill="#ffffff" font-size="13" font-weight="800" text-anchor="middle" letter-spacing="2">COMMERCE</text>
      <text x="24" y="100" fill="#f1c7a8" font-size="12" font-weight="800" letter-spacing="2">WHAT</text>
      <text x="24" y="130" fill="#e6edf3" font-size="17" font-weight="700">Cross-platform commerce</text>
      <text x="24" y="155" fill="#e6edf3" font-size="17" font-weight="700">platform with seller tools</text>
      <text x="24" y="180" fill="#e6edf3" font-size="17" font-weight="700">and reusable mobile UI.</text>
      <text x="24" y="226" fill="#f1c7a8" font-size="12" font-weight="800" letter-spacing="2">STACK</text>
      <text x="24" y="255" fill="#e6edf3" font-size="16" font-weight="760">Flutter · Firebase</text>
      <text x="24" y="280" fill="#e6edf3" font-size="16" font-weight="760">Dart · Riverpod</text>
      <text x="24" y="326" fill="#f1c7a8" font-size="12" font-weight="800" letter-spacing="2">IMPACT</text>
      <text x="24" y="355" fill="#e6edf3" font-size="17" font-weight="700">Modular marketplace UX</text>
      <text x="24" y="380" fill="#e6edf3" font-size="17" font-weight="700">under unreliable networks.</text>
