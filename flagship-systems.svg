<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="470" viewBox="0 0 1000 470" role="img" aria-labelledby="title desc">
  <title id="title">Flagship Systems</title>
  <desc id="desc">HELIOS, MIDAS PAY, and WHOLE2 flagship system cards with highlighted stack and impact sections.</desc>
  <defs>
    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d97757" stop-opacity="0"/>
      <stop offset=".5" stop-color="#f1c7a8" stop-opacity="1"/>
      <stop offset="1" stop-color="#d97757" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-90%" width="180%" height="280%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Inter, Helvetica, Arial, sans-serif">
    <g transform="translate(28 28)">
      <rect width="296" height="390" rx="8" fill="#0d1117" stroke="#30363d"/>
      <rect width="296" height="3" fill="#b85c38"/>
      <rect width="82" height="3" fill="url(#scan)" filter="url(#glow)">
        <animate attributeName="x" values="0;214;0" dur="4.8s" repeatCount="indefinite"/>
      </rect>
      <rect x="24" y="26" width="94" height="36" rx="4" fill="#2a211c"/>
      <rect x="118" y="26" width="150" height="36" rx="4" fill="#b85c38"/>
      <text x="71" y="49" fill="#ffffff" font-size="14" font-weight="800" text-anchor="middle" letter-spacing="2">HELIOS</text>
      <text x="193" y="49" fill="#ffffff" font-size="13" font-weight="800" text-anchor="middle" letter-spacing="2">AI OS</text>
      <text x="24" y="100" fill="#f1c7a8" font-size="12" font-weight="800" letter-spacing="2">WHAT</text>
      <text x="24" y="130" fill="#e6edf3" font-size="17" font-weight="700">Multi-agent AI operating</text>
      <text x="24" y="155" fill="#e6edf3" font-size="17" font-weight="700">system with planning,</text>
      <text x="24" y="180" fill="#e6edf3" font-size="17" font-weight="700">memory, execution, eval.</text>
      <text x="24" y="226" fill="#f1c7a8" font-size="12" font-weight="800" letter-spacing="2">STACK</text>
      <text x="24" y="255" fill="#e6edf3" font-size="16" font-weight="760">Python · FastAPI</text>
      <text x="24" y="280" fill="#e6edf3" font-size="16" font-weight="760">LangGraph · FAISS</text>
      <text x="24" y="326" fill="#f1c7a8" font-size="12" font-weight="800" letter-spacing="2">IMPACT</text>
      <text x="24" y="355" fill="#e6edf3" font-size="17" font-weight="700">Observable, retryable,</text>
      <text x="24" y="380" fill="#e6edf3" font-size="17" font-weight="700">stateful workflows.</text>
    </g>
    <g transform="translate(352 28)">
      <rect width="296" height="390" rx="8" fill="#0d1117" stroke="#30363d"/>
      <rect width="296" height="3" fill="#c07a3f"/>
      <rect width="82" height="3" fill="url(#scan)" filter="url(#glow)">
        <animate attributeName="x" values="0;214;0" dur="4.8s" begin=".55s" repeatCount="indefinite"/>
      </rect>
      <rect x="24" y="26" width="112" height="36" rx="4" fill="#2a211c"/>
      <rect x="136" y="26" width="128" height="36" rx="4" fill="#b85c38"/>
      <text x="80" y="49" fill="#ffffff" font-size="14" font-weight="800" text-anchor="middle" letter-spacing="2">MIDAS PAY</text>
      <text x="200" y="49" fill="#ffffff" font-size="13" font-weight="800" text-anchor="middle" letter-spacing="2">FINTECH</text>
      <text x="24" y="100" fill="#f1c7a8" font-size="12" font-weight="800" letter-spacing="2">WHAT</text>
      <text x="24" y="130" fill="#e6edf3" font-size="17" font-weight="700">Event-driven fintech</text>
      <text x="24" y="155" fill="#e6edf3" font-size="17" font-weight="700">ledger with transaction</text>
      <text x="24" y="180" fill="#e6edf3" font-size="17" font-weight="700">intelligence and anomaly.</text>
      <text x="24" y="226" fill="#f1c7a8" font-size="12" font-weight="800" letter-spacing="2">STACK</text>
      <text x="24" y="255" fill="#e6edf3" font-size="16" font-weight="760">Spring Boot · Kafka</text>
      <text x="24" y="280" fill="#e6edf3" font-size="16" font-weight="760">PostgreSQL · Flutter</text>
      <text x="24" y="326" fill="#f1c7a8" font-size="12" font-weight="800" letter-spacing="2">IMPACT</text>
      <text x="24" y="355" fill="#e6edf3" font-size="17" font-weight="700">Decouples workloads,</text>
      <text x="24" y="380" fill="#e6edf3" font-size="17" font-weight="700">preserves balance state.</text>
    </g>
    <g transform="translate(676 28)">
      <rect width="296" height="390" rx="8" fill="#0d1117" stroke="#30363d"/>
      <rect width="296" height="3" fill="#7a9f68"/>
      <rect width="82" height="3" fill="url(#scan)" filter="url(#glow)">
        <animate attributeName="x" values="0;214;0" dur="4.8s" begin="1.1s" repeatCount="indefinite"/>
