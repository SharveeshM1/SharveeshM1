<svg xmlns="http://www.w3.org/2000/svg" width="920" height="94" viewBox="0 0 920 94" role="img" aria-labelledby="title desc">
  <title id="title">HELIOS animated flow</title>
  <desc id="desc">A compact animated pipeline showing planning, retrieval, memory, execution, and evaluation.</desc>
  <defs>
    <linearGradient id="pulse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d97757" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#f1c7a8" stop-opacity="1"/>
      <stop offset="1" stop-color="#d97757" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-80%" width="180%" height="260%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Inter, Helvetica, Arial, sans-serif">
    <path d="M98 47 H822" stroke="#30363d" stroke-width="2" stroke-linecap="round"/>
    <path d="M98 47 H822" stroke="url(#pulse)" stroke-width="3" stroke-linecap="round" stroke-dasharray="120 724" filter="url(#glow)">
      <animate attributeName="stroke-dashoffset" values="844;0" dur="4.8s" repeatCount="indefinite"/>
    </path>
    <g font-size="13" font-weight="760" text-anchor="middle">
      <g>
        <rect x="42" y="22" width="112" height="50" rx="8" fill="#2a211c" stroke="#b85c38"/>
        <text x="98" y="51" fill="#f1c7a8">PLANNING</text>
      </g>
      <g>
        <rect x="214" y="22" width="124" height="50" rx="8" fill="#2a211c" stroke="#c07a3f"/>
        <text x="276" y="51" fill="#f1c7a8">RETRIEVAL</text>
      </g>
      <g>
        <rect x="408" y="22" width="104" height="50" rx="8" fill="#161b22" stroke="#6f7f8f"/>
        <text x="460" y="51" fill="#dbe3ee">MEMORY</text>
      </g>
      <g>
        <rect x="582" y="22" width="124" height="50" rx="8" fill="#2a211c" stroke="#d97757"/>
        <text x="644" y="51" fill="#f1c7a8">EXECUTION</text>
      </g>
      <g>
        <rect x="766" y="22" width="112" height="50" rx="8" fill="#161b22" stroke="#7a9f68"/>
        <text x="822" y="51" fill="#dbe3ee">EVALUATE</text>
      </g>
    </g>
    <g fill="#f1c7a8" filter="url(#glow)">
      <circle cx="98" cy="47" r="4">
        <animate attributeName="opacity" values=".35;1;.35" dur="4.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="276" cy="47" r="4">
        <animate attributeName="opacity" values=".35;.35;1;.35" dur="4.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="460" cy="47" r="4">
        <animate attributeName="opacity" values=".35;.35;1;.35" dur="4.8s" begin=".8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="644" cy="47" r="4">
        <animate attributeName="opacity" values=".35;.35;1;.35" dur="4.8s" begin="1.6s" repeatCount="indefinite"/>
      </circle>
      <circle cx="822" cy="47" r="4">
        <animate attributeName="opacity" values=".35;.35;1;.35" dur="4.8s" begin="2.4s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>
</svg>
