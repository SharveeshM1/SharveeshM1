<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Sharveesh M hero panel</title>
  <desc id="desc">Premium pink and black hero panel for Sharveesh M, AI Engineer, Systems Builder, and Full-Stack Developer.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14020a"/>
      <stop offset="0.5" stop-color="#310819"/>
      <stop offset="1" stop-color="#07060a"/>
    </linearGradient>
    <linearGradient id="hot" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff2d6f"/>
      <stop offset="1" stop-color="#ff8ab3"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .ui { font-family: Inter, "Segoe UI", Helvetica, Arial, system-ui, sans-serif; }
      .muted { fill: #d8b9c8; }
      .white { fill: #fff7fb; }
    </style>
  </defs>
  <rect width="1200" height="360" rx="32" fill="url(#bg)" stroke="#74203d"/>
  <g opacity=".42">
    <path d="M0 238 C194 66 356 68 570 142 C789 218 975 196 1200 44" stroke="#ff2d6f" stroke-width="2" fill="none"/>
    <path d="M0 296 C212 168 402 180 612 212 C834 246 1005 220 1200 136" stroke="#ff7aa8" stroke-width="1" fill="none"/>
    <path d="M176 82 C343 42 523 108 650 150 C810 202 1012 186 1176 87" stroke="#ff2d6f" stroke-width="1" fill="none" opacity=".48"/>
  </g>
  <g class="ui" text-rendering="optimizeLegibility">
    <animate attributeName="opacity" values="0;1" dur=".7s" fill="freeze"/>
    <text x="60" y="92" font-size="54" font-weight="900" letter-spacing="-2" class="white">Sharveesh <tspan fill="#ff5f93">M</tspan></text>
    <text x="62" y="132" font-size="18" font-weight="800" class="white">AI Engineer • Systems Builder • Full-Stack Developer</text>
    <text x="62" y="178" font-size="18" class="white">Building intelligent systems that <tspan fill="#ff2d6f" font-weight="850">think, adapt, and scale.</tspan></text>
    <text x="62" y="204" font-size="18" class="muted">LLM orchestration, backend reliability, and polished product UX.</text>
    <g transform="translate(62 250)">
      <rect width="168" height="42" rx="21" fill="url(#hot)" filter="url(#glow)"/>
      <text x="22" y="27" font-size="14" font-weight="900" fill="#fff">Explore Systems →</text>
      <rect x="186" width="92" height="42" rx="21" fill="rgba(255,255,255,.08)"/>
      <text x="211" y="27" font-size="14" font-weight="850" fill="#fff">Projects</text>
      <rect x="294" width="104" height="42" rx="21" fill="rgba(255,255,255,.08)"/>
      <text x="318" y="27" font-size="14" font-weight="850" fill="#fff">Resume</text>
    </g>
  </g>
  <g transform="translate(760 60)" filter="url(#glow)">
    <ellipse cx="190" cy="148" rx="250" ry="72" fill="none" stroke="#ff2d6f" opacity=".55"/>
    <ellipse cx="190" cy="148" rx="160" ry="46" fill="none" stroke="#ff7aa8" opacity=".42"/>
    <g>
      <polygon points="150,37 187,17 224,37 187,57" fill="#ff8ab3"/>
      <polygon points="150,37 187,57 187,156 150,135" fill="#a30e3d"/>
      <polygon points="224,37 187,57 187,156 224,135" fill="#ff2d6f"/>
    </g>
    <g transform="translate(-92 78) scale(.72)">
      <polygon points="150,37 187,17 224,37 187,57" fill="#ffd1e0"/>
      <polygon points="150,37 187,57 187,145 150,124" fill="#8f123d"/>
      <polygon points="224,37 187,57 187,145 224,124" fill="#ff2d6f"/>
    </g>
    <g transform="translate(210 98) scale(.62)">
      <polygon points="150,37 187,17 224,37 187,57" fill="#ecd8ff"/>
      <polygon points="150,37 187,57 187,130 150,109" fill="#5d2470"/>
      <polygon points="224,37 187,57 187,130 224,109" fill="#b861ff"/>
    </g>
    <rect x="285" y="11" width="126" height="34" rx="17" fill="rgba(255,45,111,.18)" stroke="#a9355b"/>
    <text x="318" y="33" font-family="Inter, Segoe UI, Arial" font-size="13" font-weight="850" fill="#fff">AI Systems</text>
    <rect x="-16" y="104" width="134" height="34" rx="17" fill="rgba(255,45,111,.18)" stroke="#a9355b"/>
    <text x="22" y="126" font-family="Inter, Segoe UI, Arial" font-size="13" font-weight="850" fill="#fff">Cloud Native</text>
  </g>
</svg>
