<svg xmlns="http://www.w3.org/2000/svg" width="900" height="224" viewBox="0 0 900 224" role="img" aria-labelledby="title desc">
  <title id="title">Animated Sharveesh M role intro</title>
  <desc id="desc">A clean animated role reveal for AI Systems Engineer, Backend Architect, Product Builder, and product-ready LLM systems.</desc>
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f1c7a8"/>
      <stop offset="1" stop-color="#d97757"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-60%" width="160%" height="220%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="54" y="8" width="792" height="208" rx="22" fill="#0d1117" stroke="#2d333b"/>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" text-anchor="middle">
    <g font-size="15" font-weight="700" letter-spacing="1.2">
      <text x="214" y="42" fill="#7f6a5f">[BOOT]</text>
      <text x="450" y="42" fill="#7f6a5f">[ROUTE]</text>
      <text x="686" y="42" fill="#7f6a5f">[SHIP]</text>
    </g>

    <g font-size="27" font-weight="800">
      <g>
        <animate attributeName="opacity" values=".82;1;.82" dur="3.8s" begin="0s" repeatCount="indefinite"/>
        <text x="214" y="82" fill="#fff7ed">AI Systems</text>
        <text x="214" y="113" fill="#f1c7a8">Engineer</text>
      </g>

      <g>
        <animate attributeName="opacity" values=".82;1;.82" dur="3.8s" begin=".45s" repeatCount="indefinite"/>
        <text x="450" y="82" fill="#fff7ed">Backend</text>
        <text x="450" y="113" fill="#f1c7a8">Architect</text>
      </g>

      <g>
        <animate attributeName="opacity" values=".82;1;.82" dur="3.8s" begin=".9s" repeatCount="indefinite"/>
        <text x="686" y="82" fill="#fff7ed">Product</text>
        <text x="686" y="113" fill="#f1c7a8">Builder</text>
      </g>
    </g>

    <g stroke="#6f5548" stroke-width="2" fill="none" stroke-linecap="round">
      <path d="M306 98 H358"/>
      <path d="M542 98 H594"/>
    </g>
    <g stroke="url(#accent)" stroke-width="3" fill="none" stroke-linecap="round" filter="url(#softGlow)">
      <path d="M306 98 H358" stroke-dasharray="12 56">
        <animate attributeName="stroke-dashoffset" values="68;0" dur="2.2s" begin=".5s" repeatCount="indefinite"/>
      </path>
      <path d="M542 98 H594" stroke-dasharray="12 56">
        <animate attributeName="stroke-dashoffset" values="68;0" dur="2.2s" begin="1.1s" repeatCount="indefinite"/>
      </path>
    </g>

    <g font-size="18" font-weight="700">
      <text x="450" y="150" fill="#dbe3ee">Turning LLM workflows into reliable systems.</text>
      <text x="450" y="176" fill="#f1c7a8">Observable by design. Product-ready by default.</text>
    </g>

    <g font-size="11" font-weight="800" letter-spacing="1">
      <g>
        <rect x="240" y="190" width="116" height="20" rx="10" fill="#2a211c" stroke="#6f5548"/>
        <text x="298" y="204" fill="#f1c7a8">RELIABLE</text>
        <animate attributeName="opacity" values=".62;1;.62;.62;.62" dur="4.8s" repeatCount="indefinite"/>
      </g>
      <g>
        <rect x="382" y="190" width="136" height="20" rx="10" fill="#2a211c" stroke="#6f5548"/>
        <text x="450" y="204" fill="#f1c7a8">OBSERVABLE</text>
        <animate attributeName="opacity" values=".62;.62;1;.62;.62" dur="4.8s" repeatCount="indefinite"/>
      </g>
      <g>
        <rect x="544" y="190" width="142" height="20" rx="10" fill="#2a211c" stroke="#6f5548"/>
        <text x="615" y="204" fill="#f1c7a8">PRODUCT-READY</text>
        <animate attributeName="opacity" values=".62;.62;.62;1;.62" dur="4.8s" repeatCount="indefinite"/>
      </g>
    </g>

    <rect x="206" y="130" width="488" height="3" rx="1.5" fill="#2d231e"/>
    <rect x="206" y="130" width="92" height="3" rx="1.5" fill="url(#accent)" filter="url(#softGlow)">
      <animate attributeName="x" values="206;602;206" dur="4.8s" begin=".9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values=".2;.9;.2" dur="4.8s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
