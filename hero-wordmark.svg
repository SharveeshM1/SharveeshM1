<svg xmlns="http://www.w3.org/2000/svg" width="900" height="126" viewBox="0 0 900 126" role="img" aria-labelledby="title desc">
  <title id="title">Animated Sharveesh M role intro</title>
  <desc id="desc">A refined animated intro for AI Systems Engineer, Backend Architect, Product Builder, and product-ready LLM systems.</desc>
  <defs>
    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d97757" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#f1c7a8" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#d97757" stop-opacity="0"/>
    </linearGradient>
    <filter id="softGlow" x="-25%" y="-80%" width="150%" height="260%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Inter, Helvetica, Arial, sans-serif" text-anchor="middle">
    <g font-size="21" font-weight="760" fill="#e6edf3">
      <text x="450" y="38">AI Systems Engineer · Backend Architect · Product Builder</text>
    </g>

    <g font-size="18" font-weight="610">
      <text x="450" y="76" fill="#dbe3ee">Turning LLM workflows into reliable systems.</text>
      <text x="450" y="104" fill="#c9d1d9">Observable by design. Product-ready by default.</text>
    </g>

    <rect x="214" y="53" width="472" height="2" rx="1" fill="#30363d"/>
    <rect x="214" y="53" width="110" height="2" rx="1" fill="url(#scan)" filter="url(#softGlow)">
      <animate attributeName="x" values="214;576;214" dur="5.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values=".2;1;.2" dur="5.2s" repeatCount="indefinite"/>
    </rect>

    <g font-size="18" font-weight="650" fill="#f1c7a8" opacity="0" filter="url(#softGlow)">
      <text x="536" y="76">reliable</text>
      <animate attributeName="opacity" values="0;0;1;0;0;0" dur="5.4s" repeatCount="indefinite"/>
    </g>
    <g font-size="18" font-weight="650" fill="#f1c7a8" opacity="0" filter="url(#softGlow)">
      <text x="378" y="104">Observable</text>
      <animate attributeName="opacity" values="0;0;0;1;0;0" dur="5.4s" repeatCount="indefinite"/>
    </g>
    <g font-size="18" font-weight="650" fill="#f1c7a8" opacity="0" filter="url(#softGlow)">
      <text x="540" y="104">Product-ready</text>
      <animate attributeName="opacity" values="0;0;0;0;1;0" dur="5.4s" repeatCount="indefinite"/>
    </g>
  </g>
</svg>
