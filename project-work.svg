<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Project work distribution across HELIOS, MIDAS PAY, and Whole2</title>
  <desc id="desc">A themed donut chart showing work distribution and engineering responsibilities across HELIOS, MIDAS PAY, and Whole2.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#15110e"/>
      <stop offset="1" stop-color="#080706"/>
    </linearGradient>
    <linearGradient id="h" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f1c7a8"/>
      <stop offset="1" stop-color="#d97757"/>
    </linearGradient>
    <linearGradient id="m" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b85c38"/>
      <stop offset="1" stop-color="#7f3f2a"/>
    </linearGradient>
    <linearGradient id="w" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6f5548"/>
      <stop offset="1" stop-color="#3a2b24"/>
    </linearGradient>
    <style>
      .ui { font-family: Inter, "Segoe UI", Helvetica, Arial, system-ui, sans-serif; }
      .title { fill: #fff7ed; font-size: 30px; font-weight: 900; letter-spacing: -0.5px; }
      .muted { fill: #c8aa96; font-size: 15px; }
      .label { fill: #fff7ed; font-size: 18px; font-weight: 850; }
      .small { fill: #c8aa96; font-size: 13px; }
      .box { fill: rgba(255,255,255,.035); stroke: rgba(241,199,168,.18); }
    </style>
  </defs>
  <rect width="1200" height="420" rx="28" fill="url(#bg)" stroke="rgba(241,199,168,.22)"/>
  <g class="ui" text-rendering="geometricPrecision">
    <text x="56" y="62" class="title">Project Work Distribution</text>
    <text x="56" y="91" class="muted">What I actually built across the three flagship systems.</text>

    <g transform="translate(84 124)">
      <circle cx="130" cy="130" r="92" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="42"/>
      <circle cx="130" cy="130" r="92" fill="none" stroke="url(#h)" stroke-width="42" stroke-dasharray="260 578" stroke-dashoffset="-24" transform="rotate(-90 130 130)"/>
      <circle cx="130" cy="130" r="92" fill="none" stroke="url(#m)" stroke-width="42" stroke-dasharray="190 578" stroke-dashoffset="-284" transform="rotate(-90 130 130)"/>
      <circle cx="130" cy="130" r="92" fill="none" stroke="url(#w)" stroke-width="42" stroke-dasharray="128 578" stroke-dashoffset="-474" transform="rotate(-90 130 130)"/>
      <circle cx="130" cy="130" r="56" fill="#0b0908" stroke="rgba(241,199,168,.12)"/>
      <text x="130" y="121" text-anchor="middle" class="label">3 Systems</text>
      <text x="130" y="148" text-anchor="middle" class="small">AI + Backend + Product</text>
    </g>

    <g transform="translate(392 118)">
      <rect width="336" height="86" rx="16" class="box"/>
      <rect x="20" y="22" width="16" height="42" rx="8" fill="url(#h)"/>
      <text x="52" y="36" class="label">HELIOS · 45%</text>
      <text x="52" y="61" class="small">LangGraph orchestration, planning, FAISS retrieval, memory, WebSocket progress, evaluation loops.</text>

      <rect y="108" width="336" height="86" rx="16" class="box"/>
      <rect x="20" y="130" width="16" height="42" rx="8" fill="url(#m)"/>
      <text x="52" y="144" class="label">MIDAS PAY · 32%</text>
      <text x="52" y="169" class="small">Kafka transaction flows, Spring Boot APIs, PostgreSQL ledger state, anomaly detection, Flutter wallet UX.</text>

      <rect y="216" width="336" height="86" rx="16" class="box"/>
      <rect x="20" y="238" width="16" height="42" rx="8" fill="url(#w)"/>
      <text x="52" y="252" class="label">Whole2 · 23%</text>
      <text x="52" y="277" class="small">Riverpod modules, seller dashboard, product discovery, Firebase sync, reusable Flutter UI systems.</text>
    </g>

    <g transform="translate(770 118)">
      <rect width="374" height="302" rx="18" class="box"/>
      <text x="28" y="42" class="label">Engineering coverage</text>
      <text x="28" y="78" class="small">• Multi-agent planning and routing</text>
      <text x="28" y="108" class="small">• Retrieval-augmented document search</text>
      <text x="28" y="138" class="small">• Provider-agnostic LLM inference</text>
      <text x="28" y="168" class="small">• Event-driven backend pipelines</text>
      <text x="28" y="198" class="small">• Secure auth and persistent ledgers</text>
      <text x="28" y="228" class="small">• Offline-first mobile workflows</text>
      <text x="28" y="258" class="small">• Production-grade UI architecture</text>
    </g>
  </g>
</svg>
