<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="236" viewBox="0 0 1000 236" role="img" aria-labelledby="title desc">
  <title id="title">Runtime Focus</title>
  <desc id="desc">A restrained HELIOS runtime focus panel with compact capability rows.</desc>
  <defs>
    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#b85c38" stop-opacity="0"/>
      <stop offset=".5" stop-color="#f1c7a8" stop-opacity=".9"/>
      <stop offset="1" stop-color="#b85c38" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <g font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif">
    <rect x="32" y="24" width="936" height="188" rx="3" fill="#0d1117" stroke="#30363d"/>
    <rect x="56" y="56" width="888" height="1" fill="#30363d"/>
    <rect x="56" y="56" width="126" height="1" fill="url(#scan)">
      <animate attributeName="x" values="56;818;56" dur="5.6s" repeatCount="indefinite"/>
    </rect>
    <text x="56" y="46" fill="#8b949e" font-size="12" font-weight="700" letter-spacing="1.8">RUNTIME FOCUS</text>
    <text x="56" y="91" fill="#e6edf3" font-size="19" font-weight="650">HELIOS turns open-ended goals into observable agent workflows.</text>
    <text x="56" y="119" fill="#8b949e" font-size="14" font-weight="500">Planning, retrieval, memory, execution, and evaluation stay inside one visible loop.</text>
    <g font-size="13" font-weight="600">
      <g>
        <circle cx="62" cy="156" r="3" fill="#b85c38"/>
        <text x="76" y="161" fill="#dbe3ee">Plans task graphs</text>
      </g>
      <g>
        <circle cx="244" cy="156" r="3" fill="#c07a3f"/>
        <text x="258" y="161" fill="#dbe3ee">Retrieves grounded context</text>
      </g>
      <g>
        <circle cx="494" cy="156" r="3" fill="#6f7f8f"/>
        <text x="508" y="161" fill="#dbe3ee">Preserves durable state</text>
      </g>
      <g>
        <circle cx="62" cy="185" r="3" fill="#d97757"/>
        <text x="76" y="190" fill="#dbe3ee">Routes tools and APIs through observable execution</text>
      </g>
      <g>
        <circle cx="494" cy="185" r="3" fill="#7a9f68"/>
        <text x="508" y="190" fill="#dbe3ee">Evaluates results and retries failed paths</text>
      </g>
    </g>
  </g>
</svg>
