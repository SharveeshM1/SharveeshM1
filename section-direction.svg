<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="88" viewBox="0 0 1000 88" role="img" aria-labelledby="title desc">
  <title id="title">Current Direction</title>
  <desc id="desc">Animated section header for the Current Direction section.</desc>
  <defs>
    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d97757" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#f1c7a8" stop-opacity="1"/>
      <stop offset="1" stop-color="#d97757" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Inter, Helvetica, Arial, sans-serif">
    <text x="24" y="48" fill="#8b949e" font-size="14" font-weight="700" letter-spacing="2">06 / NEXT</text>
    <text x="136" y="50" fill="#e6edf3" font-size="34" font-weight="760">Current Direction</text>
    <rect x="24" y="72" width="952" height="2" rx="1" fill="#30363d"/>
    <rect x="24" y="72" width="140" height="2" rx="1" fill="url(#scan)">
      <animate attributeName="x" values="24;836;24" dur="5.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values=".2;1;.2" dur="5.4s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
