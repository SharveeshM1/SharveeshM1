<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="340" viewBox="0 0 1000 340" role="img" aria-labelledby="title desc">
  <title id="title">HELIOS multi-agent runtime map</title>
  <desc id="desc">An animated HELIOS pipeline routing goals through planning, retrieval, memory, execution, and evaluation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12100d"/>
      <stop offset="0.58" stop-color="#17110e"/>
      <stop offset="1" stop-color="#090807"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d97757"/>
      <stop offset="1" stop-color="#f1c7a8"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1000" height="340" rx="28" fill="url(#bg)" stroke="rgba(241,199,168,.22)"/>

  <g opacity=".22" fill="none">
    <path d="M70 80 C212 34 350 60 492 94 C640 130 780 132 930 76" stroke="#f1c7a8"/>
    <path d="M68 274 C220 210 360 228 504 248 C650 268 796 260 936 210" stroke="#9f6a55"/>
    <ellipse cx="500" cy="174" rx="330" ry="96" stroke="#f1c7a8"/>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-weight="700" text-anchor="middle">
    <rect x="380" y="32" width="240" height="54" rx="18" fill="#2a211c" stroke="#7a5949"/>
    <text x="500" y="55" font-size="16" fill="#fff7ed">HELIOS</text>
    <text x="500" y="75" font-size="11" fill="#f1c7a8">MULTI-AGENT RUNTIME</text>
  </g>

  <g stroke="#6f5548" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M118 178 H206"/>
    <path d="M306 178 H394"/>
    <path d="M494 178 H582"/>
    <path d="M682 178 H770"/>
    <path d="M870 178 H914"/>
    <path d="M500 86 V136"/>
    <path d="M628 206 C628 256 372 256 372 206"/>
  </g>

  <g stroke="url(#accent)" stroke-width="4" fill="none" stroke-linecap="round" filter="url(#glow)">
    <path d="M118 178 H206" stroke-dasharray="18 100">
      <animate attributeName="stroke-dashoffset" values="138;0" dur="2.2s" repeatCount="indefinite"/>
    </path>
    <path d="M306 178 H394" stroke-dasharray="18 100">
      <animate attributeName="stroke-dashoffset" values="138;0" dur="2.2s" begin=".25s" repeatCount="indefinite"/>
    </path>
    <path d="M494 178 H582" stroke-dasharray="18 100">
      <animate attributeName="stroke-dashoffset" values="138;0" dur="2.2s" begin=".5s" repeatCount="indefinite"/>
    </path>
    <path d="M682 178 H770" stroke-dasharray="18 100">
      <animate attributeName="stroke-dashoffset" values="138;0" dur="2.2s" begin=".75s" repeatCount="indefinite"/>
    </path>
    <path d="M870 178 H914" stroke-dasharray="18 62">
      <animate attributeName="stroke-dashoffset" values="114;0" dur="2.2s" begin="1s" repeatCount="indefinite"/>
    </path>
    <path d="M628 206 C628 256 372 256 372 206" stroke-dasharray="18 284">
      <animate attributeName="stroke-dashoffset" values="282;0" dur="3.8s" begin="1.15s" repeatCount="indefinite"/>
    </path>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-weight="700" text-anchor="middle">
    <g>
      <rect x="36" y="146" width="82" height="64" rx="16" fill="#1b1714" stroke="#5b4035"/>
      <text x="77" y="172" font-size="12" fill="#f1c7a8">GOAL</text>
      <text x="77" y="194" font-size="10" fill="#a89384">INPUT</text>
    </g>

    <g>
      <rect x="206" y="136" width="100" height="84" rx="18" fill="#2a211c" stroke="#7a5949"/>
      <circle cx="256" cy="164" r="7" fill="#f1c7a8"/>
      <text x="256" y="194" font-size="13" fill="#fff7ed">PLAN</text>
      <text x="256" y="212" font-size="9" fill="#a89384">TASK GRAPH</text>
      <animate attributeName="opacity" values=".78;1;.78" dur="2.8s" repeatCount="indefinite"/>
    </g>

    <g>
      <rect x="394" y="136" width="100" height="84" rx="18" fill="#2a211c" stroke="#7a5949"/>
      <circle cx="444" cy="164" r="7" fill="#f1c7a8"/>
      <text x="444" y="194" font-size="13" fill="#fff7ed">RETRIEVE</text>
      <text x="444" y="212" font-size="9" fill="#a89384">EVIDENCE</text>
      <animate attributeName="opacity" values=".78;1;.78" dur="2.8s" begin=".35s" repeatCount="indefinite"/>
    </g>

    <g>
      <rect x="582" y="136" width="100" height="84" rx="18" fill="#2a211c" stroke="#7a5949"/>
      <circle cx="632" cy="164" r="7" fill="#f1c7a8"/>
      <text x="632" y="194" font-size="13" fill="#fff7ed">MEMORY</text>
      <text x="632" y="212" font-size="9" fill="#a89384">STATE</text>
      <animate attributeName="opacity" values=".78;1;.78" dur="2.8s" begin=".7s" repeatCount="indefinite"/>
    </g>

    <g>
      <rect x="770" y="136" width="100" height="84" rx="18" fill="#2a211c" stroke="#7a5949"/>
      <circle cx="820" cy="164" r="7" fill="#d97757"/>
      <text x="820" y="194" font-size="13" fill="#fff7ed">EXECUTE</text>
      <text x="820" y="212" font-size="9" fill="#a89384">TOOLS</text>
      <animate attributeName="opacity" values=".78;1;.78" dur="2.8s" begin="1.05s" repeatCount="indefinite"/>
    </g>

    <g>
      <rect x="914" y="146" width="70" height="64" rx="16" fill="#1b1714" stroke="#5b4035"/>
      <text x="949" y="172" font-size="11" fill="#f1c7a8">VERIFY</text>
      <text x="949" y="194" font-size="9" fill="#a89384">DONE</text>
    </g>

    <g>
      <rect x="448" y="258" width="104" height="42" rx="14" fill="#2a211c" stroke="#7a5949"/>
      <text x="500" y="284" font-size="12" fill="#f1c7a8">FEEDBACK</text>
    </g>
  </g>
</svg>
