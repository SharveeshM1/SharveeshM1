<svg xmlns="http://www.w3.org/2000/svg" width="420" height="300" viewBox="0 0 420 300" role="img" aria-labelledby="title desc">
  <title id="title">Animated coding system illustration</title>
  <desc id="desc">A crisp animated terminal and connected system nodes in a warm Claude-inspired palette.</desc>
  <defs>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c1713"/>
      <stop offset="1" stop-color="#0f0d0b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f1c7a8"/>
      <stop offset="1" stop-color="#d97757"/>
    </linearGradient>
  </defs>
  <rect x="72" y="58" width="276" height="178" rx="24" fill="#12100d" stroke="#3a2b24" stroke-width="2"/>
  <rect x="88" y="78" width="244" height="132" rx="14" fill="url(#screen)" stroke="#2d231e"/>
  <circle cx="108" cy="95" r="5" fill="#8b5e4b"/>
  <circle cx="126" cy="95" r="5" fill="#b7795d"/>
  <circle cx="144" cy="95" r="5" fill="#f1c7a8"/>
  <g fill="none" stroke-linecap="round" stroke-width="7">
    <path d="M112 128 H190" stroke="#f1c7a8"/>
    <path d="M112 154 H245" stroke="#a27b68"/>
    <path d="M112 180 H166" stroke="#d97757"/>
    <path d="M184 180 H276" stroke="#665149"/>
  </g>
  <rect x="282" y="121" width="9" height="17" rx="2" fill="#f1c7a8">
    <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>
  <g stroke="url(#accent)" stroke-width="2" fill="none">
    <path d="M210 236 C210 258 151 258 151 276"/>
    <path d="M210 236 C210 258 269 258 269 276"/>
    <path d="M210 236 V278"/>
  </g>
  <g fill="url(#accent)">
    <circle cx="151" cy="276" r="10">
      <animate attributeName="r" values="8;11;8" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="210" cy="278" r="10">
      <animate attributeName="r" values="10;7;10" dur="2.7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="269" cy="276" r="10">
      <animate attributeName="r" values="7;11;7" dur="2.2s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g fill="#2a211c" stroke="#6f5548">
    <rect x="54" y="122" width="38" height="38" rx="10"/>
    <rect x="328" y="122" width="38" height="38" rx="10"/>
    <rect x="191" y="22" width="38" height="38" rx="10"/>
  </g>
  <g stroke="#d97757" stroke-width="2" fill="none" opacity=".75">
    <path d="M92 141 C128 120 142 106 191 49"/>
    <path d="M328 141 C292 120 278 106 229 49"/>
  </g>
</svg>
